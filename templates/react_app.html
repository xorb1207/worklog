/* ─── Weekly View ─── */
function WeeklyView({ tasks, dataVersion }) {
  const WEEK_DATES = ['2026-04-21','2026-04-22','2026-04-23','2026-04-24','2026-04-25'];
  const DAYS_KO    = ['월','화','수','목','금','토','일'];

  /* 백엔드 주간 통계 */
  const [stats, setStats] = useState(null);
  useEffect(() => {
    let cancelled = false;
    GET(`/api/stats/weekly?start=2026-04-21&end=2026-04-27`)
      .then(s => { if (!cancelled) setStats(s); })
      .catch(_ => {});
    return () => { cancelled = true; };
  }, [dataVersion]);

  /* 이번 주 통계 — 백엔드 우선, 폴백은 클라이언트 계산 */
  const weekTasks  = tasks.filter(t => t.createdAt >= '2026-04-21' && t.createdAt <= '2026-04-27');
  const total      = (stats && stats.total) ?? (weekTasks.length || 5);
  const done       = (stats && stats.done) ?? (tasks.filter(t => t.status==='DONE' && t.updatedAt >= '2026-04-21').length || 3);
  const active     = (stats && stats.active) ?? tasks.filter(t => ['TODO','DOING'].includes(t.status)).length;
  const pct        = total ? Math.round(done / total * 100) : 0;

  /* 히트맵 */
  function heatLevel(c) { if(!c) return 0; if(c===1) return 1; if(c<=3) return 2; if(c<=6) return 3; return 4; }
  const firstDate  = new Date(HEATMAP_DATA[0].date+'T00:00:00');
  const startDow   = (firstDate.getDay()+6)%7; // 월=0
  const padded     = [...Array(startDow).fill(null), ...HEATMAP_DATA];
  while(padded.length%7!==0) padded.push(null);
  const numWeeks   = padded.length/7;

  const [tooltip, setTooltip] = React.useState(null);

  /* 일지 내용 펼침 상태 */
  const [expanded, setExpanded] = React.useState({});
  const toggle = d => setExpanded(p => ({...p,[d]:!p[d]}));

  const Card = ({children, style}) => (
    <div style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, padding:'16px 20px', boxShadow:'var(--shadow)', ...style}}>{children}</div>
  );

  return (
    <div style={{padding:24, overflow:'auto', height:'100%', display:'flex', flexDirection:'column', gap:16}}>

      {/* 통계 카드 3개 */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12}}>
        {[
          {n: total,        l:'이번 주 등록', c:'var(--text)'},
          {n: done,         l:'완료',         c:'var(--green)'},
          {n: `${pct}%`,    l:'완료율',       c:'var(--accent)'},
        ].map((s,i) => (
          <Card key={i} style={{textAlign:'center', padding:'18px 16px'}}>
            <div style={{fontSize:32, fontWeight:700, color:s.c}}>{s.n}</div>
            <div style={{fontSize:12, color:'var(--text-3)', marginTop:4}}>{s.l}</div>
          </Card>
        ))}
      </div>

      {/* 완료율 바 */}
      <Card>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
          <span style={{fontSize:13, fontWeight:600}}>이번 주 완료율</span>
          <span style={{fontSize:12, color:'var(--green)', fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
          <span style={{fontSize:11, color:'var(--text-3)'}}>4/21 ~ 4/27</span>
          <span style={{fontSize:11, color:'var(--text-3)'}}>진행/대기 {active}개</span>
        </div>
        <div className="progress-bar" style={{height:8}}>
          <div className="progress-fill" style={{width:`${pct}%`, background:'var(--green)'}} />
        </div>
      </Card>

      {/* 히트맵 */}
      <Card>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
          <span style={{fontSize:13, fontWeight:600}}>🌿 최근 35일 완료 현황</span>
          <div style={{display:'flex', gap:4, alignItems:'center', fontSize:11, color:'var(--text-3)'}}>
            <span>적음</span>
            {[0,1,2,3,4].map(l=>(
              <div key={l} className={`heat-cell heat-${l}`} style={{width:12, height:12, borderRadius:3}} />
            ))}
            <span>많음</span>
          </div>
        </div>
        <div style={{display:'flex', gap:6, alignItems:'flex-start'}}>
          {/* 요일 레이블 */}
          <div style={{display:'flex', flexDirection:'column', gap:3, paddingTop:2}}>
            {DAYS_KO.map(d=>(
              <div key={d} style={{width:18, height:14, fontSize:10, color:'var(--text-3)', lineHeight:'14px', textAlign:'right'}}>{d}</div>
            ))}
          </div>
          {/* 그리드 */}
          <div style={{display:'grid', gridTemplateRows:'repeat(7,14px)', gridTemplateColumns:`repeat(${numWeeks},14px)`, gridAutoFlow:'column', gap:3}}>
            {padded.map((d,i) => d ? (
              <div key={i}
                className={`heat-cell heat-${heatLevel(d.count)}`}
                style={{width:14, height:14, borderRadius:3, cursor:'default'}}
                onMouseEnter={e => setTooltip({text:`${d.date}  완료 ${d.count}개`, x:e.clientX, y:e.clientY})}
                onMouseLeave={() => setTooltip(null)}
              />
            ) : (
              <div key={i} style={{width:14, height:14, visibility:'hidden'}} />
            ))}
          </div>
        </div>
        {tooltip && (
          <div style={{position:'fixed', left:tooltip.x+12, top:tooltip.y-28, background:'var(--text)', color:'var(--surface)', padding:'4px 10px', borderRadius:6, fontSize:12, pointerEvents:'none', zIndex:200, boxShadow:'var(--shadow-md)'}}>
            {tooltip.text}
          </div>
        )}
      </Card>

      {/* 날짜별 일지 */}
      <Card>
        <div style={{fontSize:13, fontWeight:600, marginBottom:14}}>📝 이번 주 일지</div>
        <div style={{display:'flex', flexDirection:'column', gap:1}}>
          {WEEK_DATES.map(date => {
            const j = WEEKLY_JOURNALS.find(j=>j.date===date);
            const dow = DAYS_KO[new Date(date+'T00:00:00').getDay()-1] || '일';
            const isOpen = expanded[date];
            return (
              <div key={date} style={{borderRadius:6, overflow:'hidden', border:'1px solid var(--border)', marginBottom:6}}>
                <div
                  onClick={() => toggle(date)}
                  style={{display:'flex', alignItems:'center', gap:10, padding:'9px 14px', cursor:'pointer', background: isOpen ? 'var(--surface-2)' : 'transparent'}}
                >
                  <span style={{fontSize:11, color:'var(--text-4)', width:16}}>{dow}</span>
                  <span style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>{date}</span>
                  {j ? <span style={{fontSize:11, background:'var(--accent-light)', color:'var(--accent-text)', borderRadius:99, padding:'1px 8px', marginLeft:'auto'}}>기록 있음</span>
                     : <span style={{fontSize:11, color:'var(--text-4)', marginLeft:'auto'}}>기록 없음</span>}
                  <span style={{fontSize:10, color:'var(--text-4)', marginLeft:4}}>{isOpen ? '▲' : '▼'}</span>
                </div>
                {isOpen && (
                  <div style={{padding:'10px 14px 12px', borderTop:'1px solid var(--border)', background:'var(--surface)'}}>
                    {j
                      ? <pre style={{fontFamily:'var(--mono)', fontSize:12, whiteSpace:'pre-wrap', color:'var(--text-2)', lineHeight:1.8, margin:0}}>{j.content}</pre>
                      : <span style={{fontSize:12, color:'var(--text-4)'}}>이 날 일지가 비어있어요.</span>
                    }
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

/* ─── Task 정리 View ─── */
function TaskCleanupView({ tasks, setTasks, onResume, refreshTasks }) {
  const toast = useToast();
  function daysDiff(dateStr) {
    return Math.floor((new Date(TODAY) - new Date(dateStr+'T00:00:00')) / 86400000);
  }

  const stale      = tasks.filter(t => ['TODO','DOING'].includes(t.status) && daysDiff(t.updatedAt) >= 7);
  const cancelled  = tasks.filter(t => t.status === 'CANCELLED');

  async function setStatus(id, status) {
    const task = tasks.find(t => t.id === id);
    setTasks(prev => prev.map(t => t.id===id ? {...t, status, updatedAt:TODAY} : t));
    try { await POST(`/api/tasks/${id}/status`, { status }); }
    catch(e) { console.error(e); refreshTasks && refreshTasks(); }
    if (status === 'DOING' && task) {
      toast(`▶ "${task.title}" 진행 중으로 옮겼어요`, {
        kind: 'success',
        actionLabel: '대시보드 보기 →',
        onAction: () => onResume && onResume(),
      });
    } else if (status === 'DONE' && task) {
      toast(`✓ "${task.title}" 완료 처리됐어요`, { kind: 'success' });
    }
  }
  async function deleteTask(id) {
    setTasks(prev => prev.filter(t => t.id!==id));
    try { await POST(`/api/tasks/${id}/delete`, {}); }
    catch(e) { console.error(e); refreshTasks && refreshTasks(); }
  }

  const prioIcon = p => ({ A:'🔴', B:'🟡', C:'⚪' }[p] || '⚪');

  const Section = ({title, subtitle, children, empty}) => (
    <div style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, boxShadow:'var(--shadow)', overflow:'hidden'}}>
      <div style={{padding:'14px 20px 10px', borderBottom:'1px solid var(--border)'}}>

/* ─── ProjectManager Modal ─── */
function ProjectManager({ projects, projectsRaw = [], setProjects, onClose, refreshProjects }) {
  const [input, setInput] = useState('');
  const [pickerFor, setPickerFor] = useState(null); // 색상 picker 열린 프로젝트 이름

  /* 추천 색상 팔레트 */
  const COLOR_SWATCHES = [
    '#6366f1','#2563eb','#0ea5e9','#06b6d4','#10b981','#16a34a',
    '#84cc16','#eab308','#f59e0b','#f97316','#ef4444','#dc2626',
    '#ec4899','#d946ef','#a855f7','#7c3aed','#64748b','#475569'
  ];

  async function add() {
    const name = input.trim();
    if (!name || projects.includes(name)) return;
    setProjects(prev => [...prev, name]); // 낙관적
    setInput('');
    try { await POST('/api/projects/add', { name }); refreshProjects && refreshProjects(); }
    catch(e) { console.error(e); refreshProjects && refreshProjects(); }
  }
  async function remove(p) {
    setProjects(prev => prev.filter(x => x !== p));
    const raw = projectsRaw.find(x => x.name === p);
    if (!raw) { refreshProjects && refreshProjects(); return; }
    try { await POST(`/api/projects/${raw.id}/delete`, {}); refreshProjects && refreshProjects(); }
    catch(e) { console.error(e); refreshProjects && refreshProjects(); }
  }
  async function changeColor(p, color) {
    const raw = projectsRaw.find(x => x.name === p);
    if (raw) PROJ_COLORS[p] = color; // 낙관적 (다음 렌더에서 반영)
    setPickerFor(null);
    if (!raw) return;
    try { await POST(`/api/projects/${raw.id}/color`, { color }); refreshProjects && refreshProjects(); }
    catch(e) { console.error(e); refreshProjects && refreshProjects(); }
  }
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{width:380}}>
        <div className="modal-header">
          <div className="modal-title">📁 프로젝트 관리</div>
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:18}} onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',gap:6}}>
            <input
              style={{flex:1,border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'6px 10px',fontSize:13,fontFamily:'var(--font)',background:'var(--surface)',color:'var(--text)',outline:'none'}}
              placeholder="새 프로젝트 이름..."
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&add()}
            />
            <button className="btn btn-primary btn-sm" onClick={add}>+ 추가</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:4}}>
            {projects.map((p,i) => {
              const fallback = Object.values(PROJ_COLORS)[i % Object.values(PROJ_COLORS).length];
              const color = (PROJ_COLORS[p]) || fallback;
              const open = pickerFor === p;
              return (
                <div key={p} style={{display:'flex',flexDirection:'column',background:'var(--surface-2)',borderRadius:'var(--radius-sm)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px'}}>
                    <button
                      onClick={() => setPickerFor(open ? null : p)}
                      title="색상 변경"
                      style={{width:14,height:14,borderRadius:'50%',background:color,border:'1px solid rgba(0,0,0,.1)',cursor:'pointer',padding:0}}
                    />
                    <span style={{flex:1,fontSize:13,color:'var(--text-2)'}}>{p}</span>
                    <button className="icon-btn" style={{color:'var(--red)',borderColor:'transparent'}} onClick={()=>remove(p)}>✕</button>
                  </div>
                  {open && (
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,padding:'6px 10px 10px 10px',borderTop:'1px solid var(--border)'}}>
                      {COLOR_SWATCHES.map(c => (
                        <button
                          key={c}
                          onClick={() => changeColor(p, c)}
                          title={c}
                          style={{width:18,height:18,borderRadius:'50%',background:c,border: c===color ? '2px solid var(--text)' : '1px solid rgba(0,0,0,.1)',cursor:'pointer',padding:0}}
                        />
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        <div className="modal-footer" style={{justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={onClose}>완료</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Toast Context ─── */
const ToastCtx = React.createContext(null);
function useToast() { return React.useContext(ToastCtx); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const show = React.useCallback((msg, opts = {}) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, ...opts }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), opts.duration || 3500);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.kind === 'success' ? 'toast-success' : ''}`}>
            <span>{t.msg}</span>
            {t.actionLabel && <span className="toast-action" onClick={() => { t.onAction && t.onAction(); }}>{t.actionLabel}</span>}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

function App() {
  const [dark, setDark] = useState(() => {
    try { return JSON.parse(localStorage.getItem('worklog.dark') || 'false'); } catch(e) { return false; }
  });
  useEffect(() => { localStorage.setItem('worklog.dark', JSON.stringify(dark)); }, [dark]);
  const [view, setView] = useState('dashboard');
  const [tasks, setTasks] = useState(INIT_TASKS);
  const [projFilter, setProjFilter] = useState('전체');
  const [showExcel, setShowExcel] = useState(false);
  const [projects, setProjects] = useState(PROJECTS);
  const [projectsRaw, setProjectsRaw] = useState([]); // [{id,name,color}, ...]
  const [showProjMgr, setShowProjMgr] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [dataVersion, setDataVersion] = useState(0); // ALL_JOURNALS/HEATMAP_DATA 갱신 트리거

  /* 백엔드에서 task/projects 다시 불러오기 */
  const refreshTasks = useCallback(async () => {
    try {
      const data = await GET('/api/tasks/all');
      setTasks(data.map(normalizeTask));
    } catch(e) { if (!__NO_BACKEND__) console.error('refreshTasks failed:', e); }
  }, []);

  const refreshProjects = useCallback(async () => {
    try {
      const data = await GET('/api/projects');
      setProjectsRaw(data);
      const names = data.map(p => p.name);
      setProjects(names);
      PROJECTS = names;
      data.forEach(p => { PROJ_COLORS[p.name] = p.color; });
    } catch(e) { if (!__NO_BACKEND__) console.error('refreshProjects failed:', e); }
  }, []);

  const refreshHeatmap = useCallback(async () => {
    try {
      const data = await GET('/api/heatmap?days=35');
      HEATMAP_DATA = data;
      setDataVersion(v => v+1);
    } catch(e) { if (!__NO_BACKEND__) console.error('refreshHeatmap failed:', e); }
  }, []);

  /* 검색용 전체 일지 (90일치) — 검색 모달 열 때 fetch */
  const refreshAllJournals = useCallback(async () => {
    try {
      const end = new Date();
      const start = new Date(); start.setDate(start.getDate() - 90);
      const data = await GET(`/api/journals/range?start=${start.toISOString().slice(0,10)}&end=${end.toISOString().slice(0,10)}`);
      ALL_JOURNALS = data.filter(j => j.content && j.content.trim());
      recomputeTagFreq();
      setDataVersion(v => v+1);
    } catch(e) { if (!__NO_BACKEND__) console.error('refreshAllJournals failed:', e); }
  }, []);

  /* MiniCalendar 점 — 현재 보이는 달의 일지 있는 날짜 fetch */
  const [journalDates, setJournalDates] = useState({}); // { 'YYYY-MM-DD': true }
  const refreshJournalDates = useCallback(async () => {
    try {
      const now = new Date();
      // 현재 달 + 직전 달 + 다음 달까지 미리 가져와서 캐시
      const months = [-1, 0, 1].map(off => {
        const d = new Date(now.getFullYear(), now.getMonth() + off, 1);
        return { year: d.getFullYear(), month: d.getMonth() + 1 };
      });
      const all = {};
      for (const m of months) {
        try {
          const dates = await GET(`/api/journals/dates?year=${m.year}&month=${m.month}`);
          (dates || []).forEach(d => { all[d] = true; });
        } catch(_) {}
      }
      setJournalDates(all);
    } catch(e) { if (!__NO_BACKEND__) console.error('refreshJournalDates failed:', e); }
  }, []);

  const bumpDataVersion = useCallback(() => setDataVersion(v => v+1), []);

  /* 마운트 시 초기 데이터 로딩 */
  useEffect(() => {
    refreshTasks();
    refreshProjects();
    refreshHeatmap();
    refreshAllJournals();
    refreshJournalDates();
  }, []);

  /* 전역 단축키 */
  useEffect(() => {
    const onKey = (e) => {
      // 입력창/textarea 안에서는 대부분 동작 안 함 (⌘K만 예외)
      const tag = (e.target.tagName || '').toLowerCase();
      const inField = ['input','textarea','select'].includes(tag) || e.target.isContentEditable;
      const mod = e.metaKey || e.ctrlKey;

      if (mod && e.key === 'k') { e.preventDefault(); setShowSearch(s => !s); return; }
      if (e.key === 'Escape') {
        if (showShortcuts) { setShowShortcuts(false); return; }
        if (showSearch) { setShowSearch(false); return; }
      }
      if (inField) return;

      if (e.key === '?' && !mod) { e.preventDefault(); setShowShortcuts(s => !s); return; }
      if (mod && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); setDark(d => !d); return; }
      if (mod && (e.key === 'n' || e.key === 'N')) {
        e.preventDefault();
        const inp = document.querySelector('.quick-input');
        if (inp) inp.focus();
        return;
      }
      if (mod && (e.key === 'j' || e.key === 'J')) {
        e.preventDefault();
        const ta = document.querySelector('.journal-textarea');
        if (ta) ta.focus();
        return;
      }
      if (mod && e.key === 'ArrowLeft') {
        e.preventDefault();
        setSelectedDate(prev => {
          const [y,m,d] = prev.split('-').map(Number);
          const dt = new Date(y, m-1, d); dt.setDate(dt.getDate()-1);
          return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        });
        return;
      }
      if (mod && e.key === 'ArrowRight') {
        e.preventDefault();
        setSelectedDate(prev => {
          const [y,m,d] = prev.split('-').map(Number);
          const dt = new Date(y, m-1, d); dt.setDate(dt.getDate()+1);
          return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        });
        return;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showSearch, showShortcuts]);

  useEffect(() => {
    document.documentElement.setAttribute('data-dark', dark);
  }, [dark]);

  const [selectedDate, setSelectedDate] = useState(TODAY);

  function handleCalendarSelect(date) {
    setSelectedDate(date);
    setView('dashboard');
  }
  const doingCount = tasks.filter(t=>t.status==='DOING').length;
  const urgent = tasks.filter(t=>t.status!=='DONE'&&isUrgent(t.deadline));

  return (
    <div className="app">
      <Sidebar view={view} setView={setView} dark={dark} setDark={setDark} projFilter={projFilter} setProjFilter={setProjFilter} projects={projects} onManageProjects={()=>setShowProjMgr(true)} onSelectDate={handleCalendarSelect} selectedDate={selectedDate} journalDates={journalDates} />
      <div className="main">
        <div className="main-header">
          {view==='dashboard' && <>
            <div>
              <div className="header-title">📅 {formatKoreanDate(selectedDate)}</div>
              <div className="header-sub">대시보드</div>
            </div>
            <div style={{display:'flex', gap:8, marginLeft:'auto', alignItems:'center'}}>
              <div className="search-bar" onClick={()=>setShowSearch(true)} style={{cursor:'pointer'}}>
                <span style={{fontSize:12, color:'var(--text-4)'}}>🔍</span>
                <span style={{flex:1, fontSize:12, color:'var(--text-4)'}}>일지·Task 검색...</span>
                <span className="kbd">{MOD_LABEL}K</span>
              </div>
              <button className="icon-btn" onClick={()=>setShowShortcuts(true)} title="키보드 단축키 (?)" style={{fontSize:12, padding:'4px 8px'}}>?</button>
              {urgent.length>0 && <span className="badge badge-red">🔥 마감 {urgent.length}개</span>}
              <span className="badge badge-blue">DOING {doingCount}/5</span>
            </div>
          </>}
          {view==='briefing' && <>
            <div>
              <div className="header-title">📋 브리핑</div>
              <div className="header-sub">{formatKoreanDate(TODAY)}</div>
            </div>
            <div style={{marginLeft:'auto'}} />
          </>}
          {view==='gantt' && <>
            <div>
              <div className="header-title">📅 전체 일정</div>
              <div className="header-sub">2026년 4월 · {GANTT_DATA.length}개 항목</div>
            </div>
            <div style={{marginLeft:'auto'}} />
          </>}
          {view==='weekly' && <>
            <div>
              <div className="header-title">📊 주간 리포트</div>
              <div className="header-sub">4/21 ~ 4/27</div>
            </div>
            <div style={{display:'flex', gap:6, marginLeft:'auto'}}>
              <button className="btn btn-sm">← 이전 주</button>
              <button className="btn btn-sm">다음 주 →</button>
            </div>
          </>}
          {view==='cleanup' && <>
            <div>
              <div className="header-title">🧹 Task 정리</div>
              <div className="header-sub">방치 Task와 취소된 Task를 정리하세요</div>
            </div>
            <div style={{marginLeft:'auto'}} />
          </>}
        </div>
        <div className="main-body">
          {view==='dashboard' && <Dashboard tasks={tasks} setTasks={setTasks} projFilter={projFilter} projects={projects} selectedDate={selectedDate} setSelectedDate={setSelectedDate} refreshTasks={refreshTasks} dataVersion={dataVersion} bumpDataVersion={bumpDataVersion} journalDates={journalDates} refreshJournalDates={refreshJournalDates} />}
          {view==='briefing' && <BriefingView tasks={tasks} dataVersion={dataVersion} />}
          {view==='gantt' && <GanttView projFilter={projFilter} onImport={()=>setShowExcel(true)} />}
          {view==='weekly' && <WeeklyView tasks={tasks} dataVersion={dataVersion} />}
          {view==='cleanup' && <TaskCleanupView tasks={tasks} setTasks={setTasks} onResume={()=>setView('dashboard')} refreshTasks={refreshTasks} />}
        </div>
      </div>
      {showExcel && <ExcelModal onClose={()=>setShowExcel(false)} />}
      {showProjMgr && <ProjectManager projects={projects} projectsRaw={projectsRaw} setProjects={setProjects} refreshProjects={refreshProjects} onClose={()=>setShowProjMgr(false)} />}
      {showSearch && <SearchModal tasks={tasks} onClose={()=>setShowSearch(false)} onJumpDate={(d)=>{ setSelectedDate(d); setView('dashboard'); }} dataVersion={dataVersion} />}
      {showShortcuts && <ShortcutsModal onClose={()=>setShowShortcuts(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
<div id="root"></div>
</body>
</html>
