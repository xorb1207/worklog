<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무자동화 앱 — 와이어프레임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0eb; font-family: 'Noto Sans KR', sans-serif; }

/* sketch style vars */
:root {
  --ink: #1a1410;
  --ink2: #4a3f35;
  --ink3: #8a7a6e;
  --paper: #faf7f3;
  --paper2: #f0ebe3;
  --accent: #e8520a;
  --accent-light: #fde8dc;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --green: #16a34a;
  --green-light: #dcfce7;
  --sketch: 'Caveat', cursive;
}

.wf-frame {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  font-family: var(--sketch);
}

.wf-sidebar {
  background: var(--paper2);
  border-right: 2px solid var(--ink);
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 14px 10px;
  gap: 6px;
}

.wf-logo {
  font-family: var(--sketch);
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  padding: 4px 6px 12px 6px;
  border-bottom: 1.5px dashed var(--ink3);
  margin-bottom: 4px;
}

.wf-nav-item {
  font-family: var(--sketch);
  font-size: 14px;
  color: var(--ink2);
  padding: 6px 8px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.wf-nav-item.active {
  background: var(--ink);
  color: var(--paper);
}

.wf-box {
  border: 1.5px solid var(--ink2);
  border-radius: 3px;
  padding: 8px 10px;
}

.wf-box-dashed {
  border: 1.5px dashed var(--ink3);
  border-radius: 3px;
  padding: 8px 10px;
}

.wf-label {
  font-family: var(--sketch);
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 4px;
}

.wf-title {
  font-family: var(--sketch);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.wf-text {
  font-family: var(--sketch);
  font-size: 13px;
  color: var(--ink2);
}

.wf-small {
  font-family: var(--sketch);
  font-size: 11px;
  color: var(--ink3);
}

.wf-btn {
  display: inline-block;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--sketch);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 3px;
}
.wf-btn-outline {
  display: inline-block;
  border: 1.5px solid var(--ink);
  color: var(--ink);
  font-family: var(--sketch);
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 3px;
}

.wf-badge {
  display: inline-block;
  font-family: var(--sketch);
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 99px;
  border: 1px solid currentColor;
}

.wf-task-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 0;
  border-bottom: 1px dashed var(--paper2);
}

.wf-checkbox {
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--ink2);
  border-radius: 2px;
  flex-shrink: 0;
}
.wf-checkbox.checked {
  background: var(--ink2);
}

.wf-input {
  border-bottom: 1.5px solid var(--ink2);
  padding: 4px 2px;
  font-family: var(--sketch);
  font-size: 13px;
  color: var(--ink3);
  width: 100%;
}

.wf-textarea {
  border: 1.5px solid var(--ink2);
  border-radius: 3px;
  padding: 6px 8px;
  font-family: var(--sketch);
  font-size: 12px;
  color: var(--ink3);
  width: 100%;
  line-height: 1.6;
}

.wf-stat-card {
  border: 1.5px solid var(--ink2);
  border-radius: 3px;
  padding: 10px;
  text-align: center;
}

.wf-tab {
  font-family: var(--sketch);
  font-size: 13px;
  padding: 5px 14px;
  border: 1.5px solid var(--ink2);
  border-bottom: none;
  border-radius: 3px 3px 0 0;
  color: var(--ink2);
  cursor: pointer;
}
.wf-tab.active {
  background: var(--paper);
  border-color: var(--ink);
  color: var(--ink);
  font-weight: 700;
}

.wf-section-header {
  background: var(--paper2);
  border-bottom: 1.5px solid var(--ink2);
  padding: 4px 10px;
  font-family: var(--sketch);
  font-size: 11px;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.wf-heatmap-row {
  display: flex;
  gap: 3px;
}
.wf-heat-cell {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  background: var(--paper2);
  border: 1px solid var(--ink3);
  opacity: 0.4;
}
.wf-heat-cell.l1 { background: #c7f3c0; opacity: 0.7; }
.wf-heat-cell.l2 { background: #6de062; opacity: 0.8; }
.wf-heat-cell.l3 { background: #2db825; }

.annotation {
  font-family: var(--sketch);
  font-size: 12px;
  color: var(--accent);
  position: absolute;
}

.arrow-annotation {
  font-family: var(--sketch);
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 3px;
  padding: 2px 6px;
}

.canvas-label {
  font-family: var(--sketch);
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.canvas-sublabel {
  font-family: var(--sketch);
  font-size: 14px;
  color: var(--ink3);
  margin-bottom: 20px;
}
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

/* ──────────────── WF Option A: 통합 대시보드 ──────────────── */
function WireframeA() {
  const W = 900, H = 580;
  return (
    <div style={{width:W, height:H, position:'relative'}}>
      <div className="wf-frame" style={{width:'100%', height:'100%', display:'flex'}}>

        {/* Sidebar */}
        <div className="wf-sidebar" style={{width:140, flexShrink:0}}>
          <div className="wf-logo">WorkLog</div>
          <div className="wf-nav-item active">🏠 대시보드</div>
          <div className="wf-nav-item">✅ Task</div>
          <div className="wf-nav-item">📊 주간</div>
          <div style={{flex:1}} />
          <div className="wf-nav-item" style={{fontSize:12}}>⚙ 설정</div>
          <div style={{borderTop:'1px dashed var(--ink3)', paddingTop:8, marginTop:4}}>
            <div className="wf-small" style={{textAlign:'center'}}>다크모드 ○</div>
          </div>
        </div>

        {/* Main */}
        <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>

          {/* Top bar */}
          <div style={{borderBottom:'1.5px solid var(--ink2)', padding:'10px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', background:'var(--paper)'}}>
            <div>
              <span className="wf-text" style={{fontWeight:700}}>📅 2026년 4월 25일 (금)</span>
              <span className="wf-small" style={{marginLeft:10}}>DOING 3개 · 오늘 마감 1개</span>
            </div>
            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <span className="wf-small" style={{background:'#fde8dc', border:'1px solid var(--accent)', color:'var(--accent)', borderRadius:99, padding:'2px 8px'}}>🔥 마감 임박 1개</span>
              <span className="wf-btn">+ 빠른 추가</span>
            </div>
          </div>

          {/* 3-column body */}
          <div style={{flex:1, display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:0, overflow:'hidden'}}>

            {/* Col 1: 오늘 브리핑 + Task 입력 */}
            <div style={{borderRight:'1.5px solid var(--ink2)', display:'flex', flexDirection:'column', overflow:'hidden'}}>
              <div className="wf-section-header">📌 오늘 포커스 (DOING)</div>
              <div style={{padding:'10px 12px', flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:6}}>
                {[
                  {p:'A', t:'보고서 제출', d:'오늘', color:'var(--accent)'},
                  {p:'B', t:'코드 리뷰', d:'내일', color:'var(--ink2)'},
                  {p:'B', t:'팀 미팅 준비', d:'—', color:'var(--ink2)'},
                ].map((task, i) => (
                  <div key={i} className="wf-box" style={{borderLeft:`3px solid ${task.color}`}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                      <span className="wf-text" style={{fontSize:13}}>{task.t}</span>
                      <span className="wf-badge" style={{color:task.color, fontSize:10}}>[{task.p}]</span>
                    </div>
                    <div className="wf-small" style={{marginTop:2}}>마감: {task.d}</div>
                  </div>
                ))}

                <div style={{marginTop:4}}>
                  <div className="wf-label">+ 대기 중 (TODO 12개)</div>
                  {['기획서 검토', '문서 정리 (8일째)', '월간 보고'].map((t,i) => (
                    <div key={i} className="wf-task-row">
                      <div className="wf-checkbox" />
                      <span className="wf-small" style={{flex:1}}>{t}</span>
                      <span className="wf-small">▶</span>
                    </div>
                  ))}
                </div>

                {/* Quick add */}
                <div className="wf-box-dashed" style={{marginTop:6}}>
                  <div className="wf-label">할 일 빠르게 추가</div>
                  <div className="wf-input" style={{marginBottom:6}}>제목 입력...</div>
                  <div style={{display:'flex', gap:6}}>
                    <select style={{fontFamily:'var(--sketch)', fontSize:12, border:'1px solid var(--ink2)', borderRadius:2, padding:'2px 4px'}}>
                      <option>🔴 A</option><option>🟡 B</option>
                    </select>
                    <input type="date" style={{fontFamily:'var(--sketch)', fontSize:11, border:'1px solid var(--ink2)', borderRadius:2, padding:'2px 4px', width:100}} />
                    <span className="wf-btn" style={{marginLeft:'auto'}}>+</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Col 2: 일지 에디터 */}
            <div style={{borderRight:'1.5px solid var(--ink2)', display:'flex', flexDirection:'column', overflow:'hidden'}}>
              <div className="wf-section-header">📝 오늘 업무 기록</div>
              <div style={{padding:'10px 12px', flex:1, display:'flex', flexDirection:'column', gap:8}}>
                <div className="wf-textarea" style={{flex:1, minHeight:280}}>
                  {'- 09:00 팀 미팅 — Q2 계획\n- 11:00 보고서 초안 작성\n- 14:00 코드 리뷰 3건\n\n'}
                </div>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span className="wf-small">✓ 14:32 저장됨</span>
                  <span className="wf-btn">💾 저장</span>
                </div>
                <div style={{display:'flex', gap:6}}>
                  <span className="wf-btn-outline" style={{fontSize:11}}>← 어제</span>
                  <span className="wf-btn-outline" style={{fontSize:11}}>내일 →</span>
                </div>
              </div>
            </div>

            {/* Col 3: 통계 + 알림 */}
            <div style={{display:'flex', flexDirection:'column', overflow:'hidden'}}>
              <div className="wf-section-header">📊 이번 주 현황</div>
              <div style={{padding:'10px 12px', display:'flex', flexDirection:'column', gap:10}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                  {[{n:'8',l:'완료',c:'var(--green)'},{n:'3',l:'진행중',c:'var(--blue)'},{n:'73%',l:'완료율',c:'var(--ink)'},{n:'12',l:'대기중',c:'var(--ink2)'}].map((s,i) => (
                    <div key={i} className="wf-stat-card">
                      <div style={{fontSize:22, fontWeight:700, color:s.c, fontFamily:'var(--sketch)'}}>{s.n}</div>
                      <div className="wf-small">{s.l}</div>
                    </div>
                  ))}
                </div>

                {/* Progress bar */}
                <div>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                    <span className="wf-small">이번 주 완료율</span>
                    <span className="wf-small" style={{color:'var(--green)', fontWeight:700}}>73%</span>
                  </div>
                  <div style={{height:8, background:'var(--paper2)', borderRadius:99, border:'1px solid var(--ink2)', overflow:'hidden'}}>
                    <div style={{width:'73%', height:'100%', background:'var(--ink2)', borderRadius:99}} />
                  </div>
                </div>

                {/* Heatmap mini */}
                <div>
                  <div className="wf-label">🌿 최근 활동</div>
                  {[0,1,2,3,4].map(r => (
                    <div key={r} className="wf-heatmap-row" style={{marginBottom:3}}>
                      {Array.from({length:7}, (_,c) => {
                        const lvl = Math.floor(Math.random()*4);
                        return <div key={c} className={`wf-heat-cell ${['','l1','l2','l3'][lvl]}`} />;
                      })}
                    </div>
                  ))}
                </div>

                {/* Alert */}
                <div style={{background:'#fde8dc', border:'1px solid var(--accent)', borderRadius:3, padding:'8px 10px'}}>
                  <div className="wf-small" style={{color:'var(--accent)', fontWeight:700}}>⏳ 방치된 Task</div>
                  <div className="wf-small" style={{color:'var(--ink2)', marginTop:3}}>문서 정리 — 8일째 DOING</div>
                  <div className="wf-small" style={{color:'var(--ink2)'}}>코드 리팩토링 — 14일째</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Annotations */}
      <div className="arrow-annotation" style={{position:'absolute', top:-28, left:140}}>사이드바 고정, 네비게이션 항상 보임</div>
      <div className="arrow-annotation" style={{position:'absolute', bottom:-28, left:10}}>3단 분할: Task · 일지 · 통계</div>
      <div className="arrow-annotation" style={{position:'absolute', top:-28, right:0}}>알림 뱃지가 상단에 집약</div>
    </div>
  );
}

/* ──────────────── WF Option B: 탭 기반 (대시보드 중심) ──────────────── */
function WireframeB() {
  const W = 900, H = 580;
  return (
    <div style={{width:W, height:H, position:'relative'}}>
      <div className="wf-frame" style={{width:'100%', height:'100%', display:'flex'}}>

        {/* Sidebar */}
        <div className="wf-sidebar" style={{width:120, flexShrink:0}}>
          <div className="wf-logo" style={{fontSize:15}}>WorkLog</div>
          <div className="wf-nav-item active" style={{fontSize:13}}>🏠 오늘</div>
          <div className="wf-nav-item" style={{fontSize:13}}>✅ Tasks</div>
          <div className="wf-nav-item" style={{fontSize:13}}>📊 주간</div>
          <div style={{flex:1}} />
          <div style={{borderTop:'1px dashed var(--ink3)', paddingTop:8}}>
            <div className="wf-small" style={{textAlign:'center', marginBottom:4}}>DOING</div>
            <div style={{textAlign:'center', fontFamily:'var(--sketch)', fontSize:26, fontWeight:700, color:'var(--blue)'}}>3</div>
            <div className="wf-small" style={{textAlign:'center', marginTop:2}}>/ 5 권장</div>
            <div style={{height:4, background:'var(--paper2)', borderRadius:99, margin:'6px 4px', border:'1px solid var(--ink3)', overflow:'hidden'}}>
              <div style={{width:'60%', height:'100%', background:'var(--blue)'}} />
            </div>
          </div>
        </div>

        {/* Main with tabs */}
        <div style={{flex:1, display:'flex', flexDirection:'column'}}>

          {/* Header */}
          <div style={{borderBottom:'1.5px solid var(--ink)', padding:'8px 16px', display:'flex', justifyContent:'space-between', alignItems:'flex-end'}}>
            <div style={{display:'flex', gap:0}}>
              <div className="wf-tab active">🏠 오늘 요약</div>
              <div className="wf-tab">📌 집중 Task</div>
              <div className="wf-tab">📝 일지</div>
            </div>
            <div style={{display:'flex', gap:8, paddingBottom:2}}>
              <span className="wf-small">2026-04-25</span>
              <span className="wf-btn" style={{fontSize:11}}>+ Task 추가</span>
            </div>
          </div>

          {/* Tab content: 오늘 요약 */}
          <div style={{flex:1, display:'grid', gridTemplateColumns:'2fr 1fr', gap:0, overflow:'hidden'}}>

            {/* Left: 브리핑 + 오늘 task */}
            <div style={{borderRight:'1.5px solid var(--ink2)', overflow:'auto', padding:'12px 16px', display:'flex', flexDirection:'column', gap:12}}>

              {/* Morning brief card */}
              <div style={{background:'var(--paper2)', border:'1.5px solid var(--ink)', borderRadius:4, padding:'10px 14px'}}>
                <div className="wf-title" style={{fontSize:14}}>📅 모닝 브리핑</div>
                <div className="wf-task-row" style={{borderBottom:'none', paddingBottom:2}}>
                  <span style={{fontSize:14}}>🔥</span>
                  <span className="wf-text" style={{color:'var(--accent)', fontSize:13}}>오늘 마감: 보고서 제출 → 자동으로 DOING 이동했어요</span>
                </div>
                <div className="wf-task-row" style={{borderBottom:'none'}}>
                  <span style={{fontSize:14}}>⏳</span>
                  <span className="wf-small">문서 정리, 8일째 진행 중이에요. 아직 하고 계신 건가요?</span>
                </div>
              </div>

              {/* 집중 task 리스트 */}
              <div>
                <div className="wf-label">📌 DOING — 오늘 포커스</div>
                {[
                  {p:'A', t:'보고서 제출', d:'오늘', done:false},
                  {p:'B', t:'코드 리뷰', d:'내일', done:false},
                  {p:'B', t:'팀 미팅 준비', d:'—', done:true},
                ].map((task, i) => (
                  <div key={i} className="wf-task-row" style={{paddingTop:7, paddingBottom:7, borderBottom:'1px solid var(--paper2)'}}>
                    <div className="wf-checkbox" style={task.done ? {background:'var(--ink2)'} : {}} />
                    <span className="wf-badge" style={{color:task.p==='A'?'var(--accent)':'var(--ink2)', fontSize:10}}>{task.p}</span>
                    <span className="wf-text" style={{flex:1, fontSize:13, textDecoration:task.done?'line-through':'none', color:task.done?'var(--ink3)':'var(--ink)'}}>{task.t}</span>
                    <span className="wf-small">{task.d}</span>
                    <span className="wf-small" style={{marginLeft:6}}>⏸ ✓</span>
                  </div>
                ))}
              </div>

              {/* 일지 미리보기 */}
              <div>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4}}>
                  <div className="wf-label">📝 오늘 일지</div>
                  <span className="wf-small" style={{color:'var(--blue)', cursor:'pointer'}}>전체 편집 →</span>
                </div>
                <div className="wf-textarea" style={{height:80, overflow:'hidden', opacity:0.8}}>
                  - 09:00 팀 미팅 — Q2 계획 논의{'\n'}
                  - 11:00 보고서 초안 작성 완료{'\n'}
                  ...
                </div>
              </div>
            </div>

            {/* Right: 통계 패널 */}
            <div style={{overflow:'auto', padding:'12px 14px', display:'flex', flexDirection:'column', gap:10}}>
              <div className="wf-label">📊 이번 주</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6}}>
                {[{n:'8',l:'완료',c:'var(--green)'},{n:'73%',l:'완료율',c:'var(--ink)'}].map((s,i)=>(
                  <div key={i} className="wf-stat-card">
                    <div style={{fontSize:20, fontWeight:700, color:s.c, fontFamily:'var(--sketch)'}}>{s.n}</div>
                    <div className="wf-small">{s.l}</div>
                  </div>
                ))}
              </div>

              <div style={{height:6, background:'var(--paper2)', borderRadius:99, border:'1px solid var(--ink2)', overflow:'hidden'}}>
                <div style={{width:'73%', height:'100%', background:'var(--green)'}} />
              </div>

              <div>

const DAYS = 30;
const PROJ_COLORS = {'보고서':'var(--accent)','개발':'var(--blue)','팀 운영':'var(--green)'};

function GanttBar({task, barWidth}) {
  const left = (task.start / DAYS) * barWidth;
  const width = Math.max(((task.end - task.start) / DAYS) * barWidth, 20);
  const color = PROJ_COLORS[task.proj] || 'var(--ink2)';
  return (
    <div style={{position:'relative', height:22, marginBottom:4}}>
      {/* rail */}
      <div style={{position:'absolute', left:0, right:0, top:9, height:4, background:'var(--paper2)', border:'1px solid var(--ink3)', borderRadius:99}} />
      {/* bar */}
      <div style={{position:'absolute', left, width, top:6, height:10, background:color, borderRadius:3, opacity:0.85}}>
        {/* progress */}
        <div style={{width:`${task.done}%`, height:'100%', background:'rgba(255,255,255,0.5)', borderRadius:3}} />
      </div>
      {/* today marker */}
      <div style={{position:'absolute', left:(25/DAYS)*barWidth, top:0, bottom:0, width:1.5, background:'var(--accent)', opacity:0.5}} />
    </div>
  );
}

  return (

                <div className="wf-textarea" style={{flex:1, fontFamily:'monospace', fontSize:12, lineHeight:1.8}}>

                </div>
                <div>
                  {[0,1,2,3].map(r=>(
                    <div key={r} className="wf-heatmap-row" style={{marginBottom:3}}>

/* ──────────────── WF F: 사이드바 = 컨텍스트 (날짜 + 프로젝트) ──────────────── */
function WireframeF() {
  const W = 900, H = 580;
  return (
    <div style={{width:W, height:H, position:'relative'}}>
      <div className="wf-frame" style={{width:'100%', height:'100%', display:'flex'}}>

        {/* Sidebar — 날짜 캘린더 미니 + 프로젝트 */}
        <div className="wf-sidebar" style={{width:150, flexShrink:0}}>
          <div className="wf-logo" style={{fontSize:15}}>WorkLog</div>

          {/* 미니 날짜 네비 */}
          <div style={{borderBottom:'1px dashed var(--ink3)', paddingBottom:10, marginBottom:8}}>
            <div className="wf-label" style={{marginBottom:4}}>날짜</div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
              <span className="wf-small">←</span>
              <span style={{fontFamily:'var(--sketch)', fontSize:12, fontWeight:700}}>2026년 4월</span>
              <span className="wf-small">→</span>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2}}>
              {['월','화','수','목','금','토','일'].map(d=>(
                <div key={d} style={{fontFamily:'var(--sketch)', fontSize:9, textAlign:'center', color:'var(--ink3)'}}>{d}</div>
              ))}
              {Array.from({length:30},(_,i)=>{
                const day = i+1;
                const isToday = day === 25;
                const hasLog = [21,22,23,24,25].includes(day);
                return (
                  <div key={i} style={{
                    fontFamily:'var(--sketch)', fontSize:9, textAlign:'center', padding:'1px',
                    borderRadius:2,
                    background: isToday ? 'var(--ink)' : hasLog ? 'var(--paper2)' : 'transparent',
                    color: isToday ? 'var(--paper)' : 'var(--ink2)',
                    border: hasLog && !isToday ? '1px solid var(--ink3)' : 'none'
                  }}>{day}</div>
                );
              })}
            </div>
          </div>

          {/* 프로젝트 */}
          <div>
            <div className="wf-label" style={{marginBottom:4}}>프로젝트</div>
            {['전체','보고서','개발','팀 운영'].map((p,i)=>(
              <div key={i} className="wf-nav-item" style={{fontSize:12, padding:'4px 6px', background: i===0 ? 'var(--ink)' : 'transparent', color: i===0 ? 'var(--paper)' : 'var(--ink2)'}}>
                {i===0 ? '📁 ' : '  '}{p}
              </div>
            ))}
            <div className="wf-small" style={{padding:'4px 6px', color:'var(--blue)', cursor:'pointer'}}>+ 프로젝트 추가</div>
          </div>

          <div style={{flex:1}} />

          {/* 다크모드 */}
          <div style={{borderTop:'1px dashed var(--ink3)', paddingTop:8, display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 6px 0'}}>
            <span className="wf-small">🌙 다크</span>
            <div style={{width:28, height:14, border:'1.5px solid var(--ink2)', borderRadius:99, padding:2, display:'flex', alignItems:'center'}}>
              <div style={{width:10, height:10, borderRadius:'50%', background:'var(--ink2)'}} />
            </div>
          </div>
        </div>

        {/* Main */}
        <div style={{flex:1, display:'flex', flexDirection:'column'}}>
          <div style={{borderBottom:'1.5px solid var(--ink2)', padding:'8px 16px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{fontFamily:'var(--sketch)', fontWeight:700, fontSize:15}}>📅 오늘 — 4월 25일 (금)</span>
            <div style={{display:'flex', gap:8}}>
              <span className="wf-small" style={{background:'var(--accent-light)', color:'var(--accent)', border:'1px solid var(--accent)', padding:'2px 8px', borderRadius:99}}>🔥 마감 1</span>
            </div>
          </div>

          <div style={{flex:1, display:'grid', gridTemplateColumns:'1fr 1fr 1fr', overflow:'hidden'}}>
            {/* Task col */}
            <div style={{borderRight:'1.5px solid var(--ink2)', display:'flex', flexDirection:'column'}}>
              <div className="wf-section-header">📌 DOING</div>
              <div style={{padding:'10px 12px', flex:1, display:'flex', flexDirection:'column', gap:6}}>
                {[{p:'A',t:'보고서 제출',d:'오늘',c:'var(--accent)'},
                  {p:'B',t:'코드 리뷰',d:'내일',c:'var(--ink2)'},
                  {p:'B',t:'팀 미팅 준비',d:'—',c:'var(--ink2)'}].map((task,i)=>(
                  <div key={i} className="wf-box" style={{borderLeft:`3px solid ${task.c}`}}>
                    <div style={{display:'flex', justifyContent:'space-between'}}>
                      <span className="wf-text" style={{fontSize:13}}>{task.t}</span>
                      <span className="wf-badge" style={{color:task.c, fontSize:10}}>[{task.p}]</span>
                    </div>
                    <div className="wf-small">마감: {task.d}</div>
                  </div>
                ))}
                <div className="wf-box-dashed">
                  <div className="wf-input" style={{marginBottom:5}}>+ 빠른 추가...</div>
                  <span className="wf-btn" style={{fontSize:10, float:'right'}}>↵</span>
                </div>
                <div>
                  {['기획서 검토','문서 정리'].map((t,i)=>(
                    <div key={i} className="wf-task-row">
                      <div className="wf-checkbox" />
                      <span className="wf-small" style={{flex:1}}>{t}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* 일지 */}
            <div style={{borderRight:'1.5px solid var(--ink2)', display:'flex', flexDirection:'column'}}>
              <div className="wf-section-header">📝 오늘 기록</div>
              <div style={{padding:'10px 12px', flex:1, display:'flex', flexDirection:'column', gap:8}}>
                <div className="wf-textarea" style={{flex:1, fontFamily:'monospace', fontSize:12, lineHeight:1.8}}>
                  {'- 09:00 팀 미팅\n- 11:00 보고서 초안\n\n'}
                </div>
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <span className="wf-small">✓ 자동저장</span>
                  <span className="wf-btn" style={{fontSize:11}}>💾</span>
                </div>
              </div>
            </div>

            {/* 통계 */}
            <div style={{display:'flex', flexDirection:'column'}}>
              <div className="wf-section-header">📊 주간</div>
              <div style={{padding:'10px 12px', display:'flex', flexDirection:'column', gap:8}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6}}>
                  {[{n:'8',l:'완료',c:'var(--green)'},{n:'73%',l:'완료율',c:'var(--ink)'}].map((s,i)=>(
                    <div key={i} className="wf-stat-card">
                      <div style={{fontSize:20, fontWeight:700, color:s.c, fontFamily:'var(--sketch)'}}>{s.n}</div>
                      <div className="wf-small">{s.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{height:6, background:'var(--paper2)', borderRadius:99, border:'1px solid var(--ink2)', overflow:'hidden'}}>
                  <div style={{width:'73%', height:'100%', background:'var(--green)'}} />
                </div>
                <div>
                  {[0,1,2,3].map(r=>(
                    <div key={r} className="wf-heatmap-row" style={{marginBottom:3}}>
                      {[0,2,1,3,1,2,0].map((lvl,c)=>(
                        <div key={c} className={`wf-heat-cell ${['','l1','l2','l3'][lvl]}`} />
                      ))}
                    </div>
                  ))}
                </div>
                <div style={{background:'var(--accent-light)', border:'1px solid var(--accent)', borderRadius:3, padding:'7px 9px'}}>
                  <div className="wf-small" style={{color:'var(--accent)', fontWeight:700}}>⏳ 방치 2건</div>
                  <div className="wf-small">문서 정리 8일째</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div className="arrow-annotation" style={{position:'absolute', top:-28, left:0}}>사이드바 = 미니 캘린더 + 프로젝트 필터</div>
      <div className="arrow-annotation" style={{position:'absolute', bottom:-28, left:0}}>다크모드 토글 사이드바 하단 고정</div>
    </div>
  );
}

/* ──────────────── Canvas ──────────────── */
function App() {
  return (
    <DesignCanvas title="업무자동화 앱 — 레이아웃 와이어프레임">
      <DCSection id="wf" title="1단계: 레이아웃 방향 탐색">
        <DCArtboard id="a" label="A. 통합 대시보드 (3단 분할)" width={900} height={580}>
          <WireframeA />
        </DCArtboard>
        <DCArtboard id="b" label="B. 탭 기반 + 통계 우측 고정" width={900} height={580}>
          <WireframeB />
        </DCArtboard>
        <DCArtboard id="c" label="C. 포커스 중심 + 빠른 입력" width={900} height={580}>
          <WireframeC />
        </DCArtboard>
      </DCSection>
      <DCSection id="excel" title="5단계: 엑셀 가져오기 플로우">
        <DCArtboard id="e1" label="Step 1: 업로드 모달" width={480} height={380}>
          <ExcelStep1 />
        </DCArtboard>
        <DCArtboard id="e2" label="Step 2: 미리보기 & 매핑 확인" width={700} height={480}>
          <ExcelStep2 />
        </DCArtboard>
        <DCArtboard id="e3" label="Step 3: 가져오기 완료" width={480} height={320}>
          <ExcelStep3 />
        </DCArtboard>
      </DCSection>
      <DCSection id="final" title="4단계: 확정 방향 — G1 정제">
        <DCArtboard id="f1" label="대시보드 모드 (본인용)" width={1000} height={580}>
          <WireframeFinal mode="dashboard" />
        </DCArtboard>
        <DCArtboard id="f2" label="전체 일정 모드 (공유/발표용)" width={1000} height={580}>
          <WireframeFinal mode="gantt" />
        </DCArtboard>
      </DCSection>
      <DCSection id="gantt" title="3단계: 간트 차트 통합 (F 레이아웃 기준)">
        <DCArtboard id="g1" label="G1. 간트를 메인 뷰로 (사이드바에서 전환)" width={1000} height={580}>
          <WireframeG1 />
        </DCArtboard>
        <DCArtboard id="g2" label="G2. 대시보드 하단에 간트 패널 접기/펼치기" width={1000} height={680}>
          <WireframeG2 />
        </DCArtboard>
        <DCArtboard id="g3" label="G3. 우측 패널을 간트로 교체 (탭 전환)" width={1000} height={580}>
          <WireframeG3 />
        </DCArtboard>
      </DCSection>
      <DCSection id="sidebar" title="2단계: 사이드바 처리 방식 (통합 대시보드 기준)">
        <DCArtboard id="d" label="D. 사이드바 제거 → 탑바 탭" width={900} height={580}>
          <WireframeD />
        </DCArtboard>
        <DCArtboard id="e" label="E. 44px 슬림 아이콘 사이드바" width={900} height={580}>
          <WireframeE />
        </DCArtboard>
        <DCArtboard id="f" label="F. 사이드바 = 캘린더 + 프로젝트 필터" width={900} height={580}>
          <WireframeF />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
