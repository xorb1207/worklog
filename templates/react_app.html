<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLog — 업무 자동화 앱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- React/Babel — 폐쇄망 로컬 미러 (static/vendor/). 외부 CDN 차단 환경에서도 동작.
     production.min 사용 — 개발 모드 경고 제거 + 번들 크기 1/3. Babel은 in-browser 트랜스파일 유지(폐쇄망 1인용 허용 가능). -->
<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f1ec;
  --surface: #ffffff;
  --surface-2: #faf8f5;
  --border: #ebe5dc;
  --border-2: #dfd9d2;
  --text: #1e1b18;
  --text-2: #5c564f;
  --text-3: #8b857d;
  --text-4: #a39d96;
  --accent: #4f46e5;
  --accent-light: #eef2ff;
  --accent-text: #4338ca;
  --red: #dc2626;
  --red-light: #fee2e2;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --green: #16a34a;
  --green-light: #dcfce7;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --prio-a: #dc2626;
  --prio-b: #d97706;
  --prio-c: #78716c;
  --proj-1: #2563eb;
  --proj-2: #7c3aed;
  --proj-3: #059669;
  --proj-4: #d97706;
  --sidebar-w: 176px;
  --radius: 6px;
  --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.05);
  --font: 'Inter', 'Noto Sans KR', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

[data-dark="true"] {
  --bg: #0f0e0d;
  --surface: #1e1c1a;
  --surface-2: #2a2724;
  --border: #373330;
  --border-2: #4a4542;
  --text: #f5f3f0;
  --text-2: #d4cfc9;
  --text-3: #9e9890;
  --text-4: #6b6560;
  --accent: #4f8ef7;
  --accent-light: #1a2f52;
  --accent-text: #7eb0fa;
  --red: #f87171;
  --red-light: #2d1515;
  --amber: #fbbf24;
  --amber-light: #2d2008;
  --green: #4ade80;
  --green-light: #0f2a19;
  --blue-light: #1a2f52;
  --prio-a: #f87171;
  --prio-b: #fbbf24;
  --prio-c: #9e9890;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
  line-height: 1.5;
  transition: background .2s, color .2s;
}

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: var(--surface); }
.main-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Sidebar ── */
.sidebar-logo { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.sidebar-logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.sidebar-logo-sub { font-size: 10px; color: var(--text-4); margin-top: 1px; }
.sidebar-section { padding: 10px 10px 6px; }
.sidebar-section-label { font-size: 10px; font-weight: 600; color: var(--text-4); letter-spacing: .5px; text-transform: uppercase; padding: 0 4px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text-2); transition: background .12s; user-select: none; }
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--accent-light); color: var(--accent-text); font-weight: 600; }
.nav-item .icon { font-size: 14px; width: 18px; text-align: center; }
.proj-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sidebar-footer { border-top: 1px solid var(--border); padding: 10px 12px; margin-top: auto; }

/* ── Mini Calendar ── */
.mini-cal { padding: 4px 10px 8px; }
.mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.mini-cal-nav { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 14px; padding: 2px 4px; border-radius: 3px; }
.mini-cal-nav:hover { background: var(--surface-2); }
.mini-cal-month { font-size: 12px; font-weight: 600; color: var(--text-2); }
.mini-cal-grid { display: grid; grid-template-columns: auto repeat(7, 1fr); gap: 1px; }
.mini-cal-week { font-size: 8px; color: var(--text-4); text-align: center; padding: 2px 3px; line-height: 1.6; opacity: .6; }
.mini-cal-dow { font-size: 9px; color: var(--text-4); text-align: center; padding: 2px 0; }
.mini-cal-day { font-size: 10px; text-align: center; padding: 2px; border-radius: 3px; cursor: pointer; color: var(--text-3); }
.mini-cal-day:hover { background: var(--surface-2); }
.mini-cal-day.today { background: var(--text); color: var(--surface); font-weight: 700; border-radius: 50%; }
.mini-cal-day.has-log { background: var(--accent-light); color: var(--accent-text); }

/* ── Dark mode toggle ── */
.dm-toggle { display: flex; align-items: center; justify-content: space-between; }
.dm-label { font-size: 12px; color: var(--text-3); }
.toggle-track { width: 32px; height: 17px; background: var(--border-2); border-radius: 99px; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.toggle-track.on { background: var(--text); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; background: white; border-radius: 50%; transition: left .2s; }
.toggle-track.on .toggle-thumb { left: 17px; }

/* ── Header ── */
.header-title { font-size: 15px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 12px; color: var(--text-3); }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-prio-a { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.badge-prio-b { background: #fef7e6; color: #a16207; border: 1px solid #fcd9a4; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.badge-prio-c { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); font-size: 10px; padding: 1px 5px; border-radius: 3px; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); transition: background .12s, border-color .12s; font-family: var(--font); user-select: none; }
.btn:hover { background: var(--surface-2); }
.btn-primary { background: var(--text); color: var(--surface); border-color: var(--text); }
.btn-primary:hover { opacity: .85; }
.btn-sm { padding: 3px 8px; font-size: 11px; }

/* ── Dashboard 3-col ── */
.dashboard-grid { display: grid; grid-template-columns: var(--col-1, 1fr) var(--col-2, 1fr) var(--col-3, 260px); height: 100%; overflow: hidden; position: relative; min-width: 0; }
.dashboard-grid > .col { min-width: 0; }
.col-resizer { width: 5px; cursor: col-resize; background: transparent; flex-shrink: 0; position: relative; z-index: 5; transition: background .15s; }
.col-resizer:hover, .col-resizer.dragging { background: var(--accent); }
.col-resizer::before { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 1px; height: 24px; background: var(--border-2); }
.col-resizer:hover::before, .col-resizer.dragging::before { background: var(--accent); }
.col-reorder-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; font-size: 10px; padding: 1px 5px; cursor: pointer; color: var(--text-3); }
.col-reorder-btn:hover { background: var(--surface-2); color: var(--text); }
.col { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
.col:last-child { border-right: none; }
.col-header { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--surface); }
.col-header-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
.col-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.col-body::-webkit-scrollbar { width: 4px; }
.col-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }

/* ── Task card ── */
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 10px; display: flex; flex-direction: column; gap: 5px; transition: box-shadow .12s; }
.task-card:hover { box-shadow: var(--shadow); }
.task-card-top { display: flex; align-items: flex-start; gap: 7px; }
.task-card-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
.task-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.task-card-actions { display: flex; gap: 4px; margin-top: 4px; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; font-size: 11px; cursor: pointer; color: var(--text-3); transition: background .12s; }
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn.done { background: var(--green-light); border-color: var(--green); color: var(--green); }

/* ── Quick add ── */
.quick-add { border: 1px dashed var(--border-2); border-radius: var(--radius); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
.quick-input { border: none; border-bottom: 1px solid var(--border); background: transparent; font-size: 13px; font-family: var(--font); color: var(--text); width: 100%; padding: 3px 0; outline: none; }
.quick-input::placeholder { color: var(--text-4); }
.quick-input:focus { border-bottom-color: var(--accent); }
.prio-btns { display: flex; gap: 4px; }
.prio-btn { border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; font-size: 11px; cursor: pointer; background: var(--surface); color: var(--text-3); font-family: var(--font); }
.prio-btn.sel-a { background: #fef2f2; border-color: #fecaca; color: #b91c1c; font-weight: 700; }
.prio-btn.sel-b { background: #fef7e6; border-color: #fcd9a4; color: #a16207; font-weight: 700; }
.prio-btn.sel-c { background: var(--surface-2); border-color: var(--border-2); color: var(--text-3); font-weight: 700; }

/* ── Toast ── */
.toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
.toast { background: var(--text); color: var(--surface); padding: 10px 14px; border-radius: 8px; font-size: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.18); display: flex; align-items: center; gap: 10px; pointer-events: auto; animation: toastIn .25s ease-out; max-width: 460px; }
.toast .toast-action { color: var(--accent); cursor: pointer; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.toast .toast-action:hover { background: rgba(255,255,255,.1); }
.toast.toast-success { background: #16a34a; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Search & Tags ── */
.search-bar { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; min-width: 280px; transition: all .15s; }
.search-bar:focus-within { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }
.search-bar input { flex: 1; border: none; outline: none; background: transparent; font-size: 12px; color: var(--text); font-family: var(--font); }
.search-bar input::placeholder { color: var(--text-4); }
.search-bar .kbd { font-size: 9px; color: var(--text-4); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; }
.tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 1px 8px; border-radius: 99px; font-size: 11px; background: var(--accent-light); color: var(--accent-text); border: 1px solid transparent; cursor: pointer; transition: all .12s; font-weight: 500; }
.tag-chip:hover { border-color: var(--accent); }
.tag-chip.lg { font-size: 12px; padding: 3px 10px; }
.search-result-row { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.search-result-row:hover { background: var(--surface-2); }
.search-snippet { font-size: 12px; color: var(--text-3); margin-top: 4px; line-height: 1.6; }
.search-snippet mark { background: #fef08a; color: var(--text); padding: 0 2px; border-radius: 2px; font-weight: 600; }
[data-dark="true"] .search-snippet mark { background: #854d0e; color: #fef9c3; }

/* ── Journal ── */
.journal-textarea { flex: 1; border: none; background: transparent; font-size: 13px; font-family: var(--mono); color: var(--text); resize: none; outline: none; line-height: 1.9; padding: 0; width: 100%; }
.journal-textarea::placeholder { color: var(--text-4); }
.save-status { font-size: 10px; color: var(--text-4); }

/* ── Stats ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card { background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

/* ── Heatmap ── */
.heatmap-grid { display: flex; gap: 3px; flex-wrap: wrap; }
.heat-cell { width: 10px; height: 10px; border-radius: 2px; background: var(--surface-2); }
.heat-1 { background: #bbf7d0; }
.heat-2 { background: #4ade80; }
.heat-3 { background: #16a34a; }

/* ── Alert ── */
.alert { border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; margin-bottom: 0; }
.alert-red { background: var(--red-light); color: var(--red); }
.alert-amber { background: var(--amber-light); color: var(--amber); }

/* ── Gantt ── */
.gantt-wrap { display: flex; flex: 1; overflow: hidden; }
.gantt-names { width: 180px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.gantt-chart-area { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: column; }
.gantt-header-row { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.gantt-header-cell { flex: 1; padding: 5px 6px; font-size: 10px; color: var(--text-3); border-right: 1px solid var(--border); font-weight: 500; min-width: 60px; }
.gantt-row { display: flex; border-bottom: 1px solid var(--border); align-items: center; height: 40px; }
.gantt-row:hover { background: var(--surface-2); }
.gantt-name-cell { height: 40px; padding: 0 12px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid var(--border); }
.gantt-name-text { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.gantt-bar-cell { flex: 1; position: relative; height: 40px; min-width: 60px; border-right: 1px solid var(--border); }
.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 12px; border-radius: 3px; min-width: 8px; }
.gantt-progress { height: 100%; border-radius: 3px; background: rgba(255,255,255,0.35); }
.gantt-today { position: absolute; top: 0; bottom: 0; width: 1.5px; z-index: 2; pointer-events: none; }
.gantt-filter-bar { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-shrink: 0; background: var(--surface); }
.filter-chip { padding: 3px 10px; border-radius: 99px; font-size: 11px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text-3); transition: all .12s; }
.filter-chip.active { background: var(--text); color: var(--surface); border-color: var(--text); font-weight: 600; }
.gantt-legend { padding: 6px 14px; border-top: 1px solid var(--border); display: flex; gap: 14px; align-items: center; flex-shrink: 0; background: var(--surface); }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-3); }
.legend-dot { width: 10px; height: 8px; border-radius: 2px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow-lg); width: 540px; max-width: 100%; overflow: hidden; }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-body { padding: 18px 20px; }
.modal-footer { padding: 12px 20px 16px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
.dropzone { border: 2px dashed var(--border-2); border-radius: var(--radius); padding: 36px 20px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
.dropzone:hover { border-color: var(--accent); background: var(--accent-light); }
.dropzone-icon { font-size: 40px; margin-bottom: 10px; }
.step-indicator { display: flex; gap: 6px; align-items: center; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-2); }
.step-dot.active { background: var(--accent); width: 20px; border-radius: 99px; }
.step-dot.done { background: var(--green); }
.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.preview-table th { background: var(--surface-2); padding: 6px 10px; text-align: left; font-weight: 600; color: var(--text-2); border-bottom: 1px solid var(--border); }
.preview-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: middle; }
.preview-table tr:last-child td { border-bottom: none; }
.proj-select { border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; font-size: 11px; background: var(--surface); color: var(--text); font-family: var(--font); cursor: pointer; }

/* ── Todo list (sidebar) ── */
.sidebar-todo { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 3px; cursor: pointer; }
.sidebar-todo:hover { background: var(--surface-2); }
.sidebar-todo-check { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid var(--border-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; }
.sidebar-todo-check.done { background: var(--green); border-color: var(--green); color: white; }
.sidebar-todo-text { font-size: 11px; color: var(--text-3); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ─── API 헬퍼 ─── */
/* 백엔드 미연결 감지 — 클로드 디자인 미리보기처럼 Flask 서버 없이 HTML만 열면
   /api/* 가 전부 404가 됨. 첫 실패 시 플래그를 세우고 이후 콘솔 스팸을 줄이고
   화면 상단에 안내 배너를 띄움. */
let __NO_BACKEND__ = false;
let __NETWORK_FAIL_COUNT__ = 0;       // 연속 네트워크 실패 카운트 (성공 시 0으로 리셋)
const __NO_BACKEND_THRESHOLD__ = 2;   // 이 횟수 이상 연속 실패해야 데모 모드 진입 (짧은 hiccup 흡수)
function __recordNetworkFail__(reason) {
  __NETWORK_FAIL_COUNT__ += 1;
  if (__NETWORK_FAIL_COUNT__ >= __NO_BACKEND_THRESHOLD__) __markNoBackend__(reason);
}
function __recordNetworkOk__() {
  __NETWORK_FAIL_COUNT__ = 0;
}
function __dismissNoBackend__() {
  __NO_BACKEND__ = false;
  __NETWORK_FAIL_COUNT__ = 0;

function __isNetworkErr__(e) {
  const m = (e && e.message) || '';

}
async function GET(url) {
  if (__NO_BACKEND__) throw new Error('no-backend');
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`GET ${url} failed: ${r.status}`);
    const data = await r.json();
    __recordNetworkOk__();
    return data;
  } catch(e) {
    if (__isNetworkErr__(e)) __recordNetworkFail__(e.message);
    throw e;
  }
}
async function POST(url, body) {
  if (__NO_BACKEND__) throw new Error('no-backend');
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
    });
    if (!r.ok) throw new Error(`POST ${url} failed: ${r.status}`);
    const data = await r.json();
    __recordNetworkOk__();
    return data;
  } catch(e) {
    if (__isNetworkErr__(e)) __recordNetworkFail__(e.message);
    throw e;
  }
}

/* ─── MiniCalendar ─── */
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function MiniCalendar({ onSelectDate, selectedDate, journalDates }) {
  const today = new Date(2026, 3, 25); // April 25, 2026
  const [viewYear, setViewYear] = React.useState(2026);
  const [viewMonth, setViewMonth] = React.useState(3); // 0-indexed April

  /* journalDates: { 'YYYY-MM-DD': true } 형태. 백엔드 미연결 시 fallback */
  const fallbackHasLogDays = [21,22,23,24,25];

  const prevMonth = () => {
    if (viewMonth === 0) { setViewYear(y => y-1); setViewMonth(11); }
    else setViewMonth(m => m-1);
  };
  const nextMonth = () => {
    if (viewMonth === 11) { setViewYear(y => y+1); setViewMonth(0); }
    else setViewMonth(m => m+1);
  };

  const firstDay = new Date(viewYear, viewMonth, 1);
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  // Sunday=0 offset
  const startOffset = firstDay.getDay(); // 0=Sun

  // Build rows (weeks)
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  // pad to full weeks
  while (cells.length % 7 !== 0) cells.push(null);

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) {
    const row = cells.slice(i, i+7);
    // find first non-null day in row to determine week number
    const firstD = row.find(x => x !== null);
    const weekNum = firstD ? getISOWeek(new Date(viewYear, viewMonth, firstD)) : null;
    weeks.push({ weekNum, days: row });
  }

  const monthLabel = `${viewYear}년 ${viewMonth+1}월`;
  const dow = ['일','월','화','수','목','금','토'];

  return (
    <div className="mini-cal">
      <div className="mini-cal-header">
        <button className="mini-cal-nav" onClick={prevMonth}>‹</button>
        <span className="mini-cal-month">{monthLabel}</span>
        <button className="mini-cal-nav" onClick={nextMonth}>›</button>
      </div>
      <div className="mini-cal-grid">
        {/* header row */}
        <div className="mini-cal-week" style={{opacity:.4}}>주</div>
        {dow.map(d => <div key={d} className="mini-cal-dow">{d}</div>)}
        {/* week rows */}
        {weeks.map(({ weekNum, days }, wi) => (
          <React.Fragment key={wi}>
            <div className="mini-cal-week">{weekNum}</div>
            {days.map((d, di) => {
              if (!d) return <div key={`e${wi}-${di}`} />;
              const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const isToday = viewYear===2026 && viewMonth===3 && d===25;
              const isSelected = selectedDate === dateStr;
              const hasLog = (() => {
                const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if (journalDates && Object.keys(journalDates).length) return !!journalDates[key];
                return viewYear===2026 && viewMonth===3 && fallbackHasLogDays.includes(d);
              })();
              return (
                <div key={d}
                  onClick={() => onSelectDate && onSelectDate(dateStr)}
                  className={`mini-cal-day${isToday?' today':hasLog?' has-log':''}`}
                  style={isSelected && !isToday ? {outline:'2px solid var(--accent)', outlineOffset:'-1px'} : {}}
                  title={`${d}일로 이동`}
                >{d}</div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

  const todo = tasks.filter(t => t.status==='TODO' && (projFilter==='전체'||t.project===projFilter)).sort(byDeadline);
  const done = tasks.filter(t => t.status==='DONE' && (projFilter==='전체'||t.project===projFilter));
  const urgent = tasks.filter(t => t.status!=='DONE' && isUrgent(t.deadline));
  const stale = tasks.filter(t => t.status==='DOING' && t.id===5);
  const totalWeek = 11, doneWeek = 8;

  const toast = useToast();
  async function addTask() {
    const title = newTitle.trim();
    if (!title) return;
    const project = newProj.trim() || (projFilter !== '전체' ? projFilter : '미분류');
    const deadline = newDeadline || null;
    // DOING이 이미 5개 이상이면 TODO로 들어감 (집중 한계 보호)
    const overLimit = doing.length >= 5;
    const status = overLimit ? 'TODO' : 'DOING';
    try {
      const res = await POST('/api/tasks/add', {
        title, priority: newPrio, project, deadline,
        note: '', journal_date: selectedDate,
      });
      // 백엔드는 status를 무조건 TODO로 INSERT — DOING으로 시작해야 하면 응답 id로 즉시 승격
      if (status === 'DOING' && res && res.id) {
        await POST(`/api/tasks/${res.id}/status`, { status: 'DOING' });
      }
      await refreshTasks();
      setNewTitle(''); setNewPrio('B'); setNewProj(''); setNewDeadline('');
      const dateLabel = deadline ? `마감 ${deadline.slice(5)}` : '오늘 등록 (마감 없음)';
      if (overLimit) {
        toast(`⚠ DOING이 이미 5개라 "${title}" 은(는) TODO로 추가했어요`, { kind: 'success', duration: 4000 });
      } else {
        toast(`✓ "${title}" 추가됨 · 📁 ${project} · ${dateLabel}`, { kind: 'success', duration: 4000 });
      }
    } catch(e) {
      console.error(e);
      toast(`⚠ 추가 실패: ${e.message}`, { duration: 4000 });
    }
  }
  async function setStatus(id, status) {
    setTasks(prev => prev.map(t => t.id===id ? {...t, status} : t)); // 낙관적 업데이트
    try { await POST(`/api/tasks/${id}/status`, { status }); }
    catch(e) { console.error(e); refreshTasks(); }
  }
  async function updateTask(id, patch) {
    setTasks(prev => prev.map(t => t.id===id ? {...t, ...patch} : t)); // 낙관적
    try { await POST(`/api/tasks/${id}/edit`, patch); refreshTasks(); }
    catch(e) { console.error(e); refreshTasks(); }
  }
  async function deleteTask(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    setTasks(prev => prev.filter(x => x.id !== id)); // 낙관적
    try { await POST(`/api/tasks/${id}/delete`, {}); }
    catch(e) { console.error(e); refreshTasks(); }
    toast(`🗑 "${t.title}" 삭제됨`, {
      kind: 'success',
      duration: 5000,
      actionLabel: '↩ 실행 취소',
      onAction: async () => {
        // 복구 = 다시 add (id는 새로 발급됨)
        try {
          const res = await POST('/api/tasks/add', {
            title: t.title, priority: t.priority, project: t.project,
            deadline: t.deadline, note: t.note, journal_date: t.journalDate || selectedDate,
          });
          // 원래 status가 TODO 아니면 응답 id로 즉시 update
          if (t.status && t.status !== 'TODO' && res && res.id) {
            await POST(`/api/tasks/${res.id}/status`, { status: t.status });
          }
          await refreshTasks();
        } catch(e) { console.error(e); }
      },
    });
  }
  const journalRef = useRef(null);

  /* 마크다운 리스트 자동 이어쓰기:
     - "- " 또는 "- [ ] " (또는 [x]) 로 시작한 줄에서 Enter
     - 빈 항목에서 Enter 누르면 리스트 종료
     - 체크박스 [ ] / [x] 토글: Ctrl/Cmd+Click */
  function onJournalKeyDown(e) {
    const ta = e.target;
    /* 태그 자동완성 활성 시 Enter→삽입 / Esc→닫기 / Tab→삽입 */
    if (tagSuggest && tagSuggest.tags.length > 0) {
      if ((e.key === 'Enter' || e.key === 'Tab') && !e.nativeEvent.isComposing && e.keyCode !== 229) { e.preventDefault(); insertTag(tagSuggest.tags[0]); return; }
      if (e.key === 'Escape') { e.preventDefault(); setTagSuggest(null); return; }
    }
    /* Tab → 들여쓰기 / Shift+Tab → 내어쓰기 (멀티라인 지원) */
    if (e.key === 'Tab' && !e.isComposing && e.keyCode !== 229) {
      e.preventDefault();
      const value = ta.value;
      const start = ta.selectionStart;
      const end   = ta.selectionEnd;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      // 선택의 마지막 줄 끝 (선택이 줄 시작에 끝나면 그 줄 제외)
      const selEndAdj = (end > start && value[end-1] === '\n') ? end - 1 : end;
      let blockEnd = value.indexOf('\n', selEndAdj);
      if (blockEnd === -1) blockEnd = value.length;

      const block = value.slice(lineStart, blockEnd);
      const lines = block.split('\n');
      let newLines;
      if (e.shiftKey) {
        // 내어쓰기: 줄 앞 공백/탭 2칸까지 제거 ("- " 도 같이 옮겨지는 효과)
        newLines = lines.map(l => l.replace(/^(\t| {1,2})/, ''));
      } else {
        // 들여쓰기: 줄 맨 앞에 2칸 추가 ("- "도 같이 밀림)
        newLines = lines.map(l => '  ' + l);
      }
      const newBlock = newLines.join('\n');
      const delta = newBlock.length - block.length;
      const newValue = value.slice(0, lineStart) + newBlock + value.slice(blockEnd);
      setJournalText(newValue);
      requestAnimationFrame(() => {
        if (start === end) {
          // 단일 커서: 같은 줄 안에서 커서 위치 유지 (들여쓰기 양만큼 이동)
          const firstLineDelta = newLines[0].length - lines[0].length;
          ta.selectionStart = ta.selectionEnd = Math.max(lineStart, start + firstLineDelta);
        } else {
          // 여러 줄 선택: 블록 전체 다시 선택
          ta.selectionStart = lineStart;
          ta.selectionEnd   = blockEnd + delta;
        }
      });
      setSaveStatus('편집 중...');
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => setSaveStatus('✓ 자동저장됨'), 2000);
      return;
    }
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
      const start = ta.selectionStart;
      const value = ta.value;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const currentLine = value.slice(lineStart, start);

      // 패턴: 들여쓰기 + "- " 또는 "- [ ] " / "- [x] " / "* " / 숫자.
      const m = currentLine.match(/^(\s*)([-*])\s(\[[ xX]\]\s)?(.*)$/);
      if (m) {
        const [, indent, bullet, checkbox, rest] = m;
        // 빈 항목 → 리스트 종료
        if (!rest.trim()) {
          e.preventDefault();
          const newValue = value.slice(0, lineStart) + '\n' + value.slice(start);
          setJournalText(newValue);
          requestAnimationFrame(() => {
            ta.selectionStart = ta.selectionEnd = lineStart + 1;
          });
          setSaveStatus('편집 중...');
          clearTimeout(saveTimer.current);
          saveTimer.current = setTimeout(() => setSaveStatus('✓ 자동저장됨'), 2000);
          return;
        }
        // 다음 줄에 같은 prefix 자동 삽입
        e.preventDefault();
        const prefix = '\n' + indent + bullet + ' ' + (checkbox ? '[ ] ' : '');
        const newValue = value.slice(0, start) + prefix + value.slice(start);
        setJournalText(newValue);
        const caret = start + prefix.length;
        requestAnimationFrame(() => { ta.selectionStart = ta.selectionEnd = caret; });
        setSaveStatus('편집 중...');
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => setSaveStatus('✓ 자동저장됨'), 2000);
      }
    }
  }

  /* Cmd/Ctrl + 클릭으로 체크박스 토글 */
  function onJournalClick(e) {
    if (!(e.metaKey || e.ctrlKey)) return;
    const ta = e.target;
    const pos = ta.selectionStart;
    const value = ta.value;
    const lineStart = value.lastIndexOf('\n', pos - 1) + 1;
    let lineEnd = value.indexOf('\n', pos);
    if (lineEnd === -1) lineEnd = value.length;
    const line = value.slice(lineStart, lineEnd);
    const m = line.match(/^(\s*[-*]\s)\[([ xX])\](.*)$/);
    if (!m) return;
    e.preventDefault();
    const [, head, mark, tail] = m;
    const newMark = (mark === ' ') ? 'x' : ' ';
    const newLine = `${head}[${newMark}]${tail}`;
    setJournalText(value.slice(0, lineStart) + newLine + value.slice(lineEnd));
    setSaveStatus('편집 중...');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => setSaveStatus('✓ 자동저장됨'), 2000);
  }

  const [tagSuggest, setTagSuggest] = useState(null); /* {tags, top, left, prefix, anchor} */

  function onJournalChange(e) {
    const ta = e.target;
    const value = ta.value;
    setJournalText(value); setSaveStatus('편집 중...');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => setSaveStatus('✓ 자동저장됨'), 2000);

    /* # 자동완성 감지 */
    const caret = ta.selectionStart;
    const before = value.slice(0, caret);
    const m = before.match(/#([^\s#]*)$/);
    if (m) {
      const prefix = m[1].toLowerCase();
      const allTags = TAG_FREQ.map(t => t.tag);
      const matches = allTags.filter(t => t.toLowerCase().startsWith(prefix)).slice(0, 6);
      if (matches.length > 0) {
        setTagSuggest({ tags: matches, prefix: m[1], anchor: caret });
      } else {
        setTagSuggest(null);
      }
    } else {
      setTagSuggest(null);
    }
  }

  function insertTag(tag) {
    const ta = journalRef.current;
    if (!ta || !tagSuggest) return;
    const value = ta.value;
    const caret = tagSuggest.anchor;
    const before = value.slice(0, caret);
    const m = before.match(/#([^\s#]*)$/);
    if (!m) return;
    const start = caret - m[1].length;
    const newValue = value.slice(0, start) + tag + ' ' + value.slice(caret);
    setJournalText(newValue);
    setTagSuggest(null);
    requestAnimationFrame(() => {
      ta.focus();
      const newCaret = start + tag.length + 1;
      ta.selectionStart = ta.selectionEnd = newCaret;
    });
  }

  // Column order state — saves to localStorage
  const [colOrder, setColOrder] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('worklog.colOrder') || 'null');
      if (Array.isArray(saved) && saved.length === 3) return saved;
    } catch(e) {}
    return ['focus', 'journal', 'stats'];
  });
  useEffect(() => { localStorage.setItem('worklog.colOrder', JSON.stringify(colOrder)); }, [colOrder]);

  function moveCol(idx, dir) {
    const next = [...colOrder];
    const target = idx + dir;
    if (target < 0 || target >= next.length) return;
    [next[idx], next[target]] = [next[target], next[idx]];
    setColOrder(next);
  }

  // 숨김 스태이트 (key 배열)
  const [hiddenCols, setHiddenCols] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('worklog.hiddenCols') || '[]');
      if (Array.isArray(saved)) return saved;
    } catch(e) {}
    return [];
  });
  useEffect(() => { localStorage.setItem('worklog.hiddenCols', JSON.stringify(hiddenCols)); }, [hiddenCols]);
  function hideCol(key) {
    if (visibleCols.length <= 1) return; // 최소 1개는 남겨야 함
    setHiddenCols(prev => prev.includes(key) ? prev : [...prev, key]);
  }
  function showCol(key) {
    setHiddenCols(prev => prev.filter(k => k !== key));
  }
  const visibleCols = colOrder.filter(k => !hiddenCols.includes(k));
  const COL_LABELS = { focus: '📌 오늘 집중', journal: '📝 오늘 기록', stats: '📊 이번 주' };

  const HideBtn = ({colKey}) => (
    <button className="col-reorder-btn" onClick={()=>hideCol(colKey)} title="숨기기" style={{marginLeft:4, opacity: visibleCols.length<=1 ? .3 : 1, cursor: visibleCols.length<=1 ? 'default' : 'pointer'}} disabled={visibleCols.length<=1}>–</button>
  );

  const ReorderBtns = ({idx}) => (
    <span style={{display:'inline-flex', gap:2, marginRight:6}}>
      <button className="col-reorder-btn" disabled={idx===0} onClick={()=>moveColVisible(idx,-1)} title="왼쪽으로" style={{opacity: idx===0?.3:1, cursor: idx===0?'default':'pointer'}}>◀</button>
      <button className="col-reorder-btn" disabled={idx===visibleCols.length-1} onClick={()=>moveColVisible(idx,1)} title="오른쪽으로" style={{opacity: idx===visibleCols.length-1?.3:1, cursor: idx===visibleCols.length-1?'default':'pointer'}}>▶</button>
    </span>
  );

  // visible 기준 인덱스를 colOrder 상의 인접 교체로 변환
  function moveColVisible(visIdx, dir) {
    const target = visIdx + dir;
    if (target < 0 || target >= visibleCols.length) return;
    const a = visibleCols[visIdx];
    const b = visibleCols[target];
    const next = [...colOrder];
    const ai = next.indexOf(a), bi = next.indexOf(b);
    [next[ai], next[bi]] = [next[bi], next[ai]];
    setColOrder(next);
  }

  const cols = {
    focus: (idx) => (
      <div className="col" key="focus">
        <div className="col-header">
          <span style={{display:'flex', alignItems:'center'}}>
            <ReorderBtns idx={idx} />
            <span className="col-header-title">📌 오늘 집중</span>
          </span>
          <span className={`badge ${doing.length >= 5 ? 'badge-red' : doing.length >= 4 ? 'badge-amber' : 'badge-blue'}`} title={doing.length >= 5 ? '집중 항목이 너무 많아요. 5개 이하로 줄이세요.' : doing.length >= 4 ? '집중 항목이 한계에 가까워요' : ''}>{doing.length}/5{doing.length >= 5 ? ' ⚠' : ''}</span>
        </div>
        <div className="col-body">
          <div className="quick-add">
            <input className="quick-input" placeholder="+ 할 일 빠르게 추가..."
              value={newTitle} onChange={e=>setNewTitle(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && !e.nativeEvent.isComposing && e.keyCode !== 229){ e.preventDefault(); addTask(); } }} />
            <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
              <div className="prio-btns">
                {['A','B','C'].map(p => (
                  <button key={p} className={`prio-btn${newPrio===p?` sel-${p.toLowerCase()}`:''}`} onClick={()=>setNewPrio(p)}>{p}</button>
                ))}
              </div>
              <select value={newProj} onChange={e=>setNewProj(e.target.value)}
                style={{border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'2px 6px', fontSize:11, background:'var(--surface)', color: newProj ? 'var(--text)' : 'var(--text-4)', fontFamily:'var(--font)', cursor:'pointer'}}>
                <option value="">📁 프로젝트</option>
                {projects.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <input type="date" value={newDeadline} onChange={e=>setNewDeadline(e.target.value)}
                style={{border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'2px 5px', fontSize:11, background:'var(--surface)', color: newDeadline ? 'var(--text)' : 'var(--text-4)', fontFamily:'var(--font)', cursor:'pointer'}} />
              <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={addTask}>추가 ↵</button>
            </div>
          </div>
          {urgent.length > 0 && (
            <div className="alert alert-red">🔥 마감 임박 — {urgent.map(t=>t.title).join(', ')}</div>
          )}
          {stale.length > 0 && (
            <div className="alert alert-amber">⏳ {stale[0].title} — 8일째 진행 중이에요</div>
          )}
          {doing.map(t => (
            <TaskCard key={t.id} task={t} onStatus={setStatus} onDelete={deleteTask} onUpdate={updateTask} projects={projects} />
          ))}
          {todo.length > 0 && (
            <>
              <div style={{fontSize:10, color:'var(--text-4)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.5px', paddingTop:4}}>대기 중 TODO ({todo.length})</div>
              {todo.map(t => (
                <div key={t.id} style={{display:'flex', alignItems:'center', gap:8, padding:'5px 4px', borderRadius:4, cursor:'pointer'}}
                  onMouseOver={e=>e.currentTarget.style.background='var(--surface-2)'}
                  onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:13, height:13, border:'1.5px solid var(--border-2)', borderRadius:3, flexShrink:0}} />
                  <span style={{flex:1, fontSize:12, color:'var(--text-3)', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis'}}>{t.title}</span>
                  <span style={{fontSize:10, color:'var(--text-4)', flexShrink:0}}>{t.priority}</span>
                  <button className="icon-btn" onClick={()=>setStatus(t.id,'DOING')} style={{fontSize:10}} title="진행으로">▶</button>
                  <button className="icon-btn" onClick={()=>deleteTask(t.id)} style={{fontSize:10, color:'var(--red)', borderColor:'transparent'}} title="삭제">✕</button>
                </div>
              ))}
            </>
          )}
        </div>
      </div>
    ),
    journal: (idx) => (
      <div className="col" key="journal">
        <div className="col-header">
          <span style={{display:'flex', alignItems:'center'}}>
            <ReorderBtns idx={idx} />
            <span className="col-header-title">📝 오늘 기록</span>
          </span>
          <span className="save-status">{saveStatus}</span>
        </div>
        <div className="col-body" style={{padding:'12px 14px'}}>
          <div style={{display:'flex', gap:6, marginBottom:8, alignItems:'center'}}>
            <button className="btn btn-sm" onClick={()=>shiftDate(-1)} title="하루 전">← 어제</button>
            <button className="btn btn-sm" onClick={()=>shiftDate(1)} title="하루 후">내일 →</button>
            <span style={{fontSize:11, color:'var(--text-3)', marginLeft:6}}>{dateLabel(selectedDate)}</span>
            {selectedDate !== TODAY && (
              <button className="btn btn-sm" onClick={()=>setSelectedDate(TODAY)} style={{fontSize:10}}>오늘로</button>
            )}
            <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={manualSave}>💾 저장</button>
          </div>
          <div style={{position:'relative', flex:1, display:'flex', flexDirection:'column'}}>
          <textarea className="journal-textarea"
            ref={journalRef}
            value={journalText}
            onChange={onJournalChange}
            onKeyDown={onJournalKeyDown}
            onClick={onJournalClick}
            placeholder={`오늘 한 일, 회의 내용, 이슈 등을 자유롭게 기록하세요.\n\n팁:\n- 를 치고 엔터 → 다음 줄도 자동으로 리스트\n- [ ] 를 치고 엔터 → 체크박스 리스트\n#태그 로 분류 가능 (예: #보고서 #개발)\n⌘/Ctrl + 클릭으로 체크박스 토글`}
          />
          {tagSuggest && tagSuggest.tags.length > 0 && (
            <div style={{position:'absolute', top:0, left:0, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, boxShadow:'0 8px 24px rgba(0,0,0,.12)', padding:4, minWidth:160, zIndex:50}}>
              <div style={{fontSize:9, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:'.5px', padding:'4px 8px 2px'}}>태그 추천</div>
              {tagSuggest.tags.map(t => (
                <div key={t} onMouseDown={(e) => { e.preventDefault(); insertTag(t); }}
                  style={{padding:'5px 8px', fontSize:12, cursor:'pointer', borderRadius:4, color:'var(--text-2)'}}
                  onMouseOver={e => e.currentTarget.style.background='var(--surface-2)'}
                  onMouseOut={e => e.currentTarget.style.background='transparent'}>
                  <span style={{color:'var(--accent)', fontWeight:600}}>#{t.slice(0, tagSuggest.prefix.length)}</span>{t.slice(tagSuggest.prefix.length)}
                </div>
              ))}
            </div>
          )}
          </div>
          {(() => {
            const tags = [...new Set((journalText.match(/#[^\s#]+/g) || []).map(t => t.slice(1)))];
            if (tags.length === 0) return null;
            return (
              <div style={{display:'flex', flexWrap:'wrap', gap:4, paddingTop:8, marginTop:8, borderTop:'1px dashed var(--border)'}}>
                <span style={{fontSize:10, color:'var(--text-4)', alignSelf:'center', marginRight:4}}>오늘의 태그</span>
                {tags.map(t => (
                  <span key={t} className="tag-chip"
                    onClick={()=>setActiveTag(activeTag===t ? null : t)}
                    style={{cursor:'pointer', background: activeTag===t ? 'var(--accent)' : undefined, color: activeTag===t ? '#fff' : undefined, borderColor: activeTag===t ? 'var(--accent)' : undefined}}>
                    #{t}
                  </span>
                ))}
              </div>
            );
          })()}
          {activeTag && (() => {
            // 모든 날짜에서 #activeTag 들어간 줄 수집
            const re = new RegExp(`#${activeTag}(?![\\w\\uAC00-\\uD7A3])`, 'g');
            const matches = [];
            Object.entries(journals).forEach(([date, text]) => {
              if (typeof text !== 'string') return;
              text.split('\n').forEach((line, lineIdx) => {
                if (re.test(line)) matches.push({date, line: line.trim(), lineIdx});
                re.lastIndex = 0;
              });
            });
            // 날짜 내림차순 (최근이 위에)
            matches.sort((a,b) => b.date.localeCompare(a.date) || a.lineIdx - b.lineIdx);
            return (
              <div style={{marginTop:10, paddingTop:10, borderTop:'1px dashed var(--border)'}}>
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:6}}>

            <ReorderBtns idx={idx} />
            <span className="col-header-title">📊 이번 주</span>
          </span>
        </div>
        <div className="col-body">
          <div className="stat-grid">
            {[{n:doneWeek, l:'완료', c:'var(--green)'}, {n:`${Math.round(doneWeek/totalWeek*100)}%`, l:'완료율', c:'var(--text)'}, {n:doing.length, l:'진행중', c:'var(--accent)'}, {n:todo.length, l:'대기', c:'var(--text-3)'}].map((s,i)=>(
              <div key={i} className="stat-card">
                <div className="stat-num" style={{color:s.c}}>{s.n}</div>
                <div className="stat-label">{s.l}</div>
              </div>
            ))}
          </div>
          <div>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:5}}>
              <span style={{fontSize:11, color:'var(--text-3)'}}>완료율</span>
              <span style={{fontSize:11, color:'var(--green)', fontWeight:700}}>{Math.round(doneWeek/totalWeek*100)}%</span>
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width:`${Math.round(doneWeek/totalWeek*100)}%`, background:'var(--green)'}} />
            </div>
          </div>
          <div>
            <div style={{fontSize:10, color:'var(--text-4)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.5px', marginBottom:8}}>📈 주간 완료 추이 (평일)</div>
            {/* 스파크라인 바 차트 — 최근 8주 */}
            {(() => {
              const weeks = [
                {label:'2/24', count:3}, {label:'3/3', count:5}, {label:'3/10', count:2},
                {label:'3/17', count:7}, {label:'3/24', count:4}, {label:'3/31', count:6},
                {label:'4/7', count:8}, {label:'4/14', count:8},
              ];
              const max = Math.max(...weeks.map(w=>w.count));
              return (
                <div>
                  <div style={{display:'flex', alignItems:'flex-end', gap:4, height:48, marginBottom:4}}>
                    {weeks.map((w,i) => (
                      <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
                        <div style={{
                          width:'100%', borderRadius:'2px 2px 0 0',
                          height: `${Math.round((w.count/max)*44)}px`,
                          background: i===weeks.length-1 ? 'var(--accent)' : 'var(--border-2)',
                          minHeight:3, transition:'height .3s'
                        }} />
                      </div>
                    ))}
                  </div>
                  <div style={{display:'flex', gap:4}}>
                    {weeks.map((w,i) => (
                      <div key={i} style={{flex:1, fontSize:8, color: i===weeks.length-1?'var(--accent)':'var(--text-4)', textAlign:'center', overflow:'hidden'}}>{w.label}</div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {/* 평일 히트맵 (월~금) */}
            <div style={{marginTop:10}}>
              <div style={{fontSize:10, color:'var(--text-4)', fontWeight:600, letterSpacing:'.5px', marginBottom:5}}>🗓 최근 4주 평일</div>
              <div style={{display:'flex', gap:6}}>
                <div style={{display:'flex', flexDirection:'column', gap:3, paddingTop:1}}>
                  {['월','화','수','목','금'].map(d=>(
                    <div key={d} style={{fontSize:8, color:'var(--text-4)', height:10, lineHeight:'10px', textAlign:'right'}}>{d}</div>
                  ))}
                </div>
                <div style={{display:'flex', gap:3}}>
                  {Array.from({length:4}).map((_,w)=>(
                    <div key={w} style={{display:'flex', flexDirection:'column', gap:3}}>
                      {[3,2,1,2,3].map((lvl,d)=>{
                        const adj = (lvl + w) % 4;
                        return <div key={d} className={`heat-cell${adj?` heat-${Math.min(adj,3)}`:''}`} style={{width:10, height:10}} />;
                      })}
                    </div>
                  ))}
                </div>
              </div>

          {done.length > 0 && (
            <div>
              <div style={{fontSize:10, color:'var(--text-4)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.5px', marginBottom:4}}>오늘 완료</div>
              {done.slice(0,3).map(t=>(
                <div key={t.id} style={{fontSize:12, color:'var(--text-3)', padding:'3px 0', display:'flex', alignItems:'center', gap:6, textDecoration:'line-through'}}>
                  <span style={{color:'var(--green)'}}>✓</span>{t.title}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    ),
  };

  // 컬럼 너비 상태 (px). null이면 기본값 사용. 마지막 컬럼은 자동으로 나머지를 채움.
  const [colWidths, setColWidths] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('worklog.colWidths') || 'null');
      if (saved && typeof saved === 'object') return saved;
    } catch(e) {}
    return {}; // {focus: 420, journal: 600, stats: 260}
  });
  useEffect(() => { localStorage.setItem('worklog.colWidths', JSON.stringify(colWidths)); }, [colWidths]);

  const dashboardRef = useRef(null);
  const dragStateRef = useRef(null);
  const [draggingIdx, setDraggingIdx] = useState(null);

  function startResize(idx, e) {
    e.preventDefault();
    const grid = dashboardRef.current;
    if (!grid) return;
    const cols = grid.querySelectorAll(':scope > .col');
    const leftEl = cols[idx];
    const rightEl = cols[idx+1];
    if (!leftEl || !rightEl) return;
    dragStateRef.current = {
      idx, startX: e.clientX,
      leftKey: visibleCols[idx], rightKey: visibleCols[idx+1],
      leftStart: leftEl.getBoundingClientRect().width,
      rightStart: rightEl.getBoundingClientRect().width,
      isLastPair: idx + 1 === visibleCols.length - 1,
    };
    setDraggingIdx(idx);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    window.addEventListener('mousemove', onResize);
    window.addEventListener('mouseup', endResize);
  }
  function onResize(e) {
    const s = dragStateRef.current;
    if (!s) return;
    const dx = e.clientX - s.startX;
    const MIN = 200;
    const newLeft = Math.max(MIN, s.leftStart + dx);
    const newRight = Math.max(MIN, s.rightStart - dx);
    // 양쪽 모두 MIN을 넘길 때만 반영
    if (newLeft < MIN || newRight < MIN) return;
    setColWidths(prev => {
      const next = { ...prev, [s.leftKey]: newLeft };
      // 마지막 컬럼이 아니면 오른쪽도 px로 고정
      if (!s.isLastPair) next[s.rightKey] = newRight;
      return next;
    });
  }
  function endResize() {
    dragStateRef.current = null;
    setDraggingIdx(null);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    window.removeEventListener('mousemove', onResize);
    window.removeEventListener('mouseup', endResize);
  }
  function resetWidths() {
    setColWidths({});
  }

  // grid-template-columns 계산
  // 사용자가 지정한 폭: px / 그외: stats=260px, focus|journal=1fr (난임없이 차지)
  // 마지막엔 더 이상 핸들이 안 따라오므로, 마지막 컬럼은 px 저장이 있어도 1fr로 먹으며 나머지 점유(reset 필요 시 한계)
  // 다만 마지막 컬럼이 stats면 260을 기본값으로
  function colTrack(k, isLast) {
    if (isLast) {
      // 마지막 컬럼은 난머지 차지—사용자가 px로 디둔 게 있으면 존중 (단 마지막이 stats면 260 기본)
      if (colWidths[k]) return `${colWidths[k]}px`;
      return k === 'stats' ? '260px' : '1fr';
    }
    if (colWidths[k]) return `${colWidths[k]}px`;
    return k === 'stats' ? '260px' : '1fr';
  }
  const trackParts = [];
  colOrder.forEach((k, i) => {
    trackParts.push(colTrack(k, i === colOrder.length - 1));
    if (i < colOrder.length - 1) trackParts.push('5px'); // resizer
  });
  const gridCols = trackParts.join(' ');

  return (
    <div ref={dashboardRef} className="dashboard-grid" style={{gridTemplateColumns: gridCols}}>
      {colOrder.map((key, idx) => (
        <React.Fragment key={key}>
          {cols[key](idx)}
          {idx < colOrder.length - 1 && (
            <div
              className={`col-resizer${draggingIdx===idx?' dragging':''}`}
              onMouseDown={(e)=>startResize(idx, e)}
              onDoubleClick={resetWidths}
              title="드래그해서 너비 조절 · 더블클릭으로 초기화"
            />
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

function TaskCard({ task, onStatus, onDelete, onUpdate, projects = [] }) {
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(task);

  function startEdit() {
    setDraft({...task, note: task.note || ''});
    setEditing(true);
    setExpanded(true);
  }
  function saveEdit() {
    const title = (draft.title || '').trim();
    if (!title) return;
    onUpdate && onUpdate(task.id, {
      title,
      priority: draft.priority,
      project: draft.project || '',
      deadline: draft.deadline || '',
      note: (draft.note || '').trim(),
    });
    setEditing(false);
  }
  function cancelEdit() {
    setDraft(task);
    setEditing(false);
  }

  if (editing) {
    return (
      <div className="task-card" style={{borderLeft:`3px solid ${draft.priority==='A'?'var(--prio-a)':draft.priority==='B'?'var(--prio-b)':'var(--border-2)'}`, background:'var(--surface-2)'}}>
        <input autoFocus value={draft.title} onChange={e=>setDraft({...draft, title:e.target.value})}
          onKeyDown={e=>{ if(e.key==='Enter' && !e.nativeEvent.isComposing && e.keyCode!==229){ e.preventDefault(); saveEdit(); } if(e.key==='Escape'){ cancelEdit(); } }}
          style={{width:'100%', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'4px 6px', fontSize:13, fontFamily:'var(--font)', color:'var(--text)', background:'var(--surface)', outline:'none', fontWeight:600}} />
        <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', marginTop:6}}>
          <div className="prio-btns">
            {['A','B','C'].map(p => (
              <button key={p} className={`prio-btn${draft.priority===p?` sel-${p.toLowerCase()}`:''}`} onClick={()=>setDraft({...draft, priority:p})}>{p}</button>
            ))}
          </div>
          <select value={draft.project || ''} onChange={e=>setDraft({...draft, project:e.target.value})}
            style={{border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'2px 6px', fontSize:11, background:'var(--surface)', color: draft.project ? 'var(--text)' : 'var(--text-4)', fontFamily:'var(--font)', cursor:'pointer'}}>
            <option value="">📁 프로젝트</option>
            {projects.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
          <input type="date" value={draft.deadline || ''} onChange={e=>setDraft({...draft, deadline:e.target.value})}
            style={{border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'2px 5px', fontSize:11, background:'var(--surface)', color: draft.deadline ? 'var(--text)' : 'var(--text-4)', fontFamily:'var(--font)', cursor:'pointer'}} />
        </div>
        <textarea value={draft.note || ''} onChange={e=>setDraft({...draft, note:e.target.value})}
          placeholder="메모 (선택사항)..."
          style={{width:'100%', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'4px 6px', fontSize:11, fontFamily:'var(--font)', color:'var(--text-2)', background:'var(--surface)', outline:'none', resize:'vertical', minHeight:36, marginTop:6}} />
        <div className="task-card-actions" style={{marginTop:6}}>
          <button className="icon-btn done" onClick={saveEdit}>✓ 저장</button>
          <button className="icon-btn" onClick={cancelEdit}>취소</button>
          <span style={{marginLeft:'auto', fontSize:9, color:'var(--text-4)'}}>⏎ 저장 · Esc 취소</span>
        </div>
      </div>
    );
  }

  return (
    <div className="task-card" style={{borderLeft:`3px solid ${task.priority==='A'?'var(--prio-a)':task.priority==='B'?'var(--prio-b)':'var(--border-2)'}`}}>
      <div className="task-card-top">
        <div style={{flex:1, cursor:'text'}} onDoubleClick={startEdit} title="더블클릭해서 편집">
          <div className="task-card-title">{task.title}</div>
          <div className="task-card-meta" style={{marginTop:4}}>
            <span className={`badge-prio-${task.priority.toLowerCase()}`}>{task.priority}</span>
            {task.project && <span style={{fontSize:10, color:'var(--text-4)'}}>📁 {task.project}</span>}
            {task.deadline && <span style={{fontSize:10, color:isUrgent(task.deadline)?'var(--red)':'var(--text-4)'}}>📅 {fmt(task.deadline)}{isToday(task.deadline)?' (오늘!)':''}</span>}
          </div>
        </div>
      </div>
      {task.note && expanded && <div style={{fontSize:11, color:'var(--text-3)', background:'var(--surface-2)', borderRadius:3, padding:'4px 7px'}}>📌 {task.note}</div>}
      <div className="task-card-actions">
        <button className="icon-btn done" onClick={()=>onStatus(task.id,'DONE')}>✓ 완료</button>
        <button className="icon-btn" onClick={()=>onStatus(task.id,'TODO')}>⏸ 대기</button>
        {task.note && <button className="icon-btn" onClick={()=>setExpanded(!expanded)}>{expanded?'▲':'▼'} 메모</button>}
        <button className="icon-btn" onClick={startEdit} title="편집">✏️ 편집</button>
        <button className="icon-btn" style={{marginLeft:'auto', color:'var(--red)', borderColor:'transparent'}} onClick={()=>onDelete && onDelete(task.id)} title="삭제">✕</button>
      </div>
    </div>
  );
}

/* ─── SearchModal ─── */
function SearchModal({ tasks, onClose, onJumpDate }) {
  const [q, setQ] = React.useState('');
  const [activeTag, setActiveTag] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  const query = (activeTag ? `#${activeTag}` : q).trim().toLowerCase();

  const journalHits = !query ? [] : ALL_JOURNALS
    .map(j => {
      const idx = j.content.toLowerCase().indexOf(query);
      if (idx === -1) return null;
      const start = Math.max(0, idx - 30);
      const end   = Math.min(j.content.length, idx + query.length + 60);
      const snippet = (start > 0 ? '…' : '') + j.content.slice(start, end) + (end < j.content.length ? '…' : '');
      return { ...j, snippet, idx };
    })
    .filter(Boolean);

  const taskHits = !query ? [] : tasks.filter(t =>
    t.title.toLowerCase().includes(query) ||
    (t.note || '').toLowerCase().includes(query) ||
    (t.project || '').toLowerCase().includes(query)
  );

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp('(' + q.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
    const parts = text.split(re);
    return parts.map((p, i) => re.test(p) ? <mark key={i}>{p}</mark> : <span key={i}>{p}</span>);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()} style={{alignItems:'flex-start', paddingTop:80}}>
      <div className="modal" style={{width:640, maxHeight:'70vh', display:'flex', flexDirection:'column'}}>
        <div style={{padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:16, color:'var(--text-3)'}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e => { setQ(e.target.value); setActiveTag(null); }}
            placeholder="일지·Task에서 검색...  (예: 보고서, #개발, 미팅)"
            style={{flex:1, border:'none', outline:'none', background:'transparent', fontSize:14, color:'var(--text)', fontFamily:'var(--font)'}}
          />
          <span className="kbd" style={{fontSize:10, color:'var(--text-4)', border:'1px solid var(--border)', padding:'1px 5px', borderRadius:3}}>ESC</span>
        </div>

        {/* 자주 쓰는 태그 */}
        {!query && (
          <div style={{padding:'12px 18px', borderBottom:'1px solid var(--border)'}}>
            <div style={{fontSize:10, fontWeight:600, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:'.5px', marginBottom:8}}>자주 쓰는 태그</div>
            <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
              {TAG_FREQ.map(t => (
                <span key={t.tag} className="tag-chip lg" onClick={() => setActiveTag(t.tag)}>
                  #{t.tag} <span style={{opacity:.6, fontSize:10}}>{t.count}</span>
                </span>
              ))}
            </div>
          </div>
        )}

        <div style={{flex:1, overflow:'auto'}}>
          {query && journalHits.length === 0 && taskHits.length === 0 && (
            <div style={{padding:'40px 20px', textAlign:'center', fontSize:13, color:'var(--text-4)'}}>"{query}" 결과가 없어요</div>
          )}

          {journalHits.length > 0 && (
            <div>
              <div style={{padding:'10px 18px 6px', fontSize:10, fontWeight:700, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:'.5px', background:'var(--surface-2)'}}>📝 일지 ({journalHits.length})</div>
              {journalHits.map(j => (
                <div key={j.date} className="search-result-row" onClick={() => { onJumpDate && onJumpDate(j.date); onClose(); }}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <span style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>{j.date}</span>
                    <span style={{fontSize:10, color:'var(--text-4)'}}>일지로 이동 →</span>
                  </div>
                  <div className="search-snippet">{highlight(j.snippet, query)}</div>
                </div>
              ))}
            </div>
          )}

          {taskHits.length > 0 && (
            <div>
              <div style={{padding:'10px 18px 6px', fontSize:10, fontWeight:700, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:'.5px', background:'var(--surface-2)'}}>✓ Task ({taskHits.length})</div>
              {taskHits.map(t => (
                <div key={t.id} className="search-result-row">
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <span className={`badge badge-${t.priority.toLowerCase()}`} style={{fontSize:10}}>{t.priority}</span>
                    <span className={`badge badge-${t.status.toLowerCase()}`} style={{fontSize:10}}>{t.status}</span>
                    <span style={{fontSize:13, color:'var(--text-2)', flex:1}}>{highlight(t.title, query)}</span>
                  </div>
                  {(t.project || t.note) && (
                    <div className="search-snippet">
                      {t.project && <span>📁 {highlight(t.project, query)}  </span>}
                      {t.note && <span>📌 {highlight(t.note, query)}</span>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{padding:'8px 18px', borderTop:'1px solid var(--border)', fontSize:10, color:'var(--text-4)', display:'flex', gap:14}}>
          <span><span className="kbd" style={{border:'1px solid var(--border)', padding:'1px 5px', borderRadius:3, marginRight:4}}>↑↓</span> 이동</span>
          <span><span className="kbd" style={{border:'1px solid var(--border)', padding:'1px 5px', borderRadius:3, marginRight:4}}>Enter</span> 열기</span>
          <span style={{marginLeft:'auto'}}>#태그로 필터링 가능</span>
        </div>
      </div>
    </div>
  );
}

  const [brief, setBrief] = useState(null);
  useEffect(() => {
    let cancelled = false;
    GET('/api/brief')
      .then(b => { if (!cancelled) setBrief(b); })
      .catch(_ => {});
    return () => { cancelled = true; };
  }, [dataVersion]);

  function daysDiff(dateStr) {
    const diff = new Date(TODAY) - new Date(dateStr+'T00:00:00');
    return Math.floor(diff / 86400000);
  }

  /* 백엔드 결과가 있으면 그 목록을, 없으면 클라이언트 계산을 사용 */
  const doing     = tasks.filter(t => t.status === 'DOING');
  const urgent    = brief
    ? brief.urgent.map(normalizeTask)
    : tasks.filter(t => t.status !== 'DONE' && t.status !== 'CANCELLED' && t.deadline && t.deadline <= TODAY);
  const stale     = brief
    ? brief.stale.map(normalizeTask)
    : tasks.filter(t => ['TODO','DOING'].includes(t.status) && daysDiff(t.updatedAt) >= STALE_DAYS);
  const doneDone  = tasks.filter(t => t.status === 'DONE' && t.updatedAt === '2026-04-24');
  const undone    = tasks.filter(t => ['TODO','DOING'].includes(t.status));

  const prioIcon = p => ({ A:'🔴', B:'🟡', C:'⚪' }[p] || '⚪');
  const deadlineLabel = d => {
    if (!d) return '';
    if (d === TODAY) return ' ← 오늘 마감!';
    const tmrw = (() => {
      const dt = new Date(); dt.setDate(dt.getDate()+1);
      return dt.toISOString().slice(0,10);
    })();
    if (d === tmrw) return ' ← 내일 마감';
    return ` ← ${d}`;
  };

  const Card = ({ children, style }) => (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, padding:'18px 20px', boxShadow:'var(--shadow)', ...style }}>
      {children}
    </div>
  );
  const SectionTitle = ({ children }) => (
    <div style={{ fontSize:12, fontWeight:700, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'.5px', marginBottom:10 }}>{children}</div>
  );
  const Row = ({ children }) => (
    <div style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'5px 0', borderBottom:'1px solid var(--border)', fontSize:13 }}>{children}</div>
  );

  return (
    <div style={{ padding:24, overflow:'auto', height:'100%', display:'flex', flexDirection:'column', gap:16 }}>

      {/* 모닝 브리핑 */}
      <Card>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700 }}>📅 모닝 브리핑</div>
            <div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>{formatKoreanDate(TODAY)} · 09:00 자동 발송</div>
          </div>
          <span style={{ fontSize:11, background:'var(--green-light)', color:'var(--green)', padding:'3px 10px', borderRadius:99, fontWeight:600 }}>발송 완료</span>
        </div>

        {urgent.length > 0 && (
          <div style={{ background:'var(--red-light)', borderRadius:6, padding:'10px 12px', marginBottom:12, fontSize:13, color:'var(--red)' }}>
            <div style={{ fontWeight:700, marginBottom:6 }}>🔥 오늘 마감이라 DOING으로 옮겨뒀어요</div>
            {urgent.map(t => (
              <div key={t.id} style={{ paddingLeft:8 }}>{prioIcon(t.priority)} {t.title}</div>
            ))}
          </div>
        )}

        <SectionTitle>📌 오늘 포커스 ({doing.length}개{doing.length > 5 ? ' ⚠️ 좀 많아요' : ''})</SectionTitle>
        {doing.length === 0
          ? <div style={{ fontSize:13, color:'var(--text-3)', padding:'6px 0' }}>진행 중인 Task가 없어요. DOING으로 옮겨볼까요?</div>
          : doing.map(t => (
            <Row key={t.id}>
              <span>{prioIcon(t.priority)}</span>
              <span style={{ flex:1, color:'var(--text-2)' }}>{t.title}</span>
              <span style={{ fontSize:11, color: t.deadline && t.deadline <= TODAY ? 'var(--red)' : 'var(--text-4)' }}>{deadlineLabel(t.deadline)}</span>
            </Row>
          ))
        }

        {doneDone.length > 0 && (
          <div style={{ marginTop:12, fontSize:12, color:'var(--text-3)' }}>
            ✅ 어제 완료: <strong>{doneDone.length}개</strong> 수고하셨어요! 👏
          </div>
        )}

        {stale.length > 0 && (
          <div style={{ marginTop:14 }}>
            <SectionTitle>💬 혹시 이 Task들, 아직 진행 중인가요?</SectionTitle>
            {stale.slice(0,3).map(t => (
              <Row key={t.id}>
                <span style={{ color:'var(--text-4)' }}>·</span>
                <span style={{ flex:1, color:'var(--text-2)' }}>{t.title}</span>
                <span style={{ fontSize:11, color:'var(--amber)' }}>{daysDiff(t.updatedAt)}일째</span>
              </Row>
            ))}
            <div style={{ fontSize:12, color:'var(--text-3)', marginTop:8 }}>계속하실 거면 괜찮고, 완료·취소로 정리해두시면 깔끔해져요 😊</div>
          </div>
        )}
      </Card>

      {/* 퇴근 전 체크 */}
      <Card>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700 }}>✋ 퇴근 전 체크</div>
            <div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>오늘 17:30 예정</div>
          </div>
          <span style={{ fontSize:11, background:'var(--amber-light)', color:'var(--amber)', padding:'3px 10px', borderRadius:99, fontWeight:600 }}>대기 중</span>
        </div>

        <div style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.9 }}>
          <div>오늘 일지 작성 여부를 확인할게요.</div>
          <div style={{ color:'var(--text-3)', fontSize:12, marginTop:4 }}>
            미완료 Task <strong style={{ color:'var(--text-2)' }}>{undone.length}개</strong> · 오늘 마감 <strong style={{ color: urgent.length ? 'var(--red)' : 'var(--text-2)' }}>{urgent.length}개</strong>
          </div>
        </div>

        <div style={{ marginTop:14 }}>
          <SectionTitle>아직 못 끝낸 것들</SectionTitle>
          {undone.slice(0,4).map(t => (
            <Row key={t.id}>
              <span>{prioIcon(t.priority)}</span>
              <span style={{ flex:1, color:'var(--text-2)' }}>{t.title}</span>
              <span className={`badge badge-${t.status.toLowerCase()}`} style={{ fontSize:10 }}>{t.status}</span>
            </Row>
          ))}
          {undone.length > 4 && <div style={{ fontSize:12, color:'var(--text-4)', marginTop:6 }}>… 외 {undone.length-4}개 더</div>}
        </div>
        <div style={{ marginTop:12, fontSize:12, color:'var(--text-3)' }}>오늘 마무리할 것과 내일로 넘길 것 체크해두시면 좋아요!</div>
      </Card>

      {/* 다음 주간 브리핑 예고 */}
      <Card style={{ background:'var(--surface-2)', border:'1px dashed var(--border-2)' }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:6 }}>📊 다음 주간 브리핑</div>
        <div style={{ fontSize:12, color:'var(--text-3)', lineHeight:1.8 }}>
          <div>월요일 (4/27) 09:00에 이번 주 회고 + 다음 주 브리핑이 자동 발송돼요.</div>
          <div style={{ marginTop:6 }}>이번 주 마감: <strong>기획서 검토 (4/28)</strong> · <strong>월간 보고 (4/30)</strong></div>
        </div>
      </Card>
    </div>
  );
}
