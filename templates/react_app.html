function TaskCleanupView({ tasks, setTasks, onResume, refreshTasks }) {
  const toast = useToast();
  function daysDiff(dateStr) {
    return Math.floor((new Date(TODAY) - new Date(dateStr + 'T00:00:00')) / 86400000);
  }

  const stale = tasks.filter((t) => ['TODO', 'DOING'].includes(t.status) && daysDiff(t.updatedAt) >= 7);
  const cancelled = tasks.filter((t) => t.status === 'CANCELLED');

  async function setStatus(id, status) {
    const task = tasks.find((t) => t.id === id);
    setTasks((prev) => prev.map((t) => t.id === id ? { ...t, status, updatedAt: TODAY } : t));
    try {await POST(`/tasks/${id}/status`, { status });}
    catch (e) {console.error(e);refreshTasks && refreshTasks();}
    if (status === 'DOING' && task) {
      toast(`▶ "${task.title}" 진행 중으로 옮겼어요`, {
        kind: 'success',
        actionLabel: '대시보드 보기 →',
        onAction: () => onResume && onResume()
      });
    } else if (status === 'DONE' && task) {
      toast(`✓ "${task.title}" 완료 처리됐어요`, { kind: 'success' });
    }
  }
  async function deleteTask(id) {
    setTasks((prev) => prev.filter((t) => t.id !== id));
    try {await POST(`/tasks/${id}/delete`, {});}
    catch (e) {console.error(e);refreshTasks && refreshTasks();}
  }

  const prioIcon = (p) => ({ A: '🔴', B: '🟡', C: '⚪' })[p] || '⚪';

  const Section = ({ title, subtitle, children, empty }) =>
  <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, boxShadow: 'var(--shadow)', overflow: 'hidden' }}>
      <div style={{ padding: '14px 20px 10px', borderBottom: '1px solid var(--border)' }}>
        <div style={{ fontSize: 14, fontWeight: 700 }}>{title}</div>
        {subtitle && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{subtitle}</div>}
      </div>
      {children ?
    <div style={{ padding: '4px 0' }}>{children}</div> :
    <div style={{ padding: '20px', fontSize: 13, color: 'var(--text-4)', textAlign: 'center' }}>{empty}</div>
    }
    </div>;


  const TaskRow = ({ t, actions }) =>
  <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 20px', borderBottom: '1px solid var(--border)' }}>
      <span style={{ fontSize: 14 }}>{prioIcon(t.priority)}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, color: 'var(--text-2)', fontWeight: 500 }}>{t.title}</div>
        <div style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-4)', marginTop: 2, flexWrap: 'wrap' }}>
          {t.project && <span>📁 {t.project}</span>}
          {t.deadline && <span>📅 {t.deadline}</span>}
          {t.note && <span>📌 {t.note}</span>}
          <span style={{ color: 'var(--amber)' }}>⏱ {daysDiff(t.updatedAt)}일째 미변경</span>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>{actions}</div>
    </div>;


  const Btn = ({ onClick, children, color }) =>
  <button className="btn btn-sm" onClick={onClick} style={color ? { color } : {}}>{children}</button>;


  return (
    <div style={{ padding: 24, overflow: 'auto', height: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>

      {/* 요약 배너 */}
      {(stale.length > 0 || cancelled.length > 0) &&
      <div style={{ background: 'var(--amber-light)', border: '1px solid var(--amber)', borderRadius: 8, padding: '12px 16px', fontSize: 13, color: 'var(--amber)', display: 'flex', gap: 16 }}>
          {stale.length > 0 && <span>⏳ 방치 Task <strong>{stale.length}개</strong></span>}
          {cancelled.length > 0 && <span>✕ 취소됨 <strong>{cancelled.length}개</strong></span>}
          <span style={{ marginLeft: 'auto', color: 'var(--text-3)', fontSize: 12 }}>정리하면 브리핑이 더 깔끔해져요 😊</span>
        </div>
      }

      {/* 방치 Task */}
      <Section
        title="⏳ 방치된 Task"
        subtitle={`7일 이상 상태 변경 없는 Task · ${stale.length}개`}
        empty="방치된 Task가 없어요! 깔끔하네요 ✅">
        
        {stale.length > 0 && stale.map((t) =>
        <TaskRow key={t.id} t={t} actions={<>
            <Btn onClick={() => setStatus(t.id, 'DONE')} color="var(--green)">✓ 완료</Btn>
            <Btn onClick={() => setStatus(t.id, 'DOING')}>▶ 진행</Btn>
            <Btn onClick={() => setStatus(t.id, 'CANCELLED')} color="var(--red)">✕ 취소</Btn>
          </>} />
        )}
      </Section>

      {/* CANCELLED */}
      <Section
        title="✕ 취소된 Task"
        subtitle={`취소 처리된 Task · ${cancelled.length}개`}
        empty="취소된 Task가 없어요.">
        
        {cancelled.length > 0 && cancelled.map((t) =>
        <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 20px', borderBottom: '1px solid var(--border)', opacity: .75 }}>
            <span style={{ fontSize: 14 }}>{prioIcon(t.priority)}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, color: 'var(--text-3)', textDecoration: 'line-through' }}>{t.title}</div>
              <div style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-4)', marginTop: 2, flexWrap: 'wrap' }}>
                {t.project && <span>📁 {t.project}</span>}
                {t.note && <span>📌 {t.note}</span>}
                <span>{t.updatedAt} 취소</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
              <Btn onClick={() => setStatus(t.id, 'TODO')}>↩ 복구</Btn>
              <Btn onClick={() => deleteTask(t.id)} color="var(--red)">🗑 삭제</Btn>
            </div>
          </div>
        )}
      </Section>
    </div>);

}

/* ─── ProjectManager Modal ─── */
function ProjectManager({ projects, projectsRaw = [], setProjects, onClose, refreshProjects }) {
  const [input, setInput] = useState('');
  const [pickerFor, setPickerFor] = useState(null); // 색상 picker 열린 프로젝트 이름

  /* 추천 색상 팔레트 */
  const COLOR_SWATCHES = [
  '#6366f1', '#2563eb', '#0ea5e9', '#06b6d4', '#10b981', '#16a34a',
  '#84cc16', '#eab308', '#f59e0b', '#f97316', '#ef4444', '#dc2626',
  '#ec4899', '#d946ef', '#a855f7', '#7c3aed', '#64748b', '#475569'];


  async function add() {
    const name = input.trim();
    if (!name || projects.includes(name)) return;
    setProjects((prev) => [...prev, name]); // 낙관적
    setInput('');
    try {await POST('/api/projects/add', { name });refreshProjects && refreshProjects();}
    catch (e) {console.error(e);refreshProjects && refreshProjects();}
  }
  async function remove(p) {
    setProjects((prev) => prev.filter((x) => x !== p));
    const raw = projectsRaw.find((x) => x.name === p);
    if (!raw) {refreshProjects && refreshProjects();return;}
    try {await POST(`/api/projects/${raw.id}/delete`, {});refreshProjects && refreshProjects();}
    catch (e) {console.error(e);refreshProjects && refreshProjects();}
  }
  async function changeColor(p, color) {
    const raw = projectsRaw.find((x) => x.name === p);
    if (raw) PROJ_COLORS[p] = color; // 낙관적 (다음 렌더에서 반영)
    setPickerFor(null);
    if (!raw) return;
    try {await POST(`/api/projects/${raw.id}/color`, { color });refreshProjects && refreshProjects();}
    catch (e) {console.error(e);refreshProjects && refreshProjects();}
  }
  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 380 }}>
        <div className="modal-header">
          <div className="modal-title">📁 프로젝트 관리</div>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-3)', fontSize: 18 }} onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ display: 'flex', gap: 6 }}>
            <input
              style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '6px 10px', fontSize: 13, fontFamily: 'var(--font)', background: 'var(--surface)', color: 'var(--text)', outline: 'none' }}
              placeholder="새 프로젝트 이름..."
              value={input} onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && add()} />
            
            <button className="btn btn-primary btn-sm" onClick={add}>+ 추가</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginTop: 4 }}>
            {projects.map((p, i) => {
              const fallback = Object.values(PROJ_COLORS)[i % Object.values(PROJ_COLORS).length];
              const color = PROJ_COLORS[p] || fallback;
              const open = pickerFor === p;
              return (
                <div key={p} style={{ display: 'flex', flexDirection: 'column', background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 10px' }}>
                    <button
                      onClick={() => setPickerFor(open ? null : p)}
                      title="색상 변경"
                      style={{ width: 14, height: 14, borderRadius: '50%', background: color, border: '1px solid rgba(0,0,0,.1)', cursor: 'pointer', padding: 0 }} />
                    
                    <span style={{ flex: 1, fontSize: 13, color: 'var(--text-2)' }}>{p}</span>
                    <button className="icon-btn" style={{ color: 'var(--red)', borderColor: 'transparent' }} onClick={() => remove(p)}>✕</button>
                  </div>
                  {open &&
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, padding: '6px 10px 10px 10px', borderTop: '1px solid var(--border)' }}>
                      {COLOR_SWATCHES.map((c) =>
                    <button
                      key={c}
                      onClick={() => changeColor(p, c)}
                      title={c}
                      style={{ width: 18, height: 18, borderRadius: '50%', background: c, border: c === color ? '2px solid var(--text)' : '1px solid rgba(0,0,0,.1)', cursor: 'pointer', padding: 0 }} />

                    )}
                    </div>
                  }
                </div>);

            })}
          </div>
        </div>
        <div className="modal-footer" style={{ justifyContent: 'flex-end' }}>
          <button className="btn btn-primary" onClick={onClose}>완료</button>
        </div>
      </div>
    </div>);

}

/* ─── Toast Context ─── */
const ToastCtx = React.createContext(null);
function useToast() {return React.useContext(ToastCtx);}

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const show = React.useCallback((msg, opts = {}) => {
    const id = Date.now() + Math.random();
    setToasts((t) => [...t, { id, msg, ...opts }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), opts.duration || 3500);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="toast-stack">
        {toasts.map((t) =>
        <div key={t.id} className={`toast ${t.kind === 'success' ? 'toast-success' : ''}`}>
            <span>{t.msg}</span>
            {t.actionLabel && <span className="toast-action" onClick={() => {t.onAction && t.onAction();}}>{t.actionLabel}</span>}
          </div>
        )}
      </div>
    </ToastCtx.Provider>);

}

function TweaksUI({ values, setTweak }) {
  React.useEffect(() => {
    const root = document.documentElement;
    if (values.mood && values.mood !== 'paper') root.setAttribute('data-mood', values.mood);else
    root.removeAttribute('data-mood');
    if (values.density && values.density !== 'standard') root.setAttribute('data-density', values.density);else
    root.removeAttribute('data-density');
    if (values.voice && values.voice !== 'neutral') root.setAttribute('data-voice', values.voice);else
    root.removeAttribute('data-voice');
  }, [values.mood, values.density, values.voice]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Mood" />
      <TweakRadio label="Palette" value={values.mood}
      options={[
      { value: 'paper', label: 'Paper' },
      { value: 'graphite', label: 'Graphite' },
      { value: 'lab', label: 'Lab' }]
      }
      onChange={(v) => setTweak('mood', v)} />
      <div style={{ fontSize: 10, color: 'rgba(41,38,27,.5)', lineHeight: 1.5, marginTop: -4 }}>
        {values.mood === 'paper' && 'Warm beige · indigo accent · journal-on-paper'}
        {values.mood === 'graphite' && 'Cool ink-on-newsprint · charcoal accent'}
        {values.mood === 'lab' && 'Clinical white · electric mint accent · max contrast'}
      </div>

      <TweakSection label="Density" />
      <TweakRadio label="Layout" value={values.density}
      options={[
      { value: 'cozy', label: 'Cozy' },
      { value: 'standard', label: 'Default' },
      { value: 'compact', label: 'Compact' }]
      }
      onChange={(v) => setTweak('density', v)} />
      <div style={{ fontSize: 10, color: 'rgba(41,38,27,.5)', lineHeight: 1.5, marginTop: -4 }}>
        {values.density === 'cozy' && 'Breathable journal · larger type, taller rows'}
        {values.density === 'standard' && 'Balanced dashboard'}
        {values.density === 'compact' && 'Ops-console density · everything on one screen'}
      </div>

      <TweakSection label="Voice" />
      <TweakRadio label="Personality" value={values.voice}
      options={[
      { value: 'soft', label: 'Soft' },
      { value: 'neutral', label: 'Neutral' },
      { value: 'terminal', label: 'Terminal' }]
      }
      onChange={(v) => setTweak('voice', v)} />
      <div style={{ fontSize: 10, color: 'rgba(41,38,27,.5)', lineHeight: 1.5, marginTop: -4 }}>
        {values.voice === 'soft' && 'Serif headings · pill buttons · gentle radii'}
        {values.voice === 'neutral' && 'Inter sans · the original house style'}
        {values.voice === 'terminal' && 'Mono everywhere · brackets, hashes, sharp corners'}
      </div>
    </TweaksPanel>);

}

/* ─── App ─── */

function BoardView({ tasks, projects = [], refreshTasks }) {
  const toast = useToast();
  const [typeTab,     setTypeTab]     = useState('ALL');
  const [projFilter,  setProjFilter]  = useState('전체');
  const [statusFilter,setStatusFilter]= useState('open');
  const [prioFilter,  setPrioFilter]  = useState('전체');
  const [editingId,   setEditingId]   = useState(null);

  const TYPE_TABS = [
    { key: 'ALL',      label: '전체' },
    { key: 'TASK',     label: '📌 Task' },
    { key: 'WAITING',  label: '⏳ 대기' },
    { key: 'ISSUE',    label: '⚠ 이슈' },
    { key: 'DECISION', label: '✅ 결정' },
    { key: 'FOLLOWUP', label: '🔁 팔로업' },
  ];
  const STATUS_OPTS = [
    { key: 'open',      label: '열린 항목' },
    { key: 'done',      label: '완료됨' },
    { key: 'cancelled', label: '취소됨' },
    { key: 'all',       label: '전체' },
  ];

  const filtered = tasks.filter((t) => {
    const ty = t.type || 'TASK';
    if (typeTab !== 'ALL' && ty !== typeTab) return false;
    if (projFilter !== '전체' && t.project !== projFilter) return false;
    if (statusFilter === 'open'      && !['TODO','DOING'].includes(t.status)) return false;
    if (statusFilter === 'done'      && t.status !== 'DONE') return false;
    if (statusFilter === 'cancelled' && t.status !== 'CANCELLED') return false;
    if (prioFilter !== '전체' && t.priority !== prioFilter) return false;
    return true;
  }).sort((a, b) => {
    const ps = { A: 1, B: 2, C: 3 };
    const pd = (ps[a.priority] || 2) - (ps[b.priority] || 2);
    if (pd !== 0) return pd;
    if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
    if (a.deadline) return -1;
    if (b.deadline) return 1;
    return (b.updatedAt || '').localeCompare(a.updatedAt || '');
  });

  const openCount = tasks.filter((t) => {
    const ty = t.type || 'TASK';
    if (typeTab !== 'ALL' && ty !== typeTab) return false;
    if (projFilter !== '전체' && t.project !== projFilter) return false;
    return ['TODO','DOING'].includes(t.status);
  }).length;

  async function setStatus(id, status, extra = {}) {
    try {
      await POST(`/api/tasks/${id}/status`, { status });
      if (extra.resolved_at) await POST(`/api/tasks/${id}/edit`, { resolved_at: extra.resolved_at });
      await refreshTasks();
      const labels = { DONE: '완료', DOING: '진행 시작', TODO: '대기로 변경', CANCELLED: '취소' };
      toast(labels[status] || '상태 변경됨', { kind: 'success' });
    } catch (e) { toast(`⚠ 오류: ${e.message}`); }
  }
  async function deleteItem(id) {
    try { await POST(`/api/tasks/${id}/delete`, {}); await refreshTasks(); toast('삭제됨', { kind: 'success' }); }
    catch (e) { toast('⚠ 삭제 실패'); }
  }
  async function updateItem(id, patch) {
    try { await POST(`/api/tasks/${id}/edit`, patch); await refreshTasks(); }
    catch (e) { toast('⚠ 수정 실패'); }
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>

      {/* ── Type 탭 ── */}
      <div style={{ padding: '10px 16px 0', borderBottom: '1px solid var(--border)', background: 'var(--surface)', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2 }}>
          {TYPE_TABS.map(({ key, label }) => (
            <button key={key} onClick={() => setTypeTab(key)} style={{
              padding: '6px 12px', fontSize: 12, fontWeight: typeTab === key ? 700 : 400,
              background: 'none', border: 'none', borderBottom: typeTab === key ? '2px solid var(--accent)' : '2px solid transparent',
              cursor: 'pointer', color: typeTab === key ? 'var(--text)' : 'var(--text-3)',
              fontFamily: 'var(--font)', borderRadius: '4px 4px 0 0', transition: 'color .12s',
            }}>{label}</button>
          ))}
          <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-4)', paddingBottom: 6 }}>
            열린 항목 {openCount}개
          </span>
        </div>
      </div>

      {/* ── 필터 바 ── */}
      <div style={{ padding: '7px 16px', borderBottom: '1px solid var(--border)', background: 'var(--surface-2)', display: 'flex', gap: 10, alignItems: 'center', flexShrink: 0, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: 'var(--text-4)', flexShrink: 0 }}>프로젝트</span>
          {['전체', ...projects].map((p) => (
            <div key={p} className={`filter-chip${projFilter === p ? ' active' : ''}`} onClick={() => setProjFilter(p)}>{p}</div>
          ))}
        </div>
        <div style={{ width: 1, height: 14, background: 'var(--border)', flexShrink: 0 }} />
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: 'var(--text-4)', flexShrink: 0 }}>상태</span>
          {STATUS_OPTS.map(({ key, label }) => (
            <div key={key} className={`filter-chip${statusFilter === key ? ' active' : ''}`} onClick={() => setStatusFilter(key)}>{label}</div>
          ))}
        </div>
        <div style={{ width: 1, height: 14, background: 'var(--border)', flexShrink: 0 }} />
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: 'var(--text-4)', flexShrink: 0 }}>우선순위</span>
          {['전체', 'A', 'B', 'C'].map((p) => (
            <div key={p} className={`filter-chip${prioFilter === p ? ' active' : ''}`} onClick={() => setPrioFilter(p)}>{p}</div>
          ))}
        </div>
      </div>

      {/* ── 아이템 목록 ── */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 16px', display: 'flex', flexDirection: 'column', gap: 5 }}>
        {filtered.length === 0 && (
          <div className="empty-state">
            <div className="es-emoji">{statusFilter === 'open' ? '🎉' : '🗃️'}</div>
            <div className="es-title">{statusFilter === 'open' ? '열린 항목이 없어요' : '표시할 항목이 없어요'}</div>
            <div className="es-sub">{statusFilter === 'open' ? '다 비웠네요. 오늘은 여기까지! 👏' : '필터를 바꾸면 다른 항목을 볼 수 있어요.'}</div>
          </div>
        )}
        {filtered.map((task) => (
          <BoardItemCard key={task.id} task={task} projects={projects}
            onStatus={setStatus} onDelete={deleteItem} onUpdate={updateItem}
            editing={editingId === task.id}
            onEdit={() => setEditingId(task.id)}
            onEditDone={() => setEditingId(null)}
          />
        ))}
      </div>
    </div>
  );
}

/* ─── Board Item Card ─── */
function BoardItemCard({ task, projects = [], onStatus, onDelete, onUpdate, editing, onEdit, onEditDone }) {
  const [draft, setDraft] = useState({ ...task });
  const itemType = task.type || 'TASK';
  const typeMeta = TYPE_META[itemType] || TYPE_META.TASK;
  const dlLabel  = typeMeta.deadlineLabel;

  function saveEdit() {
    const title = (draft.title || '').trim();
    if (!title) return;
    onUpdate && onUpdate(task.id, {
      title, priority: draft.priority,
      project: draft.project || '',
      deadline: draft.deadline || null,
      note: (draft.note || '').trim(),
      waiting_for: draft.waitingFor || null,
    });
    onEditDone && onEditDone();
  }

  /* ── 편집 모드 ── */
  if (editing) {
    return (
      <div className="task-card" style={{ borderLeft: `3px solid ${draft.priority === 'A' ? 'var(--prio-a)' : draft.priority === 'B' ? 'var(--prio-b)' : 'var(--border-2)'}`, background: 'var(--surface-2)' }}>
        <input autoFocus value={draft.title || ''} onChange={(e) => setDraft({ ...draft, title: e.target.value })}
          onKeyDown={(e) => { if (e.key === 'Enter' && !e.nativeEvent.isComposing && e.keyCode !== 229) { e.preventDefault(); saveEdit(); } if (e.key === 'Escape') { setDraft({ ...task }); onEditDone(); } }}
          style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '4px 6px', fontSize: 13, fontFamily: 'var(--font)', color: 'var(--text)', background: 'var(--surface)', outline: 'none', fontWeight: 600 }} />
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 6, alignItems: 'center' }}>
          <div className="prio-btns">
            {['A', 'B', 'C'].map((p) => (
              <button key={p} className={`prio-btn${draft.priority === p ? ` sel-${p.toLowerCase()}` : ''}`} onClick={() => setDraft({ ...draft, priority: p })}>{p}</button>
            ))}
          </div>
          <select value={draft.project || ''} onChange={(e) => setDraft({ ...draft, project: e.target.value })}
            style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 6px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', cursor: 'pointer' }}>
            <option value="">📁 프로젝트</option>
            {projects.map((p) => <option key={p} value={p}>{p}</option>)}
          </select>
          <input type="date" value={draft.deadline || ''} onChange={(e) => setDraft({ ...draft, deadline: e.target.value })}
            style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 5px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', cursor: 'pointer' }} />
          {(itemType === 'WAITING' || itemType === 'FOLLOWUP') && (
            <input value={draft.waitingFor || ''} onChange={(e) => setDraft({ ...draft, waitingFor: e.target.value })}
              placeholder="@대상자" style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 6px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', width: 84 }} />
          )}
        </div>
        {/* 메모 */}
        <textarea value={draft.note || ''} onChange={(e) => setDraft({ ...draft, note: e.target.value })}
          placeholder="메모..." style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '4px 6px', fontSize: 11, fontFamily: 'var(--font)', color: 'var(--text-2)', background: 'var(--surface)', outline: 'none', resize: 'vertical', minHeight: 32, marginTop: 6 }} />
        <div className="task-card-actions" style={{ marginTop: 6 }}>
          <button className="icon-btn done" onClick={saveEdit}>✓ 저장</button>
          <button className="icon-btn" onClick={() => { setDraft({ ...task }); onEditDone(); }}>취소</button>
          <span style={{ marginLeft: 'auto', fontSize: 9, color: 'var(--text-4)' }}>⏎ 저장 · Esc 취소</span>
        </div>
      </div>
    );
  }

  /* ── 읽기 모드 ── */
  const statusDotColor = { TODO: 'var(--text-4)', DOING: 'var(--accent)', DONE: 'var(--green)', CANCELLED: 'var(--border-2)' }[task.status] || 'var(--text-4)';
  const isDone       = task.status === 'DONE';
  const isCancelled  = task.status === 'CANCELLED';

  return (
    <div className="task-card" style={{ borderLeft: `3px solid ${task.priority === 'A' ? 'var(--prio-a)' : task.priority === 'B' ? 'var(--prio-b)' : 'var(--border-2)'}`, opacity: (isDone || isCancelled) ? 0.72 : 1 }}>
      <div className="task-card-top">
        <div style={{ flex: 1, cursor: 'text' }} onDoubleClick={onEdit} title="더블클릭해서 편집">
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span title={task.status} style={{ width: 7, height: 7, borderRadius: '50%', background: statusDotColor, flexShrink: 0, marginTop: 1, display: 'inline-block' }} />
            <div className="task-card-title" style={{ textDecoration: isCancelled ? 'line-through' : 'none', color: (isDone || isCancelled) ? 'var(--text-3)' : 'var(--text)' }}>
              {task.title}
            </div>
          </div>
          <div className="task-card-meta" style={{ marginTop: 4, paddingLeft: 13 }}>
            {/* type badge — TASK는 생략 */}
            {itemType !== 'TASK' && (
              <span className={`badge-type ${typeMeta.cls}`}>{typeMeta.icon} {typeMeta.label}</span>
            )}
            <span className={`badge-prio-${task.priority.toLowerCase()}`}>{task.priority}</span>
            {task.project && <span style={{ fontSize: 10, color: 'var(--text-4)' }}>📁 {task.project}</span>}
            {task.waitingFor && <span style={{ fontSize: 10, color: 'var(--text-3)' }}>👤 {task.waitingFor}</span>}
            {task.deadline && (
              <span style={{ fontSize: 10, color: isUrgent(task.deadline) && !isDone ? 'var(--red)' : 'var(--text-4)' }}>
                {dlLabel} {fmt(task.deadline)}{isToday(task.deadline) && !isDone ? ' (오늘!)' : ''}
              </span>
            )}
            {task.status === 'DOING' && <span style={{ fontSize: 10, color: 'var(--accent)', fontWeight: 600 }}>▶ 진행중</span>}
          </div>
          {task.note && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 4, paddingLeft: 13 }}>📌 {task.note}</div>}
        </div>
      </div>

      <div className="task-card-actions">
        {/* ── 타입별 주요 액션 ── */}
        {itemType === 'TASK' && !isDone && !isCancelled && <>
          <button className="icon-btn done" onClick={() => onStatus(task.id, 'DONE')}>✓ 완료</button>
          <button className="icon-btn" onClick={() => onStatus(task.id, task.status === 'DOING' ? 'TODO' : 'DOING')}>
            {task.status === 'DOING' ? '⏸ 대기' : '▶ 시작'}
          </button>
        </>}

        {itemType === 'WAITING' && !isDone && !isCancelled && <>
          <button className="icon-btn done" onClick={() => onStatus(task.id, 'DONE')}>✓ 회신받음</button>
          {/* TODO: [팔로업으로 전환] — Inbox 2단계에서 구현 */}
        </>}

        {itemType === 'ISSUE' && !isDone && !isCancelled && <>
          <button className="icon-btn done" onClick={() => onStatus(task.id, 'DONE', { resolved_at: new Date().toISOString().slice(0, 10) })}>🔧 해결</button>
          {task.status !== 'DOING' && (
            <button className="icon-btn" onClick={() => onStatus(task.id, 'DOING')}>▶ 진행</button>
          )}
        </>}

        {itemType === 'FOLLOWUP' && !isDone && !isCancelled && <>
          <button className="icon-btn done" onClick={() => onStatus(task.id, 'DONE')}>✓ 완료</button>
          <button className="icon-btn" onClick={onEdit} title="날짜 수정">📅 연기</button>
        </>}

        {/* DECISION: 기록성 항목 — 편집/삭제 중심. TODO: 관련 Task 만들기 (Inbox 2단계) */}

        {/* 공통 */}
        <button className="icon-btn" onClick={onEdit}>✏️ 편집</button>
        <button className="icon-btn" style={{ marginLeft: 'auto', color: 'var(--red)', borderColor: 'transparent' }} onClick={() => onDelete(task.id)} title="삭제">✕</button>
      </div>
    </div>
  );
}

/* ─── Inbox View ───────────────────────────────────────────────────────────────
   후보 기준 (4가지, 중복 허용 → 합산 후 dedup):
   1. confirmed = 0          — 미확인 항목
   2. project 없음 / 미분류  — 분류 안 된 항목 (active 상태만)
   3. A/B 우선순위인데 deadline 없음 (active)
   4. type = WAITING & waiting_for 비어 있음 (active)
   ─────────────────────────────────────────────────────────────────────────── */
function InboxView({ tasks, projects = [], refreshTasks }) {
  const toast = useToast();
  const [filterKey,  setFilterKey]  = useState('all');
  const [editingId,  setEditingId]  = useState(null);

  const active = tasks.filter((t) => !['DONE', 'CANCELLED'].includes(t.status));

  const buckets = {
    unconfirmed:  tasks.filter((t) => t.confirmed === 0),
    unclassified: active.filter((t) => !t.project || t.project === '미분류'),
    noDeadline:   active.filter((t) => ['A', 'B'].includes(t.priority) && !t.deadline),
    noWaitingFor: active.filter((t) => t.type === 'WAITING' && !t.waitingFor),
  };

  /* 전체 = 4 버킷 합산 dedup */
  const allInbox = [...new Map(
    [...buckets.unconfirmed, ...buckets.unclassified,
     ...buckets.noDeadline,  ...buckets.noWaitingFor].map((t) => [t.id, t])
  ).values()];

  const filtered =
    filterKey === 'unconfirmed'  ? buckets.unconfirmed  :
    filterKey === 'unclassified' ? buckets.unclassified :
    filterKey === 'noDeadline'   ? buckets.noDeadline   :
    filterKey === 'noWaitingFor' ? buckets.noWaitingFor :
    allInbox;

  const FILTERS = [
    { key: 'all',          label: `전체`,          count: allInbox.length },
    { key: 'unconfirmed',  label: `확인 필요`,     count: buckets.unconfirmed.length },
    { key: 'unclassified', label: `미분류`,        count: buckets.unclassified.length },
    { key: 'noDeadline',   label: `날짜 없음`,     count: buckets.noDeadline.length },
    { key: 'noWaitingFor', label: `대기 대상 없음`, count: buckets.noWaitingFor.length },
  ];

  async function confirmItem(id) {
    try {
      await POST(`/api/tasks/${id}/edit`, { confirmed: 1 });
      await refreshTasks();
      toast('✓ 확정됨', { kind: 'success' });
    } catch (e) { toast('⚠ 오류: ' + e.message); }
  }
  async function ignoreItem(id) {
    try {
      await POST(`/api/tasks/${id}/status`, { status: 'CANCELLED' });
      await refreshTasks();
      toast('무시됨');
    } catch (e) { toast('⚠ 오류: ' + e.message); }
  }
  async function updateItem(id, patch) {
    try { await POST(`/api/tasks/${id}/edit`, patch); await refreshTasks(); }
    catch (e) { toast('⚠ 수정 실패'); }
  }

  /* 어떤 버킷에 속하는지 이유 태그 */
  function reasonTags(task) {
    const tags = [];
    if (task.confirmed === 0)                                             tags.push({ label: '확인 필요', color: 'var(--amber)' });
    if (!task.project || task.project === '미분류')                       tags.push({ label: '미분류',    color: 'var(--accent-text)' });
    if (['A','B'].includes(task.priority) && !task.deadline)              tags.push({ label: '날짜 없음', color: 'var(--red)' });
    if (task.type === 'WAITING' && !task.waitingFor)                      tags.push({ label: '대상 없음', color: 'var(--text-3)' });
    return tags;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>

      {/* ── 요약 카드 ── */}
      <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', background: 'var(--surface)', flexShrink: 0 }}>
        <div style={{ display: 'flex', gap: 8 }}>
          {[
            { label: '확인 필요',     count: buckets.unconfirmed.length,  color: 'var(--amber)' },
            { label: '미분류',        count: buckets.unclassified.length, color: 'var(--accent)' },
            { label: '날짜 없음',     count: buckets.noDeadline.length,   color: 'var(--red)' },
            { label: '대기 대상 없음', count: buckets.noWaitingFor.length, color: 'var(--text-3)' },
          ].map(({ label, count, color }) => (
            <div key={label} style={{ flex: 1, background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '8px 10px', minWidth: 0 }}>
              <div style={{ fontSize: 20, fontWeight: 700, color, lineHeight: 1.2 }}>{count}</div>
              <div style={{ fontSize: 10, color: 'var(--text-4)', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── 필터 chips ── */}
      <div style={{ padding: '7px 16px', borderBottom: '1px solid var(--border)', background: 'var(--surface-2)', display: 'flex', gap: 5, flexShrink: 0, flexWrap: 'wrap', alignItems: 'center' }}>
        {FILTERS.map(({ key, label, count }) => (
          <div key={key} className={`filter-chip${filterKey === key ? ' active' : ''}`}
            onClick={() => setFilterKey(key)}>
            {label}{count > 0 ? ` (${count})` : ''}
          </div>
        ))}
        {allInbox.length === 0 && (
          <span style={{ fontSize: 11, color: 'var(--green)', marginLeft: 6 }}>Inbox가 비어 있어요 ✨</span>
        )}
      </div>

      {/* ── 아이템 목록 ── */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 16px', display: 'flex', flexDirection: 'column', gap: 5 }}>
        {filtered.length === 0 && (
          <div className="empty-state">
            <div className="es-emoji">✨</div>
            <div className="es-title">이 범주는 깔끈해요</div>
            <div className="es-sub">처리할 항목이 없어요. 잘하고 있어요!</div>
          </div>
        )}
        {filtered.map((task) => (
          <InboxItemCard key={task.id} task={task} projects={projects}
            reasons={reasonTags(task)}
            onConfirm={confirmItem} onIgnore={ignoreItem} onUpdate={updateItem}
            editing={editingId === task.id}
            onEdit={() => setEditingId(task.id)}
            onEditDone={() => setEditingId(null)}
          />
        ))}
      </div>
    </div>
  );
}

/* ─── Inbox Item Card ─── */
function InboxItemCard({ task, projects = [], reasons = [], onConfirm, onIgnore, onUpdate, editing, onEdit, onEditDone }) {
  const [draft, setDraft] = useState({ ...task });
  const itemType = task.type || 'TASK';
  const typeMeta = TYPE_META[itemType] || TYPE_META.TASK;

  function saveEdit() {
    const title = (draft.title || '').trim();
    if (!title) return;
    onUpdate && onUpdate(task.id, {
      title,
      priority:    draft.priority,
      project:     draft.project     || '',
      deadline:    draft.deadline    || null,
      note:        (draft.note || '').trim(),
      type:        draft.type        || 'TASK',
      waiting_for: draft.waitingFor  || null,
    });
    onEditDone && onEditDone();
  }

  /* ── 편집 모드 ── */
  if (editing) {
    const TYPE_OPTIONS = ['TASK', 'WAITING', 'DECISION', 'ISSUE', 'FOLLOWUP'];
    return (
      <div className="task-card" style={{ borderLeft: `3px solid ${draft.priority === 'A' ? 'var(--prio-a)' : draft.priority === 'B' ? 'var(--prio-b)' : 'var(--border-2)'}`, background: 'var(--surface-2)' }}>
        <input autoFocus value={draft.title || ''} onChange={(e) => setDraft({ ...draft, title: e.target.value })}
          onKeyDown={(e) => { if (e.key === 'Enter' && !e.nativeEvent.isComposing && e.keyCode !== 229) { e.preventDefault(); saveEdit(); } if (e.key === 'Escape') { setDraft({ ...task }); onEditDone(); } }}
          style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '4px 6px', fontSize: 13, fontFamily: 'var(--font)', color: 'var(--text)', background: 'var(--surface)', outline: 'none', fontWeight: 600 }} />
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 6, alignItems: 'center' }}>
          {/* type 변경 */}
          <select value={draft.type || 'TASK'} onChange={(e) => setDraft({ ...draft, type: e.target.value })}
            style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 6px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', cursor: 'pointer' }}>
            {TYPE_OPTIONS.map((t) => <option key={t} value={t}>{TYPE_META[t]?.icon || ''} {TYPE_META[t]?.label || t}</option>)}
          </select>
          <div className="prio-btns">
            {['A', 'B', 'C'].map((p) => (
              <button key={p} className={`prio-btn${draft.priority === p ? ` sel-${p.toLowerCase()}` : ''}`} onClick={() => setDraft({ ...draft, priority: p })}>{p}</button>
            ))}
          </div>
          <select value={draft.project || ''} onChange={(e) => setDraft({ ...draft, project: e.target.value })}
            style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 6px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', cursor: 'pointer' }}>
            <option value="">📁 프로젝트 선택</option>
            {projects.map((p) => <option key={p} value={p}>{p}</option>)}
          </select>
          <input type="date" value={draft.deadline || ''} onChange={(e) => setDraft({ ...draft, deadline: e.target.value })}
            style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 5px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', cursor: 'pointer' }} />
          {(draft.type === 'WAITING' || draft.type === 'FOLLOWUP') && (
            <input value={draft.waitingFor || ''} onChange={(e) => setDraft({ ...draft, waitingFor: e.target.value })}
              placeholder="@대상자" style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '2px 6px', fontSize: 11, background: 'var(--surface)', color: 'var(--text)', fontFamily: 'var(--font)', width: 80 }} />
          )}
        </div>
        <div className="task-card-actions" style={{ marginTop: 6 }}>
          <button className="icon-btn done" onClick={saveEdit}>✓ 저장</button>
          <button className="icon-btn" onClick={() => { setDraft({ ...task }); onEditDone(); }}>취소</button>
          <span style={{ marginLeft: 'auto', fontSize: 9, color: 'var(--text-4)' }}>⏎ 저장 · Esc 취소</span>
        </div>
      </div>
    );
  }

  /* ── 읽기 모드 ── */
  return (
    <div className="task-card" style={{ borderLeft: `3px solid ${task.priority === 'A' ? 'var(--prio-a)' : task.priority === 'B' ? 'var(--prio-b)' : 'var(--border-2)'}` }}>
      <div className="task-card-top">
        <div style={{ flex: 1, cursor: 'text' }} onDoubleClick={onEdit} title="더블클릭해서 편집">
          <div className="task-card-title">{task.title}</div>
          <div className="task-card-meta" style={{ marginTop: 3 }}>
            {/* type badge */}
            {itemType !== 'TASK' && (
              <span className={`badge-type ${typeMeta.cls}`}>{typeMeta.icon} {typeMeta.label}</span>
            )}
            <span className={`badge-prio-${task.priority.toLowerCase()}`}>{task.priority}</span>
            {task.project
              ? <span style={{ fontSize: 10, color: 'var(--text-4)' }}>📁 {task.project}</span>
              : <span style={{ fontSize: 10, color: 'var(--amber)', fontStyle: 'italic' }}>📁 미분류</span>}
            {task.waitingFor && <span style={{ fontSize: 10, color: 'var(--text-3)' }}>👤 {task.waitingFor}</span>}
            {task.deadline
              ? <span style={{ fontSize: 10, color: isUrgent(task.deadline) ? 'var(--red)' : 'var(--text-4)' }}>{typeMeta.deadlineLabel} {fmt(task.deadline)}</span>
              : ['A','B'].includes(task.priority) && <span style={{ fontSize: 10, color: 'var(--amber)', fontStyle: 'italic' }}>날짜 없음</span>}
          </div>
          {/* 이유 태그 */}
          {reasons.length > 0 && (
            <div style={{ display: 'flex', gap: 4, marginTop: 4, flexWrap: 'wrap' }}>
              {reasons.map(({ label, color }) => (
                <span key={label} style={{ fontSize: 9, padding: '1px 5px', borderRadius: 3, background: 'var(--surface-2)', border: '1px solid var(--border)', color, fontWeight: 600, letterSpacing: '-0.1px' }}>
                  {label}
                </span>
              ))}
            </div>
          )}
          {/* source_text — 자동감지 원문 (현재는 slash 명령에서 미입력, 향후 자동감지 시 표시) */}
          {task.sourceText && (
            <div style={{ fontSize: 10, color: 'var(--text-4)', marginTop: 3, padding: '2px 6px', background: 'var(--surface-2)', borderRadius: 3, fontStyle: 'italic', borderLeft: '2px solid var(--border-2)' }}>
              "{task.sourceText}"
            </div>
          )}
        </div>
      </div>

      <div className="task-card-actions">
        <button className="icon-btn done" onClick={() => onConfirm(task.id)} title="이 항목을 확정 처리합니다">✓ 확정</button>
        <button className="icon-btn" onClick={onEdit}>✏️ 편집</button>
        <button className="icon-btn" style={{ color: 'var(--text-3)' }} onClick={() => onIgnore(task.id)} title="무시 (취소 처리)">✕ 무시</button>
        {/* TODO: [Board에서 보기] — 2단계에서 구현 */}
      </div>
    </div>
  );
}

/* ─── 캘린더 View (마감 예정 + 완료를 한 달력에) ───
   "해야 할" 항목(마감일 기준)과 "처리한" 항목(완료일 기준)을 한 눈에. 날짜 클릭 → 그 날 일지로. */
function CalendarView({ tasks = [], projFilter = '전체', setSelectedDate, setView }) {
  const today = new Date(TODAY + 'T00:00:00');
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [mode, setMode] = useState('all');

  const inProj = (t) => projFilter === '전체' || t.project === projFilter;
  const dueMap = {}, doneMap = {};
  tasks.forEach((t) => {
    if (!inProj(t)) return;
    if (t.deadline && !['DONE', 'CANCELLED'].includes(t.status)) {(dueMap[t.deadline] = dueMap[t.deadline] || []).push(t);}
    if (t.status === 'DONE' && t.updatedAt) {(doneMap[t.updatedAt] = doneMap[t.updatedAt] || []).push(t);}
  });

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const startOffset = new Date(viewYear, viewMonth, 1).getDay();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

  const ymd = (d) => `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  const DOW = ['일', '월', '화', '수', '목', '금', '토'];
  let monthDue = 0, monthDone = 0;
  for (let d = 1; d <= daysInMonth; d++) {monthDue += (dueMap[ymd(d)] || []).length;monthDone += (doneMap[ymd(d)] || []).length;}

  const prev = () => {if (viewMonth === 0) {setViewYear((y) => y - 1);setViewMonth(11);} else setViewMonth((m) => m - 1);};
  const next = () => {if (viewMonth === 11) {setViewYear((y) => y + 1);setViewMonth(0);} else setViewMonth((m) => m + 1);};
  const goToday = () => {setViewYear(today.getFullYear());setViewMonth(today.getMonth());};
  const prioColor = (p) => p === 'A' ? 'var(--prio-a)' : p === 'B' ? 'var(--prio-b)' : 'var(--prio-c)';

  function Item({ t, done }) {
    return (
      <div title={`${done ? '✓ 완료' : '마감'} · ${t.title}${t.project ? ' · ' + t.project : ''}`}
        style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '1px 4px', borderRadius: 3, fontSize: 11, lineHeight: 1.5, background: done ? 'var(--green-light)' : 'var(--surface-2)', minWidth: 0 }}>
        {done ?
        <span style={{ color: 'var(--green)', fontSize: 10, flexShrink: 0 }}>✓</span> :
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: PROJ_COLORS[t.project] || 'var(--text-3)', flexShrink: 0 }} />}
        <span style={{ flex: 1, minWidth: 0, color: done ? 'var(--text-4)' : 'var(--text-2)', textDecoration: done ? 'line-through' : 'none', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.title}</span>
      </div>);
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 18px', borderBottom: '1px solid var(--border)', flexShrink: 0, background: 'var(--surface)' }}>
        <button className="btn btn-sm" onClick={prev}>‹</button>
        <span style={{ fontSize: 15, fontWeight: 700, minWidth: 110, textAlign: 'center' }}>{viewYear}년 {viewMonth + 1}월</span>
        <button className="btn btn-sm" onClick={next}>›</button>
        <button className="btn btn-sm" onClick={goToday}>오늘</button>
        <div style={{ display: 'flex', gap: 4, marginLeft: 10 }}>
          {[['all', '전체'], ['due', '해야 할 일'], ['done', '완료']].map(([k, l]) =>
          <div key={k} className={`filter-chip${mode === k ? ' active' : ''}`} onClick={() => setMode(k)}>{l}</div>
          )}
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 16, fontSize: 12, color: 'var(--text-3)' }}>
          <span>이번 달 해야 할 일 <strong style={{ color: 'var(--text)' }}>{monthDue}</strong></span>
          <span>완료 <strong style={{ color: 'var(--green)' }}>{monthDone}</strong></span>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        {DOW.map((d, i) =>
        <div key={d} style={{ padding: '6px 10px', fontSize: 11, fontWeight: 600, color: i === 0 ? 'var(--red)' : i === 6 ? 'var(--blue)' : 'var(--text-3)' }}>{d}</div>
        )}
      </div>
      <div style={{ flex: 1, overflowY: 'auto', display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gridAutoRows: '1fr' }}>
        {weeks.map((row, wi) =>
        row.map((d, di) => {
          if (!d) return <div key={`e${wi}-${di}`} style={{ borderRight: '1px solid var(--border)', borderBottom: '1px solid var(--border)', background: 'var(--surface-2)', opacity: .4 }} />;
          const ds = ymd(d);
          const isToday = ds === TODAY;
          const due = mode === 'done' ? [] : dueMap[ds] || [];
          const done = mode === 'due' ? [] : doneMap[ds] || [];
          const items = [...due.map((t) => ({ t, done: false })), ...done.map((t) => ({ t, done: true }))];
          const shown = items.slice(0, 4);
          const isWeekend = di === 0 || di === 6;
          return (
            <div key={ds}
              onClick={() => {setSelectedDate(ds);setView('today');}}
              title={`${ds} — 클릭하면 이 날 일지로 이동`}
              style={{ minHeight: 96, borderRight: '1px solid var(--border)', borderBottom: '1px solid var(--border)', padding: '5px 6px', cursor: 'pointer', display: 'flex', flexDirection: 'column', gap: 3, background: isToday ? 'var(--accent-light)' : isWeekend ? 'var(--surface-2)' : 'var(--surface)' }}
              onMouseEnter={(e) => {if (!isToday) e.currentTarget.style.background = 'var(--surface-2)';}}
              onMouseLeave={(e) => {if (!isToday) e.currentTarget.style.background = isWeekend ? 'var(--surface-2)' : 'var(--surface)';}}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ fontSize: 12, fontWeight: isToday ? 700 : 500, color: isToday ? 'var(--accent-text)' : di === 0 ? 'var(--red)' : 'var(--text-2)', width: 20, height: 20, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: '50%', background: isToday ? 'var(--surface)' : 'transparent' }}>{d}</span>
                {due.length > 0 && <span style={{ fontSize: 9, color: 'var(--text-4)' }}>마감 {due.length}</span>}
                {done.length > 0 && <span style={{ fontSize: 9, color: 'var(--green)', marginLeft: 'auto' }}>✓{done.length}</span>}
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 0 }}>
                {shown.map(({ t, done }, k) => <Item key={k} t={t} done={done} />)}
                {items.length > shown.length && <div style={{ fontSize: 10, color: 'var(--text-4)', paddingLeft: 4 }}>+{items.length - shown.length}개 더</div>}
              </div>
            </div>);
        })
        )}
      </div>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center', padding: '7px 18px', borderTop: '1px solid var(--border)', flexShrink: 0, background: 'var(--surface)', fontSize: 11, color: 'var(--text-3)', flexWrap: 'wrap' }}>
        <span style={{ color: 'var(--text-4)' }}>마감 예정:</span>
        {Object.entries(PROJ_COLORS).filter(([k]) => k !== '전체').map(([name, color]) =>
        <span key={name} style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 7, height: 7, borderRadius: '50%', background: color }} /> {name}</span>
        )}
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ color: 'var(--green)' }}>✓</span> 완료한 일</span>
        <span style={{ marginLeft: 'auto', color: 'var(--text-4)' }}>날짜 클릭 → 그 날 일지로 이동</span>
      </div>
    </div>);
}

{ tag: '워크로그 라운지', icon: '🌙', text: '퇴근 전 내일 할 일 3개만 적어두면, 아침의 나가 고마워해요.' },
{ tag: '회고', icon: '🌤', text: '안 풀리는 날도 기록은 남아요. 흐린 날의 데이터가 맑은 날을 만들어요.' },
{ tag: '스탠드업', icon: '🌅', text: '어제의 나에게 — 가장 잘 끝낸 한 가지는 무엇이었나요?' },
{ tag: '스탠드업', icon: '🎯', text: '오늘 단 하나만 끝낸다면, 그건 무엇일까요?' },
{ tag: '스탠드업', icon: '🚧', text: '지금 막혀 있는 일은 없나요? 있으면 일지에 한 줄 적어두기.' },
{ tag: '스탠드업', icon: '🤝', text: '오늘 누군가에게 도움받고 싶은 일, 하나 떠오르나요?' },
{ tag: '스탠드업', icon: '🌡', text: '이번 주 만족도를 1~5점으로 매긴다면 지금 몇 점인가요?' },
{ tag: '단축키', icon: '⌨️', text: '⌘K(Ctrl+K) 누르면 어디서든 일지·할 일 검색이 열려요.' },
{ tag: '단축키', icon: '⚡', text: '일지에서 /task 라고 치면 그 줄이 바로 할 일이 돼요.' },
{ tag: '단축키', icon: '🏷', text: '#태그를 붙여두면 나중에 검색·모아보기가 훨씬 쉬워요.' },
{ tag: '단축키', icon: '🔗', text: '[[2026-06-10]] 처럼 쓰면 그 날 일지로 바로 점프해요.' },
{ tag: '단축키', icon: '🗂', text: 'Board에서 대기·이슈·결정·팔로업으로 항목을 분류해보세요.' }];

const RIBBON_THEMES = {
  '오늘의 한 줄': { grad: 'linear-gradient(135deg,#6366f1,#8b5cf6)', tint: 'rgba(99,102,241,.12)' },
  '집중 팁': { grad: 'linear-gradient(135deg,#3b82f6,#06b6d4)', tint: 'rgba(37,99,235,.12)' },
  '워크로그 라운지': { grad: 'linear-gradient(135deg,#f59e0b,#f97316)', tint: 'rgba(245,158,11,.14)' },
  '회고': { grad: 'linear-gradient(135deg,#10b981,#14b8a6)', tint: 'rgba(16,185,129,.12)' },
  '스탠드업': { grad: 'linear-gradient(135deg,#14b8a6,#0ea5e9)', tint: 'rgba(14,165,233,.12)' },
  '단축키': { grad: 'linear-gradient(135deg,#64748b,#334155)', tint: 'rgba(100,116,139,.12)' },
  '오늘의 나': { grad: 'linear-gradient(135deg,#f43f5e,#f59e0b)', tint: 'rgba(244,63,94,.12)' },
  '정리': { grad: 'linear-gradient(135deg,#ec4899,#f43f5e)', tint: 'rgba(236,72,153,.12)' }
};
function TopRibbon({ tasks = [] }) {
  const [collapsed, setCollapsed] = useState(() => {
    try {return localStorage.getItem('worklog.ribbon.collapsed') === '1' || sessionStorage.getItem('worklog.ribbon.hidden') === '1';} catch (e) {return false;}
  });
  const setCol = (v) => {setCollapsed(v);try {localStorage.setItem('worklog.ribbon.collapsed', v ? '1' : '0');sessionStorage.removeItem('worklog.ribbon.hidden');} catch (e) {}};
  const [idx, setIdx] = useState(0);
  if (collapsed) return (
    <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '6px 16px 0', flexShrink: 0 }}>
      <button className="ribbon-ghost" onClick={() => setCol(false)} title="오늘의 한 줄 다시 보기"
        style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 99, padding: '3px 11px', cursor: 'pointer', fontSize: 11, color: 'var(--text-3)' }}>
        💬 오늘의 한 줄 보기
      </button>
    </div>);
  /* 내 데이터 기반 넓지 (Toss풍 개인화 한 줄) — 의미 있을 때만 생성 */
  const nudges = (() => {
    const out = [];
    const since = (d) => d ? Math.floor((new Date(TODAY) - new Date(d + 'T00:00:00')) / 86400000) : 0;
    const ymd = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    const doneToday = tasks.filter((t) => t.status === 'DONE' && t.updatedAt === TODAY).length;
    if (doneToday > 0) out.push({ tag: '오늘의 나', icon: '🎉', text: `오늘 벌써 ${doneToday}개 완료했어요. 이 흐름 좋아요!` });
    const todayDue = tasks.filter((t) => !['DONE', 'CANCELLED'].includes(t.status) && t.deadline === TODAY).length;
    if (todayDue > 0) out.push({ tag: '오늘의 나', icon: '🔥', text: `오늘 마감이 ${todayDue}개 있어요. 먼저 처리해볼까요?` });
    const doing = tasks.filter((t) => t.status === 'DOING').length;
    if (doing >= 5) out.push({ tag: '오늘의 나', icon: '🧘', text: `집중 항목이 ${doing}개예요. 5개 이하로 줄이면 더 잘 굴러가요.` });
    const stale = tasks.filter((t) => ['TODO', 'DOING'].includes(t.status) && since(t.updatedAt) >= 7).length;
    if (stale > 0) out.push({ tag: '오늘의 나', icon: '🧹', text: `${stale}개 항목이 7일 넘게 멈춰 있어요. 정리하면 깔끈해져요.` });
    const t0 = new Date(TODAY + 'T00:00:00');
    const mon = new Date(t0);mon.setDate(t0.getDate() - ((t0.getDay() + 6) % 7));
    const sun = new Date(mon);sun.setDate(mon.getDate() + 6);
    const pm = new Date(mon);pm.setDate(mon.getDate() - 7);
    const pmEnd = new Date(pm);pmEnd.setDate(pm.getDate() + 6);
    const inR = (d, a, b) => d && d >= a && d <= b;
    const created = tasks.filter((t) => inR(t.createdAt, ymd(mon), ymd(sun)));
    const doneWk = tasks.filter((t) => t.status === 'DONE' && inR(t.updatedAt, ymd(mon), ymd(sun))).length;
    const donePrev = tasks.filter((t) => t.status === 'DONE' && inR(t.updatedAt, ymd(pm), ymd(pmEnd))).length;
    if (created.length > 0) {
      const pct = Math.round(doneWk / created.length * 100);
      const diff = doneWk - donePrev;
      out.push({ tag: '오늘의 나', icon: '📈', text: `이번 주 완료율 ${pct}% · 완료 ${doneWk}개${diff !== 0 ? ` (지난주 대비 ${diff > 0 ? '+' : ''}${diff})` : ''}` });
    }
    return out;
  })();
  const pool = nudges.length ? [...nudges, ...RIBBON_ITEMS] : RIBBON_ITEMS;

  const item = pool[idx % pool.length];
  const theme = RIBBON_THEMES[item.tag] || RIBBON_THEMES['오늘의 한 줄'];
  return (
    <div style={{ padding: '10px 14px 8px', flexShrink: 0 }}>
      <div className="ribbon-card" key={idx} style={{
        display: 'flex', alignItems: 'center', gap: 11,
        padding: '8px 12px', borderRadius: 14,
        background: `linear-gradient(120deg, ${theme.tint}, transparent 72%), var(--surface)`,
        border: '1px solid var(--border)', boxShadow: '0 6px 18px rgba(0,0,0,.06)'
      }}>
        <div className="ribbon-bubble" key={'b' + idx} style={{ width: 34, height: 34, borderRadius: 11, background: theme.grad, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0, boxShadow: '0 5px 12px rgba(0,0,0,.18)' }}>{item.icon}</div>
        <span style={{ fontSize: 10, fontWeight: 800, color: '#fff', background: theme.grad, padding: '2px 8px', borderRadius: 99, letterSpacing: '-.01em', flexShrink: 0, whiteSpace: 'nowrap' }}>{item.tag}</span>
        <span style={{ flex: 1, minWidth: 0, fontSize: 13.5, fontWeight: 600, color: 'var(--text)', letterSpacing: '-.01em', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.text}</span>
        <button className="ribbon-ghost" onClick={() => setIdx((i) => (i + 1) % pool.length)} title="다른 한 줄 보기"
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-4)', fontSize: 14, width: 28, height: 28, borderRadius: 8, flexShrink: 0 }}>⟳</button>
        <button className="ribbon-ghost" onClick={() => setCol(true)} title="접기"
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-4)', fontSize: 13, width: 28, height: 28, borderRadius: 8, flexShrink: 0 }}>✕</button>
      </div>
    </div>);
}

function App() {
  const today = useToday(); /* 자정 넘어가면 자동 갱신 */
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dark, setDark] = useState(() => {
    try {return JSON.parse(localStorage.getItem('worklog.dark') || 'false');} catch (e) {return false;}
  });
  useEffect(() => {localStorage.setItem('worklog.dark', JSON.stringify(dark));}, [dark]);
  const [view, setView] = useState('today');
  const [tasks, setTasks] = useState(INIT_TASKS);
  const [projFilter, setProjFilter] = useState('전체');
  const [showExcel, setShowExcel] = useState(false);
  const [projects, setProjects] = useState(PROJECTS);
  const [projectsRaw, setProjectsRaw] = useState([]); // [{id,name,color}, ...]
  const [showProjMgr, setShowProjMgr] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [dataVersion, setDataVersion] = useState(0); // ALL_JOURNALS/HEATMAP_DATA 갱신 트리거

  /* 백엔드에서 task/projects 다시 불러오기 */
  const refreshTasks = useCallback(async () => {
    try {
      const data = await GET('/api/tasks/all');
      setTasks(data.map(normalizeTask));
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshTasks failed:', e);}
  }, []);

  const refreshProjects = useCallback(async () => {
    try {
      const data = await GET('/api/projects');
      setProjectsRaw(data);
      const names = data.map((p) => p.name);
      setProjects(names);
      PROJECTS = names;
      data.forEach((p) => {PROJ_COLORS[p.name] = p.color;});
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshProjects failed:', e);}
  }, []);

  const refreshHeatmap = useCallback(async () => {
    try {
      const data = await GET('/api/heatmap?days=35');
      HEATMAP_DATA = data;
      setDataVersion((v) => v + 1);
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshHeatmap failed:', e);}
  }, []);

  /* 검색용 전체 일지 (90일치) — 검색 모달 열 때 fetch */
  const refreshAllJournals = useCallback(async () => {
    try {
      const end = new Date();
      const start = new Date();start.setDate(start.getDate() - 90);
      const data = await GET(`/api/journals/range?start=${localYMD(start)}&end=${localYMD(end)}`);
      ALL_JOURNALS = data.filter((j) => j.content && j.content.trim());
      recomputeTagFreq();
      setDataVersion((v) => v + 1);
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshAllJournals failed:', e);}
  }, []);

  /* MiniCalendar 점 — 현재 보이는 달의 일지 있는 날짜 fetch */
  const [journalDates, setJournalDates] = useState({}); // { 'YYYY-MM-DD': true }
  const refreshJournalDates = useCallback(async () => {
    try {
      const now = new Date();
      // 현재 달 + 직전 달 + 다음 달까지 미리 가져와서 캐시
      const months = [-1, 0, 1].map((off) => {
        const d = new Date(now.getFullYear(), now.getMonth() + off, 1);
        return { year: d.getFullYear(), month: d.getMonth() + 1 };
      });
      const all = {};
      for (const m of months) {
        try {
          const dates = await GET(`/api/journals/dates?year=${m.year}&month=${m.month}`);
          (dates || []).forEach((d) => {all[d] = true;});
        } catch (_) {}
      }
      setJournalDates(all);
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshJournalDates failed:', e);}
  }, []);

  const bumpDataVersion = useCallback(() => setDataVersion((v) => v + 1), []);

  /* 마운트 시 초기 데이터 로딩 */
  useEffect(() => {
    refreshTasks();
    refreshProjects();
    refreshHeatmap();
    refreshAllJournals();
    refreshJournalDates();
  }, []);

  /* 전역 단축키 */
  useEffect(() => {
    const onKey = (e) => {
      // 입력창/textarea 안에서는 대부분 동작 안 함 (⌘K만 예외)
      const tag = (e.target.tagName || '').toLowerCase();
      const inField = ['input', 'textarea', 'select'].includes(tag) || e.target.isContentEditable;
      const mod = e.metaKey || e.ctrlKey;

      if (mod && e.key === 'k') {e.preventDefault();setShowSearch((s) => !s);return;}
      if (e.key === 'Escape') {
        if (showShortcuts) {setShowShortcuts(false);return;}
        if (showSearch) {setShowSearch(false);return;}
      }
      // Cmd/Ctrl+Shift+D — 다크모드 토글 (필드 안에서도 작동, Shift 추가로 브라우저 충돌 방지)
      if (mod && e.shiftKey && (e.key === 'd' || e.key === 'D')) {e.preventDefault();setDark((d) => !d);return;}
      if (inField) return;

      if (e.key === '?' && !mod) {e.preventDefault();setShowShortcuts((s) => !s);return;}
      // Cmd/Ctrl+N — 빠른 추가 포커스
      if (mod && !e.shiftKey && (e.key === 'n' || e.key === 'N')) {
        e.preventDefault();
        const inp = document.querySelector('.quick-input');
        if (inp) inp.focus();
        return;
      }
      // Cmd/Ctrl+J — 저널 포커스 (오늘 기록 col-body 내 첫 편집 가능 영역)
      if (mod && !e.shiftKey && (e.key === 'j' || e.key === 'J')) {
        e.preventDefault();
        // JournalFoldView 사용 시 첫 섹션 body 클릭 트리거
        const journalEdit = document.querySelector('[data-section-idx="0"] textarea');
        if (journalEdit) { journalEdit.focus(); return; }
        const ta = document.querySelector('.journal-textarea');
        if (ta) ta.focus();
        return;
      }
      if (mod && e.key === 'ArrowLeft') {
        e.preventDefault();
        setSelectedDate((prev) => {
          const [y, m, d] = prev.split('-').map(Number);
          const dt = new Date(y, m - 1, d);dt.setDate(dt.getDate() - 1);
          return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
        });
        return;
      }
      if (mod && e.key === 'ArrowRight') {
        e.preventDefault();
        setSelectedDate((prev) => {
          const [y, m, d] = prev.split('-').map(Number);
          const dt = new Date(y, m - 1, d);dt.setDate(dt.getDate() + 1);
          return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
        });
        return;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showSearch, showShortcuts]);

  useEffect(() => {
    document.documentElement.setAttribute('data-dark', dark);
  }, [dark]);

  const [selectedDate, setSelectedDate] = useState(TODAY);

  /* 자정 넘어가면 — selectedDate가 어제(=직전 TODAY)였을 경우만 새 TODAY로 따라감.
     사용자가 명시적으로 과거 날짜를 보고 있는 경우엔 그대로 유지. */
  const prevTodayRef = useRef(today);
  useEffect(() => {
    if (prevTodayRef.current !== today) {
      if (selectedDate === prevTodayRef.current) setSelectedDate(today);
      prevTodayRef.current = today;
    }
  }, [today, selectedDate]);

  function handleCalendarSelect(date) {
    setSelectedDate(date);
    setView('today');
  }
  const doingCount = tasks.filter((t) => t.status === 'DOING').length;
  const urgent = tasks.filter((t) => t.status !== 'DONE' && isUrgent(t.deadline));

  return (
    <div className="app">
      <Sidebar view={view} setView={setView} dark={dark} setDark={setDark} projFilter={projFilter} setProjFilter={setProjFilter} projects={projects} onManageProjects={() => setShowProjMgr(true)} onSelectDate={handleCalendarSelect} selectedDate={selectedDate} journalDates={journalDates} setShowSearch={setShowSearch} />
      <div className="main">
        <TopRibbon tasks={tasks} />
        <div className="main-header">
          {view === 'today' && <>
            <div>
              <div className="header-title">📅 {formatKoreanDate(selectedDate)}</div>
              <div className="header-sub">Today</div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginLeft: 'auto', alignItems: 'center' }}>
              <div className="search-bar" onClick={() => setShowSearch(true)} style={{ cursor: 'pointer' }}>
                <span style={{ fontSize: 12, color: 'var(--text-4)' }}>🔍</span>
                <span style={{ flex: 1, fontSize: 12, color: 'var(--text-4)' }}>일지·Task 검색...</span>
                <span className="kbd">{MOD_LABEL}K</span>
              </div>
              <button className="icon-btn" onClick={() => setShowShortcuts(true)} title="키보드 단축키 (?)" style={{ fontSize: 12, padding: '4px 8px' }}>?</button>
              {urgent.length > 0 && <span className="badge badge-red">🔥 마감 {urgent.length}개</span>}
              <span className="badge badge-blue">DOING {doingCount}/5</span>
            </div>
          </>}
          {view === 'inbox' && <>
            <div>
              <div className="header-title">📥 Inbox</div>
              <div className="header-sub">미정리 항목 처리</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
          {view === 'board' && <>
            <div>
              <div className="header-title">📋 Board</div>
              <div className="header-sub">Work Item 전체 현황</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
          {view === 'review' && <>
            <div>
              <div className="header-title">🔍 Review</div>
              <div className="header-sub">{formatKoreanDate(today)}</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
          {view === 'gantt' && <>
            <div>
              <div className="header-title">📅 전체 일정</div>
              <div className="header-sub">{new Date(today + 'T00:00:00').getFullYear()}년 {new Date(today + 'T00:00:00').getMonth() + 1}월 · 진행 중인 일정</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
          {view === 'calendar' && <>
            <div>
              <div className="header-title">🗓 캘린더</div>
              <div className="header-sub">마감 예정과 완료를 한 달력에 · {projFilter !== '전체' ? projFilter : '전체 프로젝트'}</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
        </div>
        <div className="main-body">
          <div className="view-anim" key={view} style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
          {view === 'today'  && <Dashboard tasks={tasks} setTasks={setTasks} projFilter={projFilter} projects={projects} selectedDate={selectedDate} setSelectedDate={setSelectedDate} refreshTasks={refreshTasks} dataVersion={dataVersion} bumpDataVersion={bumpDataVersion} journalDates={journalDates} refreshJournalDates={refreshJournalDates} />}
          {view === 'inbox'  && <InboxView tasks={tasks} projects={projects} refreshTasks={refreshTasks} />}
          {view === 'board'  && <BoardView tasks={tasks} projects={projects} refreshTasks={refreshTasks} />}
          {view === 'review' && <ReviewView tasks={tasks} setTasks={setTasks} dataVersion={dataVersion} refreshTasks={refreshTasks} onGoToday={() => setView('today')} />}
          {view === 'gantt'  && <GanttView projFilter={projFilter} onImport={() => setShowExcel(true)} tasks={tasks} setSelectedDate={setSelectedDate} setView={setView} refreshTasks={refreshTasks} bumpDataVersion={bumpDataVersion} />}
          {view === 'calendar' && <CalendarView tasks={tasks} projFilter={projFilter} setSelectedDate={setSelectedDate} setView={setView} />}
          </div>
        </div>
      </div>
      {showExcel && <ExcelModal onClose={() => setShowExcel(false)} />}
      {showProjMgr && <ProjectManager projects={projects} projectsRaw={projectsRaw} setProjects={setProjects} refreshProjects={refreshProjects} onClose={() => setShowProjMgr(false)} />}
      {showSearch && <SearchModal tasks={tasks} onClose={() => setShowSearch(false)} onJumpDate={(d) => { setSelectedDate(d); setView('today'); setShowSearch(false); }} dataVersion={dataVersion} />}
      {showShortcuts && <ShortcutsModal onClose={() => setShowShortcuts(false)} />}
      <TweaksUI values={tweaks} setTweak={setTweak} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
<div id="root"></div>
</body>
</html>
