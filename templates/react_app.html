function SearchModal({ tasks, onClose, onJumpDate }) {
  const [q, setQ] = React.useState('');
  const [activeTag, setActiveTag] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {inputRef.current && inputRef.current.focus();}, []);

  const query = (activeTag ? `#${activeTag}` : q).trim().toLowerCase();

  const journalHits = !query ? [] : ALL_JOURNALS.
  map((j) => {
    const idx = j.content.toLowerCase().indexOf(query);
    if (idx === -1) return null;
    const start = Math.max(0, idx - 30);
    const end = Math.min(j.content.length, idx + query.length + 60);
    const snippet = (start > 0 ? '…' : '') + j.content.slice(start, end) + (end < j.content.length ? '…' : '');
    return { ...j, snippet, idx };
  }).
  filter(Boolean);

  const taskHits = !query ? [] : tasks.filter((t) =>
  t.title.toLowerCase().includes(query) ||
  (t.note || '').toLowerCase().includes(query) ||
  (t.project || '').toLowerCase().includes(query)
  );

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp('(' + q.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
    const parts = text.split(re);
    return parts.map((p, i) => re.test(p) ? <mark key={i}>{p}</mark> : <span key={i}>{p}</span>);
  }

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()} style={{ alignItems: 'flex-start', paddingTop: 80 }}>
      <div className="modal" style={{ width: 640, maxHeight: '70vh', display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 16, color: 'var(--text-3)' }}>🔍</span>
          <input ref={inputRef} value={q} onChange={(e) => {setQ(e.target.value);setActiveTag(null);}}
          placeholder="일지·Task에서 검색...  (예: 보고서, #개발, 미팅)"
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 14, color: 'var(--text)', fontFamily: 'var(--font)' }} />
          
          <span className="kbd" style={{ fontSize: 10, color: 'var(--text-4)', border: '1px solid var(--border)', padding: '1px 5px', borderRadius: 3 }}>ESC</span>
        </div>

        {/* 자주 쓰는 태그 */}
        {!query &&
        <div style={{ padding: '12px 18px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 8 }}>자주 쓰는 태그</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {TAG_FREQ.map((t) =>
            <span key={t.tag} className="tag-chip lg" onClick={() => setActiveTag(t.tag)}>
                  #{t.tag} <span style={{ opacity: .6, fontSize: 10 }}>{t.count}</span>
                </span>
            )}
            </div>
          </div>
        }

        <div style={{ flex: 1, overflow: 'auto' }}>
          {query && journalHits.length === 0 && taskHits.length === 0 &&
          <div style={{ padding: '40px 20px', textAlign: 'center', fontSize: 13, color: 'var(--text-4)' }}>"{query}" 결과가 없어요</div>
          }

          {journalHits.length > 0 &&
          <div>
              <div style={{ padding: '10px 18px 6px', fontSize: 10, fontWeight: 700, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', background: 'var(--surface-2)' }}>📝 일지 ({journalHits.length})</div>
              {journalHits.map((j) =>
            <div key={j.date} className="search-result-row" onClick={() => {onJumpDate && onJumpDate(j.date);onClose();}}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-2)' }}>{j.date}</span>
                    <span style={{ fontSize: 10, color: 'var(--text-4)' }}>일지로 이동 →</span>
                  </div>
                  <div className="search-snippet">{highlight(j.snippet, query)}</div>
                </div>
            )}
            </div>
          }

          {taskHits.length > 0 &&
          <div>
              <div style={{ padding: '10px 18px 6px', fontSize: 10, fontWeight: 700, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', background: 'var(--surface-2)' }}>✓ Task ({taskHits.length})</div>
              {taskHits.map((t) =>
            <div key={t.id} className="search-result-row">
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span className={`badge badge-${t.priority.toLowerCase()}`} style={{ fontSize: 10 }}>{t.priority}</span>
                    <span className={`badge badge-${t.status.toLowerCase()}`} style={{ fontSize: 10 }}>{t.status}</span>
                    <span style={{ fontSize: 13, color: 'var(--text-2)', flex: 1 }}>{highlight(t.title, query)}</span>
                  </div>
                  {(t.project || t.note) &&
              <div className="search-snippet">
                      {t.project && <span>📁 {highlight(t.project, query)}  </span>}
                      {t.note && <span>📌 {highlight(t.note, query)}</span>}
                    </div>
              }
                </div>
            )}
            </div>
          }
        </div>

        <div style={{ padding: '8px 18px', borderTop: '1px solid var(--border)', fontSize: 10, color: 'var(--text-4)', display: 'flex', gap: 14 }}>
          <span><span className="kbd" style={{ border: '1px solid var(--border)', padding: '1px 5px', borderRadius: 3, marginRight: 4 }}>↑↓</span> 이동</span>
          <span><span className="kbd" style={{ border: '1px solid var(--border)', padding: '1px 5px', borderRadius: 3, marginRight: 4 }}>Enter</span> 열기</span>
          <span style={{ marginLeft: 'auto' }}>#태그로 필터링 가능</span>
        </div>
      </div>
    </div>);

}

/* ─── BriefingView ─── */
function BriefingView({ tasks, dataVersion }) {
  const STALE_DAYS = 7;

  /* 백엔드 /api/brief 결과 (있으면 우선 사용) */
  const [brief, setBrief] = useState(null);
  useEffect(() => {
    let cancelled = false;
    GET('/api/brief').
    then((b) => {if (!cancelled) setBrief(b);}).
    catch((_) => {});
    return () => {cancelled = true;};
  }, [dataVersion]);

  function daysDiff(dateStr) {
    const diff = new Date(TODAY) - new Date(dateStr + 'T00:00:00');
    return Math.floor(diff / 86400000);
  }

  /* 백엔드 결과가 있으면 그 목록을, 없으면 클라이언트 계산을 사용 */
  const doing = tasks.filter((t) => t.status === 'DOING');
  const urgent = brief && Array.isArray(brief.urgent) ?
  brief.urgent.map(normalizeTask) :
  tasks.filter((t) => t.status !== 'DONE' && t.status !== 'CANCELLED' && t.deadline && t.deadline <= TODAY);
  const stale = brief && Array.isArray(brief.stale) ?
  brief.stale.map(normalizeTask) :
  tasks.filter((t) => ['TODO', 'DOING'].includes(t.status) && daysDiff(t.updatedAt) >= STALE_DAYS);
  const yesterdayStr = (() => {
    const d = new Date();d.setDate(d.getDate() - 1);
    return localYMD(d);
  })();
  const doneDone = tasks.filter((t) => t.status === 'DONE' && t.updatedAt === yesterdayStr);
  const undone = tasks.filter((t) => ['TODO', 'DOING'].includes(t.status));

  const prioIcon = (p) => ({ A: '🔴', B: '🟡', C: '⚪' })[p] || '⚪';
  const deadlineLabel = (d) => {
    if (!d) return '';
    if (d === TODAY) return ' ← 오늘 마감!';
    const tmrw = (() => {
      const dt = new Date();dt.setDate(dt.getDate() + 1);
      return localYMD(dt); // 로컬 시간대 기준 — toISOString()은 UTC라 밤에 하루 밀림
    })();
    if (d === tmrw) return ' ← 내일 마감';
    return ` ← ${d}`;
  };

  const Card = ({ children, style }) =>
  <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '18px 20px', boxShadow: 'var(--shadow)', ...style }}>
      {children}
    </div>;

  const SectionTitle = ({ children }) =>
  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 10 }}>{children}</div>;

  const Row = ({ children }) =>
  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '5px 0', borderBottom: '1px solid var(--border)', fontSize: 13 }}>{children}</div>;


  return (
    <div style={{ padding: 24, overflow: 'auto', height: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>

      {/* 모닝 브리핑 */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700 }}>📅 모닝 브리핑</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{formatKoreanDate(TODAY)} · 09:00 자동 발송</div>
          </div>
          <span style={{ fontSize: 11, background: 'var(--green-light)', color: 'var(--green)', padding: '3px 10px', borderRadius: 99, fontWeight: 600 }}>발송 완료</span>
        </div>

        {urgent.length > 0 &&
        <div style={{ background: 'var(--red-light)', borderRadius: 6, padding: '10px 12px', marginBottom: 12, fontSize: 13, color: 'var(--red)' }}>
            <div style={{ fontWeight: 700, marginBottom: 6 }}>🔥 오늘 마감이라 DOING으로 옮겨뒀어요</div>
            {urgent.map((t) =>
          <div key={t.id} style={{ paddingLeft: 8 }}>{prioIcon(t.priority)} {t.title}</div>
          )}
          </div>
        }

        <SectionTitle>📌 오늘 포커스 ({doing.length}개{doing.length > 5 ? ' ⚠️ 좀 많아요' : ''})</SectionTitle>
        {doing.length === 0 ?
        <div style={{ fontSize: 13, color: 'var(--text-3)', padding: '6px 0' }}>진행 중인 Task가 없어요. DOING으로 옮겨볼까요?</div> :
        doing.map((t) =>
        <Row key={t.id}>
              <span>{prioIcon(t.priority)}</span>
              <span style={{ flex: 1, color: 'var(--text-2)' }}>{t.title}</span>
              <span style={{ fontSize: 11, color: t.deadline && t.deadline <= TODAY ? 'var(--red)' : 'var(--text-4)' }}>{deadlineLabel(t.deadline)}</span>
            </Row>
        )
        }

        {doneDone.length > 0 &&
        <div style={{ marginTop: 12, fontSize: 12, color: 'var(--text-3)' }}>
            ✅ 어제 완료: <strong>{doneDone.length}개</strong> 수고하셨어요! 👏
          </div>
        }

        {stale.length > 0 &&
        <div style={{ marginTop: 14 }}>
            <SectionTitle>💬 혹시 이 Task들, 아직 진행 중인가요?</SectionTitle>
            {stale.slice(0, 3).map((t) =>
          <Row key={t.id}>
                <span style={{ color: 'var(--text-4)' }}>·</span>
                <span style={{ flex: 1, color: 'var(--text-2)' }}>{t.title}</span>
                <span style={{ fontSize: 11, color: 'var(--amber)' }}>{daysDiff(t.updatedAt)}일째</span>
              </Row>
          )}
            <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 8 }}>계속하실 거면 괜찮고, 완료·취소로 정리해두시면 깔끔해져요 😊</div>
          </div>
        }
      </Card>

      {/* 퇴근 전 체크 */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700 }}>✋ 퇴근 전 체크</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>오늘 17:30 예정</div>
          </div>
          <span style={{ fontSize: 11, background: 'var(--amber-light)', color: 'var(--amber)', padding: '3px 10px', borderRadius: 99, fontWeight: 600 }}>대기 중</span>
        </div>

        <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.9 }}>
          <div>오늘 일지 작성 여부를 확인할게요.</div>
          <div style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 4 }}>
            미완료 Task <strong style={{ color: 'var(--text-2)' }}>{undone.length}개</strong> · 오늘 마감 <strong style={{ color: urgent.length ? 'var(--red)' : 'var(--text-2)' }}>{urgent.length}개</strong>
          </div>
        </div>

        <div style={{ marginTop: 14 }}>
          <SectionTitle>아직 못 끝낸 것들</SectionTitle>
          {undone.slice(0, 4).map((t) =>
          <Row key={t.id}>
              <span>{prioIcon(t.priority)}</span>
              <span style={{ flex: 1, color: 'var(--text-2)' }}>{t.title}</span>
              <span className={`badge badge-${t.status.toLowerCase()}`} style={{ fontSize: 10 }}>{t.status}</span>
            </Row>
          )}
          {undone.length > 4 && <div style={{ fontSize: 12, color: 'var(--text-4)', marginTop: 6 }}>… 외 {undone.length - 4}개 더</div>}
        </div>
        <div style={{ marginTop: 12, fontSize: 12, color: 'var(--text-3)' }}>오늘 마무리할 것과 내일로 넘길 것 체크해두시면 좋아요!</div>
      </Card>

      {/* 다음 주간 브리핑 예고 */}
      <Card style={{ background: 'var(--surface-2)', border: '1px dashed var(--border-2)' }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>📊 다음 주간 브리핑</div>
        <div style={{ fontSize: 12, color: 'var(--text-3)', lineHeight: 1.8 }}>
          <div>월요일 (4/27) 09:00에 이번 주 회고 + 다음 주 브리핑이 자동 발송돼요.</div>
          <div style={{ marginTop: 6 }}>이번 주 마감: <strong>기획서 검토 (4/28)</strong> · <strong>월간 보고 (4/30)</strong></div>
        </div>
      </Card>
    </div>);

}

/* ─── Gantt View v4 ─── */
function GanttView({ projFilter, onImport, tasks = [], setSelectedDate, setView, refreshTasks }) {
  const toast = useToast();
  const [pFilter, setPFilter] = useState('전체');
  const [prioFilter, setPrioFilter] = useState('전체');
  const [zoom, setZoom] = useState(80); // 주당 px 너비
  const [selectedId, setSelectedId] = useState(null);
  /* 시드 일정 — 제거 결과를 localStorage에 영속화 (탭 이동 시 초기화 방지) */
  const [items, setItems] = useState(() => {
    try {
      const removed = new Set(JSON.parse(localStorage.getItem('worklog.gantt.removedSeedIds') || '[]'));
      const overrides = JSON.parse(localStorage.getItem('worklog.gantt.seedOverrides') || '{}');
      return GANTT_DATA.filter((g) => !removed.has(g.id)).map((g) => overrides[g.id] ? { ...g, ...overrides[g.id] } : g);
    } catch (e) { return GANTT_DATA; }
  });
  /* task 기반 일정 — 숨김 처리도 영속화 */
  const [hiddenTaskIds, setHiddenTaskIds] = useState(() => {
    try {
      const arr = JSON.parse(localStorage.getItem('worklog.gantt.hiddenTaskIds') || '[]');
      return new Set(Array.isArray(arr) ? arr : []);
    } catch (e) { return new Set(); }
  });
  /* task 기반 일정의 진행률 — items에 없으므로 별도 저장 */
  const [taskProgress, setTaskProgress] = useState(() => {
    try { return JSON.parse(localStorage.getItem('worklog.gantt.taskProgress') || '{}'); }
    catch (e) { return {}; }
  });
  useEffect(() => { localStorage.setItem('worklog.gantt.hiddenTaskIds', JSON.stringify([...hiddenTaskIds])); }, [hiddenTaskIds]);
  useEffect(() => { localStorage.setItem('worklog.gantt.taskProgress', JSON.stringify(taskProgress)); }, [taskProgress]);
  const chartScrollRef = React.useRef(null);
  const didScrollToTodayRef = React.useRef(false);

  /* 오늘 기준 동적 weekStart 계산 — WEEKS 첫 항목('3/30')이 기준 (시드 데이터)
     실 task 기반 변환에서는 TODAY 기준으로 startWeek 계산 */
  const today = new Date(TODAY + 'T00:00:00');

  /* WEEKS 동적 생성 — 하드코딩 제거.
     기준(2026-03-30 월) + 모든 task deadline / items 끝주 / 오늘+8주를 포함하도록 확장 */
  const WEEKS_BASE = new Date('2026-03-30T00:00:00');
  const WEEKS = (() => {
    let maxW = 24;
    (tasks || []).forEach((t) => {
      if (!t.deadline) return;
      const d = new Date(t.deadline + 'T00:00:00');
      const w = Math.floor((d - WEEKS_BASE) / 86400000 / 7);
      if (w > maxW) maxW = w;
    });
    items.forEach((it) => { if (it.endWeek > maxW) maxW = it.endWeek; });
    const todayW = Math.floor((today - WEEKS_BASE) / 86400000 / 7);
    if (todayW + 8 > maxW) maxW = todayW + 8;
    const arr = [];
    for (let i = 0; i <= maxW + 4; i++) {
      const d = new Date(WEEKS_BASE);
      d.setDate(d.getDate() + i * 7);
      arr.push(`${d.getMonth() + 1}/${d.getDate()}`);
    }
    return arr;
  })();

  /* 할일(task) → 일정(Gantt item) 자동 변환 */
  function ymdToWeekIdx(ymdStr) {
    if (!ymdStr) return null;
    const d = new Date(ymdStr + 'T00:00:00');
    const diffDays = Math.floor((d - WEEKS_BASE) / 86400000);
    return Math.floor(diffDays / 7);
  }

  const taskItems = (tasks || []).
  filter((t) => t.deadline && !['DONE', 'CANCELLED'].includes(t.status) && !hiddenTaskIds.has(t.id)).
  map((t) => {
    const startW = Math.max(0, ymdToWeekIdx(t.createdAt) ?? 0);
    const endW = Math.max(startW, ymdToWeekIdx(t.deadline) ?? startW);
    const overrideProg = taskProgress[t.id];
    return {
      id: `task-${t.id}`,
      _taskId: t.id,
      name: t.title,
      project: t.project || '미분류',
      startWeek: startW,
      endWeek: Math.min(endW, WEEKS.length - 1),
      priority: t.priority || 'B',
      done: typeof overrideProg === 'number' ? overrideProg : (t.status === 'DOING' ? 50 : 0),
      _isTask: true,
      _journalDate: t.journalDate
    };
  });

  const allItems = [...items, ...taskItems];
  const effectiveProj = projFilter !== '전체' ? projFilter : pFilter;

  const filtered = allItems.filter((t) =>
  (effectiveProj === '전체' || t.project === effectiveProj) && (
  prioFilter === '전체' || t.priority === prioFilter)
  );

  const colW = zoom;
  const totalCols = WEEKS.length;
  const totalW = totalCols * colW;
  const selected = filtered.find((t) => t.id === selectedId) || null;

  // 월 그룹핑
  const monthGroups = (() => {
    const groups = [];
    let cur = null;
    WEEKS.forEach((w, i) => {
      const month = w.split('/')[0];
      if (!cur || cur.month !== month) {cur = { month, start: i, count: 1 };groups.push(cur);} else
      cur.count++;
    });
    return groups;
  })();

  /* 오늘 위치 — TODAY 기준 동적 계산 */
  const todayWeekFloat = (() => {
    const base = new Date('2026-03-30T00:00:00');
    const diffDays = (today - base) / 86400000;
    return diffDays / 7;
  })();
  const todayWeekIdx = Math.floor(todayWeekFloat);
  const todayX = todayWeekFloat * colW;
  const todayLabel = `오늘 ${today.getMonth() + 1}/${today.getDate()}`;

  /* 마운트 시 오늘 위치로 스크롤 — 한 번만 */
  React.useEffect(() => {
    if (didScrollToTodayRef.current) return;
    const el = chartScrollRef.current;
    if (!el) return;
    // 오늘을 화면 1/4 지점에 두기 (왼쪽 컨텍스트 약간 + 미래 충분히)
    const target = Math.max(0, todayX - el.clientWidth * 0.25);
    el.scrollLeft = target;
    didScrollToTodayRef.current = true;
  }, [todayX, colW]);

  function dDay(endWeek) {
    const daysLeft = Math.round((endWeek + 1 - todayWeekFloat) * 7);
    if (daysLeft < 0) return null;
    if (daysLeft === 0) return 'D-day';
    return `D-${daysLeft}`;
  }

  function updateProgress(id, val) {
    const v = Math.max(0, Math.min(100, val));
    /* task 기반 항목 — taskProgress에 저장 (id 형태: 'task-{taskId}') */
    if (typeof id === 'string' && id.startsWith('task-')) {
      const tid = parseInt(id.slice(5), 10);
      setTaskProgress((prev) => ({ ...prev, [tid]: v }));
      return;
    }
    /* 시드 항목 — items 업데이트 + localStorage override 저장 */
    setItems((prev) => {
      const next = prev.map((t) => t.id === id ? { ...t, done: v } : t);
      try {
        const ov = JSON.parse(localStorage.getItem('worklog.gantt.seedOverrides') || '{}');
        ov[id] = { ...(ov[id] || {}), done: v };
        localStorage.setItem('worklog.gantt.seedOverrides', JSON.stringify(ov));
      } catch (e) {}
      return next;
    });
  }

  /* 액션: 일지에 기록 — 해당 task의 journalDate(또는 오늘)로 이동 + 체크리스트 항목 append */
  function logToJournal(item) {
    const date = item._journalDate || TODAY;
    if (setSelectedDate) setSelectedDate(date);
    if (setView) setView('dashboard');
    // 대시보드 mount + 해당 날짜 일지 로딩이 끝날 시간 확보 후 이벤트 발행
    setTimeout(() => {
      const line = `- [ ] ${item.name} 📌${item.project ? ` @${item.project}` : ''}`;
      window.dispatchEvent(new CustomEvent('worklog:append-journal', { detail: { date, line } }));
      // 텍스트영역으로 스크롤 + focus
      const ta = document.querySelector('.journal-textarea');
      if (ta) ta.focus();
    }, 400);
    toast(`📝 ${formatKoreanDate(date)} 일지에 "${item.name}" 추가됨`, { kind: 'success', duration: 3000 });
  }

  /* 액션: 일정에서 제거 — task 기반은 hide, 시드 항목은 setItems에서 제거 */
  async function removeFromGantt(item) {
    if (item._isTask) {
      setHiddenTaskIds((prev) => {const n = new Set(prev);n.add(item._taskId);return n;});
      toast(`✕ "${item.name}" 일정에서 숨김 (할일은 그대로 유지)`, { duration: 3000 });
    } else {
      setItems((prev) => prev.filter((t) => t.id !== item.id));
      /* 시드 항목 제거를 localStorage에 영속화 — 탭 이동/새로고침 후에도 유지 */
      try {
        const removed = new Set(JSON.parse(localStorage.getItem('worklog.gantt.removedSeedIds') || '[]'));
        removed.add(item.id);
        localStorage.setItem('worklog.gantt.removedSeedIds', JSON.stringify([...removed]));
      } catch (e) {}
      toast(`✕ "${item.name}" 일정에서 제거됨`, { duration: 2500 });
    }
    setSelectedId(null);
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
      {/* 필터 바 */}
      <div className="gantt-filter-bar">
        <span style={{ fontSize: 11, color: 'var(--text-3)', fontWeight: 600 }}>프로젝트</span>
        {['전체', ...PROJECTS].map((p) =>
        <div key={p} className={`filter-chip${effectiveProj === p ? ' active' : ''}`} onClick={() => setPFilter(p)}>{p}</div>
        )}
        <div style={{ width: 1, height: 16, background: 'var(--border)', margin: '0 4px' }} />
        <span style={{ fontSize: 11, color: 'var(--text-3)', fontWeight: 600 }}>우선순위</span>
        {['전체', 'A', 'B', 'C'].map((p) =>
        <div key={p} className={`filter-chip${prioFilter === p ? ' active' : ''}`} onClick={() => setPrioFilter(p)}>{p}</div>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: 'var(--text-4)' }}>줌</span>
          <button className="btn btn-sm" onClick={() => setZoom((z) => Math.max(50, z - 20))}>−</button>
          <span style={{ fontSize: 11, color: 'var(--text-3)', minWidth: 34, textAlign: 'center' }}>{Math.round(colW)}px</span>
          <button className="btn btn-sm" onClick={() => setZoom((z) => Math.min(160, z + 20))}>+</button>
          <div style={{ width: 1, height: 16, background: 'var(--border)', margin: '0 4px' }} />
          <button className="btn btn-sm" onClick={onImport}>📥 엑셀</button>
          <button className="btn btn-primary btn-sm">+ 항목 추가</button>
        </div>
      </div>

      {/* 본문: Names | Chart | Detail */}
      <div className="gantt-wrap">
        {/* Names */}
        <div className="gantt-names">
          <div className="gantt-names-header">
            <span style={{ fontSize: 11, color: 'var(--text-4)', fontWeight: 600, letterSpacing: '.5px' }}>TASK ({filtered.length})</span>
          </div>
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {filtered.map((t) =>
            <div key={t.id}
            className={`gantt-name-cell${selectedId === t.id ? ' selected' : ''}`}
            onClick={() => setSelectedId(t.id)}>
              
                <div className="proj-dot" style={{ background: PROJ_COLORS[t.project], width: 8, height: 8 }} />
                <span className="gantt-name-text">{t.name}</span>
                {t._isTask && <span title="할일 목록의 Task" style={{ fontSize: 10, color: 'var(--accent)', opacity: .8 }}>🔗</span>}
                <span className={`badge-prio-${t.priority.toLowerCase()}`}>{t.priority}</span>
              </div>
            )}
            {filtered.length === 0 &&
            <div style={{ padding: '24px 14px', fontSize: 12, color: 'var(--text-4)', textAlign: 'center' }}>일정 없음</div>
            }
          </div>
        </div>

        {/* Chart */}
        <div className="gantt-chart-area" ref={chartScrollRef}>
          <div className="gantt-chart-inner" style={{ minWidth: totalW }}>
            {/* 헤더 (sticky) */}
            <div style={{ position: 'sticky', top: 0, zIndex: 3, background: 'var(--surface)' }}>
              {/* 월 라벨 */}
              <div className="gantt-month-row">
                {monthGroups.map((g, i) =>
                <div key={i} className="gantt-month-cell" style={{ width: g.count * colW, flexShrink: 0 }}>
                    {g.month}월
                  </div>
                )}
              </div>
              {/* 주 라벨 */}
              <div className="gantt-week-row">
                {WEEKS.map((w, i) => {
                  const isCurrent = i === todayWeekIdx;
                  return (
                    <div key={i} className={`gantt-week-cell${isCurrent ? ' current' : ''}`} style={{ width: colW }}>
                      {w}
                    </div>);

                })}
              </div>
            </div>

            {/* Body */}
            <div className="gantt-chart-body" style={{ minWidth: totalW }}>
              {/* 그리드 라인 (한 번에) */}
              <div className="gantt-grid-bg" style={{ backgroundSize: `${colW}px 100%` }} />

              {/* 현재 주 칼럼 음영 */}
              <div style={{ position: 'absolute', top: 0, bottom: 0, left: todayWeekIdx * colW, width: colW, background: 'var(--accent-light)', opacity: .3, pointerEvents: 'none' }} />

              {/* 행들 */}
              {filtered.map((t) => {
                const color = PROJ_COLORS[t.project] || 'var(--text-3)';
                const left = t.startWeek * colW + 4;
                const width = (t.endWeek - t.startWeek + 1) * colW - 8;
                const isDone = t.done >= 100;
                const dd = dDay(t.endWeek);
                const showDd = !isDone && t.priority === 'A' && dd && parseInt(dd.replace(/\D/g, '') || '99') <= 7;
                return (
                  <div key={t.id}
                  className={`gantt-row${selectedId === t.id ? ' selected' : ''}`}
                  onClick={() => setSelectedId(t.id)}>
                    
                    <div className="gantt-bar"
                    title={`${t.name} · ${t.done}% · ${WEEKS[t.startWeek]}~${WEEKS[t.endWeek]}`}
                    style={{ left, width, background: isDone ? 'var(--text-4)' : color }}>
                      
                      <div className="gantt-progress" style={{ width: `${t.done}%` }} />
                    </div>
                    {/* 막대 우측 외부 라벨: 진행률 + D-day */}
                    <div className="gantt-bar-label-out" style={{ left: left + width + 6 }}>
                      {t.done}%
                      {showDd && <span className="gantt-d-chip">{dd}</span>}
                    </div>
                  </div>);

              })}

              {/* 오늘 라인 (전체 높이) */}
              <div className="gantt-today-line" style={{ left: todayX }} />
            </div>

            {/* 오늘 라벨 (sticky 헤더 위에 표시) */}
            <div className="gantt-today-label" style={{ left: todayX, top: 18 }}>{todayLabel}</div>
          </div>
        </div>

        {/* 상세 패널 */}
        {selected &&
        <div className="gantt-detail-panel">
            <div className="gantt-detail-head">
              <div className="proj-dot" style={{ background: PROJ_COLORS[selected.project], width: 10, height: 10, marginTop: 5 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)', lineHeight: 1.4 }}>{selected.name}</div>
                <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 3 }}>{selected.project}</div>
              </div>
              <button className="icon-btn" onClick={() => setSelectedId(null)} title="닫기">✕</button>
            </div>
            <div className="gantt-detail-body">
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">우선순위</div>
                <div><span className={`badge-prio-${selected.priority.toLowerCase()}`}>{selected.priority}</span></div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">기간</div>
                <div className="gantt-detail-value">{WEEKS[selected.startWeek]} ~ {WEEKS[selected.endWeek]} <span style={{ color: 'var(--text-4)' }}>({selected.endWeek - selected.startWeek + 1}주)</span></div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">남은 일수</div>
                <div className="gantt-detail-value" style={{ color: dDay(selected.endWeek) ? 'var(--red)' : 'var(--green)' }}>
                  {dDay(selected.endWeek) || '✓ 마감 경과'}
                </div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">진행률 — {selected.done}%</div>
                <input type="range" min="0" max="100" step="5"
              className="gantt-progress-input"
              value={selected.done}
              onChange={(e) => updateProgress(selected.id, parseInt(e.target.value))} />
              
                <div style={{ display: 'flex', gap: 4, marginTop: 4 }}>
                  {[0, 25, 50, 75, 100].map((v) =>
                <button key={v} className="btn btn-sm" style={{ flex: 1, padding: '2px 0' }} onClick={() => updateProgress(selected.id, v)}>{v}</button>
                )}
                </div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">액션</div>
                <button className="btn btn-sm" onClick={() => logToJournal(selected)} title={`${selected._journalDate || TODAY} 일지로 이동 — 이 항목이 체크리스트로 추가되어요`}>
                  📝 {formatKoreanDate(selected._journalDate || TODAY)} 일지에 기록
                </button>
                <button className="btn btn-sm" onClick={() => removeFromGantt(selected)} style={{ color: 'var(--red)' }}>✕ 일정에서 제거</button>
                {selected._isTask &&
              <div style={{ fontSize: 10, color: 'var(--text-4)', marginTop: 4, lineHeight: 1.5 }}>
                    🔗 이 항목은 <strong>할일 목록</strong>의 Task에서 자동 표시되는 일정이에요.{'\n'}제거해도 할일은 남아있어요.
                  </div>
              }
              </div>
            </div>
          </div>
        }
      </div>

      {/* 범례 */}
      <div className="gantt-legend">
        {Object.entries(PROJ_COLORS).filter(([k]) => k !== '전체').slice(0, 6).map(([p, c]) =>
        <div key={p} className="legend-item">
            <div className="legend-dot" style={{ background: c }} />

/* ─── Weekly View ─── */
function WeeklyView({ tasks, dataVersion }) {
  /* 오늘이 속한 주의 월~금 (ISO 주, 월요일 시작) */
  const { weekStart, weekEnd, WEEK_DATES } = (() => {
    const t = new Date();t.setHours(0, 0, 0, 0);
    const dow = (t.getDay() + 6) % 7; // 월=0 ... 일=6
    const mon = new Date(t);mon.setDate(t.getDate() - dow);
    const sun = new Date(mon);sun.setDate(mon.getDate() + 6);
    const weekDates = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(mon);d.setDate(mon.getDate() + i);
      weekDates.push(localYMD(d));
    }
    return { weekStart: localYMD(mon), weekEnd: localYMD(sun), WEEK_DATES: weekDates };
  })();
  const DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];

  /* 백엔드 주간 통계 */
  const [stats, setStats] = useState(null);
  useEffect(() => {
    let cancelled = false;
    GET(`/api/stats/weekly?start=${weekStart}&end=${weekEnd}`).
    then((s) => {if (!cancelled) setStats(s);}).
    catch((_) => {});
    return () => {cancelled = true;};
  }, [dataVersion, weekStart, weekEnd]);

  /* 이번 주 통계 — 백엔드 우선, 폴백은 클라이언트 계산 */
  const weekTasks = tasks.filter((t) => t.createdAt >= weekStart && t.createdAt <= weekEnd);
  const total = (stats && stats.total) ?? (weekTasks.length || 5);
  const done = (stats && stats.done) ?? (tasks.filter((t) => t.status === 'DONE' && t.updatedAt >= weekStart).length || 3);
  const active = (stats && stats.active) ?? tasks.filter((t) => ['TODO', 'DOING'].includes(t.status)).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  /* 히트맵 */
  function heatLevel(c) {if (!c) return 0;if (c === 1) return 1;if (c <= 3) return 2;if (c <= 6) return 3;return 4;}
  const firstDate = new Date(HEATMAP_DATA[0].date + 'T00:00:00');
  const startDow = (firstDate.getDay() + 6) % 7; // 월=0
  const padded = [...Array(startDow).fill(null), ...HEATMAP_DATA];
  while (padded.length % 7 !== 0) padded.push(null);
  const numWeeks = padded.length / 7;

  const [tooltip, setTooltip] = React.useState(null);

  /* 일지 내용 펼침 상태 */
  const [expanded, setExpanded] = React.useState({});
  const toggle = (d) => setExpanded((p) => ({ ...p, [d]: !p[d] }));

  const Card = ({ children, style }) =>
  <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '16px 20px', boxShadow: 'var(--shadow)', ...style }}>{children}</div>;


  return (
    <div style={{ padding: 24, overflow: 'auto', height: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>

      {/* 통계 카드 3개 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12 }}>
        {[
        { n: total, l: '이번 주 등록', c: 'var(--text)' },
        { n: done, l: '완료', c: 'var(--green)' },
        { n: `${pct}%`, l: '완료율', c: 'var(--accent)' }].
        map((s, i) =>
        <Card key={i} style={{ textAlign: 'center', padding: '18px 16px' }}>
            <div style={{ fontSize: 32, fontWeight: 700, color: s.c }}>{s.n}</div>
            <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 4 }}>{s.l}</div>
          </Card>
        )}
      </div>

      {/* 완료율 바 */}
      <Card>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>이번 주 완료율</span>
          <span style={{ fontSize: 12, color: 'var(--green)', fontWeight: 700 }}>{pct}%</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>4/21 ~ 4/27</span>
          <span style={{ fontSize: 11, color: 'var(--text-3)' }}>진행/대기 {active}개</span>
        </div>
        <div className="progress-bar" style={{ height: 8 }}>
          <div className="progress-fill" style={{ width: `${pct}%`, background: 'var(--green)' }} />
        </div>
      </Card>

      {/* 히트맵 */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>🌿 최근 35일 완료 현황</span>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center', fontSize: 11, color: 'var(--text-3)' }}>
            <span>적음</span>
            {[0, 1, 2, 3, 4].map((l) =>
            <div key={l} className={`heat-cell heat-${l}`} style={{ width: 12, height: 12, borderRadius: 3 }} />
            )}
            <span>많음</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'flex-start' }}>
          {/* 요일 레이블 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3, paddingTop: 2 }}>
            {DAYS_KO.map((d) =>
            <div key={d} style={{ width: 18, height: 14, fontSize: 10, color: 'var(--text-3)', lineHeight: '14px', textAlign: 'right' }}>{d}</div>
            )}
          </div>
          {/* 그리드 */}
          <div style={{ display: 'grid', gridTemplateRows: 'repeat(7,14px)', gridTemplateColumns: `repeat(${numWeeks},14px)`, gridAutoFlow: 'column', gap: 3 }}>
            {padded.map((d, i) => d ?
            <div key={i}
            className={`heat-cell heat-${heatLevel(d.count)}`}
            style={{ width: 14, height: 14, borderRadius: 3, cursor: 'default' }}
            onMouseEnter={(e) => setTooltip({ text: `${d.date}  완료 ${d.count}개`, x: e.clientX, y: e.clientY })}
            onMouseLeave={() => setTooltip(null)} /> :


            <div key={i} style={{ width: 14, height: 14, visibility: 'hidden' }} />
            )}
          </div>
        </div>
        {tooltip &&
        <div style={{ position: 'fixed', left: tooltip.x + 12, top: tooltip.y - 28, background: 'var(--text)', color: 'var(--surface)', padding: '4px 10px', borderRadius: 6, fontSize: 12, pointerEvents: 'none', zIndex: 200, boxShadow: 'var(--shadow-md)' }}>
            {tooltip.text}
          </div>
        }
      </Card>

      {/* 날짜별 일지 */}
      <Card>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 14 }}>📝 이번 주 일지</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
          {WEEK_DATES.map((date) => {
            const j = WEEKLY_JOURNALS.find((j) => j.date === date);
            const dow = DAYS_KO[new Date(date + 'T00:00:00').getDay() - 1] || '일';
            const isOpen = expanded[date];
            return (
              <div key={date} style={{ borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border)', marginBottom: 6 }}>
                <div
                  onClick={() => toggle(date)}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 14px', cursor: 'pointer', background: isOpen ? 'var(--surface-2)' : 'transparent' }}>
                  
                  <span style={{ fontSize: 11, color: 'var(--text-4)', width: 16 }}>{dow}</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-2)' }}>{date}</span>
                  {j ? <span style={{ fontSize: 11, background: 'var(--accent-light)', color: 'var(--accent-text)', borderRadius: 99, padding: '1px 8px', marginLeft: 'auto' }}>기록 있음</span> :
                  <span style={{ fontSize: 11, color: 'var(--text-4)', marginLeft: 'auto' }}>기록 없음</span>}
                  <span style={{ fontSize: 10, color: 'var(--text-4)', marginLeft: 4 }}>{isOpen ? '▲' : '▼'}</span>
                </div>
                {isOpen &&
                <div style={{ padding: '10px 14px 12px', borderTop: '1px solid var(--border)', background: 'var(--surface)' }}>
                    {j ?
                  <pre style={{ fontFamily: 'var(--mono)', fontSize: 12, whiteSpace: 'pre-wrap', color: 'var(--text-2)', lineHeight: 1.8, margin: 0 }}>{j.content}</pre> :
                  <span style={{ fontSize: 12, color: 'var(--text-4)' }}>이 날 일지가 비어있어요.</span>
                  }
                  </div>
                }
              </div>);

          })}
        </div>
      </Card>
    </div>);

}

/* ─── Task 정리 View ─── */
function TaskCleanupView({ tasks, setTasks, onResume, refreshTasks }) {
  const toast = useToast();
  function daysDiff(dateStr) {
    return Math.floor((new Date(TODAY) - new Date(dateStr + 'T00:00:00')) / 86400000);
  }

  const stale = tasks.filter((t) => ['TODO', 'DOING'].includes(t.status) && daysDiff(t.updatedAt) >= 7);
  const cancelled = tasks.filter((t) => t.status === 'CANCELLED');

  async function setStatus(id, status) {
    const task = tasks.find((t) => t.id === id);
    setTasks((prev) => prev.map((t) => t.id === id ? { ...t, status, updatedAt: TODAY } : t));
    try {await POST(`/api/tasks/${id}/status`, { status });}
    catch (e) {console.error(e);refreshTasks && refreshTasks();}
    if (status === 'DOING' && task) {
      toast(`▶ "${task.title}" 진행 중으로 옮겼어요`, {
        kind: 'success',
        actionLabel: '대시보드 보기 →',
        onAction: () => onResume && onResume()
      });
    } else if (status === 'DONE' && task) {
      toast(`✓ "${task.title}" 완료 처리됐어요`, { kind: 'success' });
    }
  }
  async function deleteTask(id) {
    setTasks((prev) => prev.filter((t) => t.id !== id));
    try {await POST(`/api/tasks/${id}/delete`, {});}
    catch (e) {console.error(e);refreshTasks && refreshTasks();}
  }

  const prioIcon = (p) => ({ A: '🔴', B: '🟡', C: '⚪' })[p] || '⚪';

  const Section = ({ title, subtitle, children, empty }) =>
  <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, boxShadow: 'var(--shadow)', overflow: 'hidden' }}>
      <div style={{ padding: '14px 20px 10px', borderBottom: '1px solid var(--border)' }}>
        <div style={{ fontSize: 14, fontWeight: 700 }}>{title}</div>
        {subtitle && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{subtitle}</div>}
      </div>
      {children ?
    <div style={{ padding: '4px 0' }}>{children}</div> :
    <div style={{ padding: '20px', fontSize: 13, color: 'var(--text-4)', textAlign: 'center' }}>{empty}</div>
    }
    </div>;


  const TaskRow = ({ t, actions }) =>
  <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 20px', borderBottom: '1px solid var(--border)' }}>
      <span style={{ fontSize: 14 }}>{prioIcon(t.priority)}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, color: 'var(--text-2)', fontWeight: 500 }}>{t.title}</div>
        <div style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-4)', marginTop: 2, flexWrap: 'wrap' }}>
          {t.project && <span>📁 {t.project}</span>}
          {t.deadline && <span>📅 {t.deadline}</span>}
          {t.note && <span>📌 {t.note}</span>}
          <span style={{ color: 'var(--amber)' }}>⏱ {daysDiff(t.updatedAt)}일째 미변경</span>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>{actions}</div>
    </div>;


  const Btn = ({ onClick, children, color }) =>
  <button className="btn btn-sm" onClick={onClick} style={color ? { color } : {}}>{children}</button>;


  return (
    <div style={{ padding: 24, overflow: 'auto', height: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>

      {/* 요약 배너 */}
      {(stale.length > 0 || cancelled.length > 0) &&
      <div style={{ background: 'var(--amber-light)', border: '1px solid var(--amber)', borderRadius: 8, padding: '12px 16px', fontSize: 13, color: 'var(--amber)', display: 'flex', gap: 16 }}>
          {stale.length > 0 && <span>⏳ 방치 Task <strong>{stale.length}개</strong></span>}
          {cancelled.length > 0 && <span>✕ 취소됨 <strong>{cancelled.length}개</strong></span>}
          <span style={{ marginLeft: 'auto', color: 'var(--text-3)', fontSize: 12 }}>정리하면 브리핑이 더 깔끔해져요 😊</span>
        </div>
      }

      {/* 방치 Task */}
      <Section
        title="⏳ 방치된 Task"
        subtitle={`7일 이상 상태 변경 없는 Task · ${stale.length}개`}
        empty="방치된 Task가 없어요! 깔끔하네요 ✅">
        
        {stale.length > 0 && stale.map((t) =>
        <TaskRow key={t.id} t={t} actions={<>
            <Btn onClick={() => setStatus(t.id, 'DONE')} color="var(--green)">✓ 완료</Btn>
            <Btn onClick={() => setStatus(t.id, 'DOING')}>▶ 진행</Btn>
            <Btn onClick={() => setStatus(t.id, 'CANCELLED')} color="var(--red)">✕ 취소</Btn>
          </>} />
        )}
      </Section>

      {/* CANCELLED */}
      <Section
        title="✕ 취소된 Task"
        subtitle={`취소 처리된 Task · ${cancelled.length}개`}
        empty="취소된 Task가 없어요.">
        
        {cancelled.length > 0 && cancelled.map((t) =>
        <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 20px', borderBottom: '1px solid var(--border)', opacity: .75 }}>
            <span style={{ fontSize: 14 }}>{prioIcon(t.priority)}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, color: 'var(--text-3)', textDecoration: 'line-through' }}>{t.title}</div>
              <div style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-4)', marginTop: 2, flexWrap: 'wrap' }}>
                {t.project && <span>📁 {t.project}</span>}
                {t.note && <span>📌 {t.note}</span>}
                <span>{t.updatedAt} 취소</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
              <Btn onClick={() => setStatus(t.id, 'TODO')}>↩ 복구</Btn>
              <Btn onClick={() => deleteTask(t.id)} color="var(--red)">🗑 삭제</Btn>
            </div>
          </div>
        )}
      </Section>
    </div>);

}

/* ─── ProjectManager Modal ─── */
function ProjectManager({ projects, projectsRaw = [], setProjects, onClose, refreshProjects }) {
  const [input, setInput] = useState('');
  const [pickerFor, setPickerFor] = useState(null); // 색상 picker 열린 프로젝트 이름

  /* 추천 색상 팔레트 */
  const COLOR_SWATCHES = [
  '#6366f1', '#2563eb', '#0ea5e9', '#06b6d4', '#10b981', '#16a34a',
  '#84cc16', '#eab308', '#f59e0b', '#f97316', '#ef4444', '#dc2626',
  '#ec4899', '#d946ef', '#a855f7', '#7c3aed', '#64748b', '#475569'];


  async function add() {
    const name = input.trim();
    if (!name || projects.includes(name)) return;
    setProjects((prev) => [...prev, name]); // 낙관적
    setInput('');
    try {await POST('/api/projects/add', { name });refreshProjects && refreshProjects();}
    catch (e) {console.error(e);refreshProjects && refreshProjects();}
  }
  async function remove(p) {
    setProjects((prev) => prev.filter((x) => x !== p));
    const raw = projectsRaw.find((x) => x.name === p);
    if (!raw) {refreshProjects && refreshProjects();return;}
    try {await POST(`/api/projects/${raw.id}/delete`, {});refreshProjects && refreshProjects();}
    catch (e) {console.error(e);refreshProjects && refreshProjects();}
  }
  async function changeColor(p, color) {
    const raw = projectsRaw.find((x) => x.name === p);
    if (raw) PROJ_COLORS[p] = color; // 낙관적 (다음 렌더에서 반영)
    setPickerFor(null);
    if (!raw) return;
    try {await POST(`/api/projects/${raw.id}/color`, { color });refreshProjects && refreshProjects();}
    catch (e) {console.error(e);refreshProjects && refreshProjects();}
  }
  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 380 }}>
        <div className="modal-header">
          <div className="modal-title">📁 프로젝트 관리</div>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-3)', fontSize: 18 }} onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ display: 'flex', gap: 6 }}>
            <input
              style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '6px 10px', fontSize: 13, fontFamily: 'var(--font)', background: 'var(--surface)', color: 'var(--text)', outline: 'none' }}
              placeholder="새 프로젝트 이름..."
              value={input} onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && add()} />
            
            <button className="btn btn-primary btn-sm" onClick={add}>+ 추가</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginTop: 4 }}>
            {projects.map((p, i) => {
              const fallback = Object.values(PROJ_COLORS)[i % Object.values(PROJ_COLORS).length];
              const color = PROJ_COLORS[p] || fallback;
              const open = pickerFor === p;
              return (
                <div key={p} style={{ display: 'flex', flexDirection: 'column', background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 10px' }}>
                    <button
                      onClick={() => setPickerFor(open ? null : p)}
                      title="색상 변경"
                      style={{ width: 14, height: 14, borderRadius: '50%', background: color, border: '1px solid rgba(0,0,0,.1)', cursor: 'pointer', padding: 0 }} />
                    
                    <span style={{ flex: 1, fontSize: 13, color: 'var(--text-2)' }}>{p}</span>
                    <button className="icon-btn" style={{ color: 'var(--red)', borderColor: 'transparent' }} onClick={() => remove(p)}>✕</button>
                  </div>
                  {open &&
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, padding: '6px 10px 10px 10px', borderTop: '1px solid var(--border)' }}>
                      {COLOR_SWATCHES.map((c) =>
                    <button
                      key={c}
                      onClick={() => changeColor(p, c)}
                      title={c}
                      style={{ width: 18, height: 18, borderRadius: '50%', background: c, border: c === color ? '2px solid var(--text)' : '1px solid rgba(0,0,0,.1)', cursor: 'pointer', padding: 0 }} />

                    )}
                    </div>
                  }
                </div>);

            })}
          </div>
        </div>
        <div className="modal-footer" style={{ justifyContent: 'flex-end' }}>
          <button className="btn btn-primary" onClick={onClose}>완료</button>
        </div>
      </div>
    </div>);

}

                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)', marginBottom: 6 }}>📌 엑셀 형식 안내</div>
                <div style={{ fontSize: 12, color: 'var(--text-3)', lineHeight: 1.9 }}>
                  · <b>1행</b>: Task 이름 (열 헤더)<br />
                  · <b>A열</b>: 주차 라벨 (예: 4/1주, 4/8주)<br />
                  · <b>색칠된 셀</b> = 해당 주에 진행 중<br />
                  · 테마 색상 대신 <b>직접 RGB 색상</b>으로 저장 권장
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <span />
              <button className="btn" onClick={onClose}>취소</button>
            </div>
          </>
        }

        {step === 2 &&
        <>
            <div className="modal-body" style={{ padding: '14px 20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <span style={{ fontSize: 12, color: 'var(--text-3)' }}>schedule.xlsx · 5개 항목 감지됨</span>
                <span className="badge badge-green">✓ 파싱 성공</span>
              </div>
              <table className="preview-table">
                <thead>
                  <tr><th>Task 이름</th><th>색상</th><th>기간</th><th>프로젝트</th></tr>
                </thead>
                <tbody>
                  {PREVIEW.map((t, i) =>
                <tr key={i}>
                      <td style={{ fontWeight: 500 }}>{t.name}</td>
                      <td><div style={{ width: 20, height: 14, background: t.color, borderRadius: 2, display: 'inline-block' }} /></td>
                      <td style={{ color: 'var(--text-3)' }}>{t.period}</td>
                      <td>
                        <select className="proj-select" defaultValue={t.proj}>
                          {PROJECTS.map((p) => <option key={p}>{p}</option>)}
                        </select>
                      </td>
                    </tr>
                )}
                </tbody>
              </table>
              <div style={{ marginTop: 10, padding: '7px 10px', background: 'var(--amber-light)', borderRadius: 4, fontSize: 11, color: 'var(--amber)' }}>
                ⚠ 테마 색상 셀이 감지됐어요. 해당 항목은 "개발"로 자동 매핑했어요.
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={() => setStep(1)}>← 뒤로</button>
              <button className="btn btn-primary" onClick={() => setStep(3)}>가져오기 →</button>
            </div>
          </>
        }

        {step === 3 &&
        <>
            <div className="modal-body" style={{ textAlign: 'center', padding: '28px 20px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
              <div style={{ fontSize: 52 }}>✅</div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>가져오기 완료!</div>
              <div style={{ fontSize: 13, color: 'var(--text-3)' }}>5개 Task를 전체 일정에 추가했어요</div>
              <div style={{ background: 'var(--green-light)', border: '1px solid var(--green)', borderRadius: 6, padding: '8px 16px', fontSize: 12, color: 'var(--green)', fontWeight: 500 }}>
                보고서 2개 · 개발 2개 · 팀 운영 1개
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-4)' }}>다음번엔 같은 파일 업로드 시 자동으로 업데이트해요</div>
            </div>
            <div className="modal-footer">
              <span />
              <button className="btn btn-primary" onClick={onClose}>전체 일정 보러 가기 →</button>
            </div>
          </>
        }
      </div>
    </div>);

}

/* ─── Toast Context ─── */
const ToastCtx = React.createContext(null);
function useToast() {return React.useContext(ToastCtx);}

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const show = React.useCallback((msg, opts = {}) => {
    const id = Date.now() + Math.random();
    setToasts((t) => [...t, { id, msg, ...opts }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), opts.duration || 3500);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="toast-stack">
        {toasts.map((t) =>
        <div key={t.id} className={`toast ${t.kind === 'success' ? 'toast-success' : ''}`}>
            <span>{t.msg}</span>
            {t.actionLabel && <span className="toast-action" onClick={() => {t.onAction && t.onAction();}}>{t.actionLabel}</span>}
          </div>
        )}
      </div>
    </ToastCtx.Provider>);

}

/* ─── Shortcuts Modal ─── */
function ShortcutsModal({ onClose }) {
  const isMac = navigator.platform.toLowerCase().includes('mac');
  const Mod = isMac ? '⌘' : 'Ctrl';
  const rows = [
  [`${Mod} + K`, '검색'],
  [`${Mod} + N`, '빠른 추가에 포커스'],
  [`${Mod} + J`, '저널에 포커스'],
  [`${Mod} + ←`, '하루 전 저널'],
  [`${Mod} + →`, '하루 후 저널'],
  [`${Mod} + D`, '다크모드 토글'],
  ['?', '이 도움말 열기/닫기'],
  ['Esc', '모달 닫기']];

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.4)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '18px 22px', minWidth: 340, boxShadow: 'var(--shadow-lg)' }}>
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>⌨ 키보드 단축키</div>
          <button className="icon-btn" style={{ marginLeft: 'auto' }} onClick={onClose}>✕</button>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {rows.map(([k, d]) =>
          <div key={k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 0', fontSize: 12 }}>
              <span style={{ color: 'var(--text-2)' }}>{d}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-3)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 8px', background: 'var(--surface-2)' }}>{k}</span>
            </div>
          )}
        </div>
      </div>
    </div>);

}

/* ─── Tweaks (mood / density / voice) ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "graphite",
  "density": "compact",
  "voice": "soft"
}/*EDITMODE-END*/;

function TweaksUI({ values, setTweak }) {
  React.useEffect(() => {
    const root = document.documentElement;
    if (values.mood && values.mood !== 'paper') root.setAttribute('data-mood', values.mood);else
    root.removeAttribute('data-mood');
    if (values.density && values.density !== 'standard') root.setAttribute('data-density', values.density);else
    root.removeAttribute('data-density');
    if (values.voice && values.voice !== 'neutral') root.setAttribute('data-voice', values.voice);else
    root.removeAttribute('data-voice');
  }, [values.mood, values.density, values.voice]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Mood" />
      <TweakRadio label="Palette" value={values.mood}
      options={[
      { value: 'paper', label: 'Paper' },
      { value: 'graphite', label: 'Graphite' },
      { value: 'lab', label: 'Lab' }]
      }
      onChange={(v) => setTweak('mood', v)} />
      <div style={{ fontSize: 10, color: 'rgba(41,38,27,.5)', lineHeight: 1.5, marginTop: -4 }}>
        {values.mood === 'paper' && 'Warm beige · indigo accent · journal-on-paper'}
        {values.mood === 'graphite' && 'Cool ink-on-newsprint · charcoal accent'}
        {values.mood === 'lab' && 'Clinical white · electric mint accent · max contrast'}
      </div>

      <TweakSection label="Density" />
      <TweakRadio label="Layout" value={values.density}
      options={[
      { value: 'cozy', label: 'Cozy' },
      { value: 'standard', label: 'Default' },
      { value: 'compact', label: 'Compact' }]
      }
      onChange={(v) => setTweak('density', v)} />
      <div style={{ fontSize: 10, color: 'rgba(41,38,27,.5)', lineHeight: 1.5, marginTop: -4 }}>
        {values.density === 'cozy' && 'Breathable journal · larger type, taller rows'}
        {values.density === 'standard' && 'Balanced dashboard'}
        {values.density === 'compact' && 'Ops-console density · everything on one screen'}
      </div>

      <TweakSection label="Voice" />
      <TweakRadio label="Personality" value={values.voice}
      options={[
      { value: 'soft', label: 'Soft' },
      { value: 'neutral', label: 'Neutral' },
      { value: 'terminal', label: 'Terminal' }]
      }
      onChange={(v) => setTweak('voice', v)} />
      <div style={{ fontSize: 10, color: 'rgba(41,38,27,.5)', lineHeight: 1.5, marginTop: -4 }}>
        {values.voice === 'soft' && 'Serif headings · pill buttons · gentle radii'}
        {values.voice === 'neutral' && 'Inter sans · the original house style'}
        {values.voice === 'terminal' && 'Mono everywhere · brackets, hashes, sharp corners'}
      </div>
    </TweaksPanel>);

}

/* ─── App ─── */
function App() {
  const today = useToday(); /* 자정 넘어가면 자동 갱신 */
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dark, setDark] = useState(() => {
    try {return JSON.parse(localStorage.getItem('worklog.dark') || 'false');} catch (e) {return false;}
  });
  useEffect(() => {localStorage.setItem('worklog.dark', JSON.stringify(dark));}, [dark]);
  const [view, setView] = useState('dashboard');
  const [tasks, setTasks] = useState(INIT_TASKS);
  const [projFilter, setProjFilter] = useState('전체');
  const [showExcel, setShowExcel] = useState(false);
  const [projects, setProjects] = useState(PROJECTS);
  const [projectsRaw, setProjectsRaw] = useState([]); // [{id,name,color}, ...]
  const [showProjMgr, setShowProjMgr] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [dataVersion, setDataVersion] = useState(0); // ALL_JOURNALS/HEATMAP_DATA 갱신 트리거

  /* 백엔드에서 task/projects 다시 불러오기 */
  const refreshTasks = useCallback(async () => {
    try {
      const data = await GET('/api/tasks/all');
      setTasks(data.map(normalizeTask));
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshTasks failed:', e);}
  }, []);

  const refreshProjects = useCallback(async () => {
    try {
      const data = await GET('/api/projects');
      setProjectsRaw(data);
      const names = data.map((p) => p.name);
      setProjects(names);
      PROJECTS = names;
      data.forEach((p) => {PROJ_COLORS[p.name] = p.color;});
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshProjects failed:', e);}
  }, []);

  const refreshHeatmap = useCallback(async () => {
    try {
      const data = await GET('/api/heatmap?days=35');
      HEATMAP_DATA = data;
      setDataVersion((v) => v + 1);
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshHeatmap failed:', e);}
  }, []);

  /* 검색용 전체 일지 (90일치) — 검색 모달 열 때 fetch */
  const refreshAllJournals = useCallback(async () => {
    try {
      const end = new Date();
      const start = new Date();start.setDate(start.getDate() - 90);
      const data = await GET(`/api/journals/range?start=${localYMD(start)}&end=${localYMD(end)}`);
      ALL_JOURNALS = data.filter((j) => j.content && j.content.trim());
      recomputeTagFreq();
      setDataVersion((v) => v + 1);
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshAllJournals failed:', e);}
  }, []);

  /* MiniCalendar 점 — 현재 보이는 달의 일지 있는 날짜 fetch */
  const [journalDates, setJournalDates] = useState({}); // { 'YYYY-MM-DD': true }
  const refreshJournalDates = useCallback(async () => {
    try {
      const now = new Date();
      // 현재 달 + 직전 달 + 다음 달까지 미리 가져와서 캐시
      const months = [-1, 0, 1].map((off) => {
        const d = new Date(now.getFullYear(), now.getMonth() + off, 1);
        return { year: d.getFullYear(), month: d.getMonth() + 1 };
      });
      const all = {};
      for (const m of months) {
        try {
          const dates = await GET(`/api/journals/dates?year=${m.year}&month=${m.month}`);
          (dates || []).forEach((d) => {all[d] = true;});
        } catch (_) {}
      }
      setJournalDates(all);
    } catch (e) {if (!__NO_BACKEND__) console.error('refreshJournalDates failed:', e);}
  }, []);

  const bumpDataVersion = useCallback(() => setDataVersion((v) => v + 1), []);

  /* 마운트 시 초기 데이터 로딩 */
  useEffect(() => {
    refreshTasks();
    refreshProjects();
    refreshHeatmap();
    refreshAllJournals();
    refreshJournalDates();
  }, []);

  /* 전역 단축키 */
  useEffect(() => {
    const onKey = (e) => {
      // 입력창/textarea 안에서는 대부분 동작 안 함 (⌘K만 예외)
      const tag = (e.target.tagName || '').toLowerCase();
      const inField = ['input', 'textarea', 'select'].includes(tag) || e.target.isContentEditable;
      const mod = e.metaKey || e.ctrlKey;

      if (mod && e.key === 'k') {e.preventDefault();setShowSearch((s) => !s);return;}
      if (e.key === 'Escape') {
        if (showShortcuts) {setShowShortcuts(false);return;}
        if (showSearch) {setShowSearch(false);return;}
      }
      if (inField) return;

      if (e.key === '?' && !mod) {e.preventDefault();setShowShortcuts((s) => !s);return;}
      if (mod && (e.key === 'd' || e.key === 'D')) {e.preventDefault();setDark((d) => !d);return;}
      if (mod && (e.key === 'n' || e.key === 'N')) {
        e.preventDefault();
        const inp = document.querySelector('.quick-input');
        if (inp) inp.focus();
        return;
      }
      if (mod && (e.key === 'j' || e.key === 'J')) {
        e.preventDefault();
        const ta = document.querySelector('.journal-textarea');
        if (ta) ta.focus();
        return;
      }
      if (mod && e.key === 'ArrowLeft') {
        e.preventDefault();
        setSelectedDate((prev) => {
          const [y, m, d] = prev.split('-').map(Number);
          const dt = new Date(y, m - 1, d);dt.setDate(dt.getDate() - 1);
          return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
        });
        return;
      }
      if (mod && e.key === 'ArrowRight') {
        e.preventDefault();
        setSelectedDate((prev) => {
          const [y, m, d] = prev.split('-').map(Number);
          const dt = new Date(y, m - 1, d);dt.setDate(dt.getDate() + 1);
          return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
        });
        return;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showSearch, showShortcuts]);

  useEffect(() => {
    document.documentElement.setAttribute('data-dark', dark);
  }, [dark]);

  const [selectedDate, setSelectedDate] = useState(TODAY);

  /* 자정 넘어가면 — selectedDate가 어제(=직전 TODAY)였을 경우만 새 TODAY로 따라감.
     사용자가 명시적으로 과거 날짜를 보고 있는 경우엔 그대로 유지. */
  const prevTodayRef = useRef(today);
  useEffect(() => {
    if (prevTodayRef.current !== today) {
      if (selectedDate === prevTodayRef.current) setSelectedDate(today);
      prevTodayRef.current = today;
    }
  }, [today, selectedDate]);

  function handleCalendarSelect(date) {
    setSelectedDate(date);
    setView('dashboard');
  }
  const doingCount = tasks.filter((t) => t.status === 'DOING').length;
  const urgent = tasks.filter((t) => t.status !== 'DONE' && isUrgent(t.deadline));

  return (
    <div className="app">
      <Sidebar view={view} setView={setView} dark={dark} setDark={setDark} projFilter={projFilter} setProjFilter={setProjFilter} projects={projects} onManageProjects={() => setShowProjMgr(true)} onSelectDate={handleCalendarSelect} selectedDate={selectedDate} journalDates={journalDates} />
      <div className="main">
        <div className="main-header">
          {view === 'dashboard' && <>
            <div>
              <div className="header-title">📅 {formatKoreanDate(selectedDate)}</div>
              <div className="header-sub">대시보드</div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginLeft: 'auto', alignItems: 'center' }}>
              <div className="search-bar" onClick={() => setShowSearch(true)} style={{ cursor: 'pointer' }}>
                <span style={{ fontSize: 12, color: 'var(--text-4)' }}>🔍</span>
                <span style={{ flex: 1, fontSize: 12, color: 'var(--text-4)' }}>일지·Task 검색...</span>
                <span className="kbd">{MOD_LABEL}K</span>
              </div>
              <button className="icon-btn" onClick={() => setShowShortcuts(true)} title="키보드 단축키 (?)" style={{ fontSize: 12, padding: '4px 8px' }}>?</button>
              {urgent.length > 0 && <span className="badge badge-red">🔥 마감 {urgent.length}개</span>}
              <span className="badge badge-blue">DOING {doingCount}/5</span>
            </div>
          </>}
          {view === 'briefing' && <>
            <div>
              <div className="header-title">📋 브리핑</div>
              <div className="header-sub">{formatKoreanDate(today)}</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
          {view === 'gantt' && <>
            <div>
              <div className="header-title">📅 전체 일정</div>
              <div className="header-sub">{new Date(today + 'T00:00:00').getFullYear()}년 {new Date(today + 'T00:00:00').getMonth() + 1}월 · 진행 중인 일정</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
          {view === 'cleanup' && <>
            <div>
              <div className="header-title">🧹 Task 정리</div>
              <div className="header-sub">방치 Task와 취소된 Task를 정리하세요</div>
            </div>
            <div style={{ marginLeft: 'auto' }} />
          </>}
        </div>
        <div className="main-body">
          {view === 'dashboard' && <Dashboard tasks={tasks} setTasks={setTasks} projFilter={projFilter} projects={projects} selectedDate={selectedDate} setSelectedDate={setSelectedDate} refreshTasks={refreshTasks} dataVersion={dataVersion} bumpDataVersion={bumpDataVersion} journalDates={journalDates} refreshJournalDates={refreshJournalDates} />}
          {view === 'briefing' && <BriefingView tasks={tasks} dataVersion={dataVersion} />}
          {view === 'gantt' && <GanttView projFilter={projFilter} onImport={() => setShowExcel(true)} tasks={tasks} setSelectedDate={setSelectedDate} setView={setView} refreshTasks={refreshTasks} bumpDataVersion={bumpDataVersion} />}
          {view === 'cleanup' && <TaskCleanupView tasks={tasks} setTasks={setTasks} onResume={() => setView('dashboard')} refreshTasks={refreshTasks} />}
        </div>
      </div>
      {showExcel && <ExcelModal onClose={() => setShowExcel(false)} />}
      {showProjMgr && <ProjectManager projects={projects} projectsRaw={projectsRaw} setProjects={setProjects} refreshProjects={refreshProjects} onClose={() => setShowProjMgr(false)} />}
      {showSearch && <SearchModal tasks={tasks} onClose={() => setShowSearch(false)} onJumpDate={(d) => {setSelectedDate(d);setView('dashboard');}} dataVersion={dataVersion} />}
      {showShortcuts && <ShortcutsModal onClose={() => setShowShortcuts(false)} />}
      <TweaksUI values={tweaks} setTweak={setTweak} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
<div id="root"></div>
</body>
</html>
