function Dashboard({ tasks, setTasks, projFilter, projects, selectedDate, setSelectedDate, refreshTasks, bumpDataVersion, journalDates, refreshJournalDates }) {
  const [newTitle, setNewTitle] = useState('');
  const [newPrio, setNewPrio] = useState('B');
  const [newProj, setNewProj] = useState('');
  const [newDeadline, setNewDeadline] = useState('');

  // 날짜별 저널 캐시: { 'YYYY-MM-DD': '내용...', ... }
  const [journals, setJournals] = useState({});
  const journalText = journals[selectedDate] ?? '';
  const setJournalText = (val) => {
    setJournals((prev) => ({ ...prev, [selectedDate]: typeof val === 'function' ? val(prev[selectedDate] ?? '') : val }));
  };

  /* 외부(간트 등)에서 일지에 항목 추가 요청을 받는 브릿지.
     React controlled textarea에 직접 value 쓰면 onChange가 안 뛰므로
     커스텀 이벤트로 받아서 setJournals를 직접 호출 + 자동저장 트리거 */
  /* 외부(간트 등)에서 일지에 항목 추가 요청을 받는 브릿지.
     load와의 race 방지를 위해 pendingAppends ref에 라인을 큐잉하고,
     load 완료 후 / 즉시 백엔드 합쳐서 저장 */
  const pendingAppendsRef = useRef({}); // { 'YYYY-MM-DD': ['line1', 'line2'] }

  async function flushAppends(date) {
    const lines = pendingAppendsRef.current[date];
    if (!lines || lines.length === 0) return;
    pendingAppendsRef.current[date] = [];
    try {
      // 항상 백엔드 latest 를 기준으로 머지 (load race 회피)
      const latest = (await GET(`/api/journal/${date}`)).content || '';
      const sep = latest && !latest.endsWith('\n') ? '\n' : '';
      const merged = latest + sep + lines.join('\n') + '\n';
      await POST('/journal/save', { date, content: merged });
      setJournals((prev) => ({ ...prev, [date]: merged }));
      refreshJournalDates && refreshJournalDates();
      bumpDataVersion && bumpDataVersion();
    } catch (e) {
      console.error('append-journal failed:', e);
      // 실패시 큐 복구
      pendingAppendsRef.current[date] = [...lines, ...(pendingAppendsRef.current[date] || [])];
    }
  }

  useEffect(() => {
    function onAppend(e) {
      const { date, line } = e.detail || {};
      if (!date || !line) return;
      pendingAppendsRef.current[date] = [...(pendingAppendsRef.current[date] || []), line];
      flushAppends(date);
    }
    window.addEventListener('worklog:append-journal', onAppend);
    return () => window.removeEventListener('worklog:append-journal', onAppend);
    // eslint-disable-next-line
  }, []);

  // 선택 날짜가 바뀌면 백엔드에서 일지 로딩 (캐시 우선)
  useEffect(() => {
    let cancelled = false;
    if (journals[selectedDate] !== undefined) return; // 이미 캐시됨
    GET(`/api/journal/${selectedDate}`).
    then((j) => {
      if (cancelled) return;
      setJournals((prev) => ({ ...prev, [selectedDate]: j.content || '' }));
    }).
    catch((e) => {
      if (!__NO_BACKEND__) console.error('journal load failed:', e);
      if (!cancelled) setJournals((prev) => ({ ...prev, [selectedDate]: '' }));
    });
    return () => {cancelled = true;};
  }, [selectedDate]);

  // 디바운스 자동저장 (선택 날짜 일지 → POST /journal/save)
  const lastSavedRef = useRef({});
  useEffect(() => {
    const content = journals[selectedDate];
    if (content === undefined) return;
    if (lastSavedRef.current[selectedDate] === content) return;
    const t = setTimeout(() => {
      POST('/journal/save', { date: selectedDate, content }).
      then(() => {
        lastSavedRef.current[selectedDate] = content;
        setSaveStatus('✓ 자동저장됨');
        // ALL_JOURNALS / 캘린더 도트 / 검색 인덱스 동기화
        bumpDataVersion && bumpDataVersion();
        refreshJournalDates && refreshJournalDates();
      }).
      catch((e) => {
        if (!__NO_BACKEND__) console.error('journal save failed:', e);
        setSaveStatus('⚠ 저장 실패');
      });
    }, 600);
    return () => clearTimeout(t);
  }, [journals, selectedDate]);

  const [saveStatus, setSaveStatus] = useState('✓ 자동저장됨');
  const [foldMode, setFoldMode] = useState(() => {
    /* 기본 접기 모드 ON — 헤더가 있으면 항상 접기 가능, /task 슬래시 명령은 평문 모드에서 */
    try {const v = localStorage.getItem('worklog.journal.foldModeDefault');return v === null ? true : v === 'true';}
    catch (e) {return true;}
  });
  React.useEffect(() => {try {localStorage.setItem('worklog.journal.foldModeDefault', String(foldMode));} catch (e) {}}, [foldMode]);
  const saveTimer = useRef(null);
  const [activeTag, setActiveTag] = useState(null); // 클릭된 태그 (모든 날짜에서 해당 태그 줄 모아보기)

  /* 빈 일지 템플릿 제안 — 자동 삽입 금지, 빈 일지일 때만 표시. 날짜 바뀌면 다시 제안. */
  const [dismissedEmpty, setDismissedEmpty] = useState(false);
  const [showTemplateEdit, setShowTemplateEdit] = useState(false);
  useEffect(() => { setDismissedEmpty(false); }, [selectedDate]);
  function applyJournalTemplate() {
    const tpl = getJournalTemplate();
    setJournalText(tpl);
    setDismissedEmpty(true);
    setSaveStatus('편집 중...');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => setSaveStatus('✓ 자동저장됨'), 2000);
    /* 삽입 후 편집기에 focus + 첫 번째 "- [ ] " 뒤로 캐럿 이동 (평문 textarea 모드일 때) */
    requestAnimationFrame(() => {
      const ta = document.querySelector('.journal-textarea')
              || document.querySelector('.col [data-section-idx] textarea');
      if (!ta) return;
      ta.focus();
      const ci = tpl.indexOf('- [ ] ');
      const caret = ci >= 0 ? ci + 6 : tpl.length;
      try { ta.setSelectionRange(caret, caret); } catch (e) {}
    });
  }

  // 날짜 이동 헬퍼
  function shiftDate(days) {
    const [y, m, d] = selectedDate.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    dt.setDate(dt.getDate() + days);
    const next = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    setSelectedDate(next);
  }
  async function manualSave() {
    const content = journals[selectedDate] ?? '';
    try {
      await POST('/journal/save', { date: selectedDate, content });
      lastSavedRef.current[selectedDate] = content;
      const now = new Date();
      setSaveStatus(`✓ 저장됨 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
      bumpDataVersion && bumpDataVersion();
      refreshJournalDates && refreshJournalDates();
    } catch (e) {
      console.error(e);
      setSaveStatus('⚠ 저장 실패');
    }
  }

  // 날짜 레이블 (헤더용은 아니고 저널 내부용)
  function dateLabel(dateStr) {
    if (dateStr === TODAY) {
      const [y, m, d] = TODAY.split('-').map(Number);
      const dow = ['일', '월', '화', '수', '목', '금', '토'][new Date(y, m - 1, d).getDay()];
      return `오늘 (${m}/${d} ${dow})`;
    }
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const dow = ['일', '월', '화', '수', '목', '금', '토'][dt.getDay()];
    return `${m}월 ${d}일 (${dow})`;
  }

  /* 마감일 기준 정렬: 마감 빠른 순, 없으면 뒤로 */
  const byDeadline = (a, b) => {
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  };
  const doing = tasks.filter((t) => t.status === 'DOING' && (projFilter === '전체' || t.project === projFilter)).sort(byDeadline);
  const todo = tasks.filter((t) => t.status === 'TODO' && (projFilter === '전체' || t.project === projFilter)).sort(byDeadline);
  const done = tasks.filter((t) => t.status === 'DONE' && t.updatedAt === TODAY && (projFilter === '전체' || t.project === projFilter));
  const urgent = tasks.filter((t) => t.status !== 'DONE' && isUrgent(t.deadline));
  const _daysDiff = (dateStr) => dateStr ? Math.floor((new Date(TODAY) - new Date(dateStr + 'T00:00:00')) / 86400000) : 0;
  const stale = tasks.filter((t) => t.status === 'DOING' && _daysDiff(t.updatedAt) >= 7);

  /* ── 이번 주 통계 — 실제 task 데이터에서 계산 (하드코딩 제거) ── */
  const weekStats = (() => {
    const t0 = new Date(TODAY + 'T00:00:00');
    const mon = new Date(t0); mon.setDate(t0.getDate() - (t0.getDay() + 6) % 7);
    const weekStart = localYMD(mon);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const weekEnd = localYMD(sun);
    const inProj = (t) => projFilter === '전체' || t.project === projFilter;
    const created = tasks.filter((t) => inProj(t) && t.createdAt >= weekStart && t.createdAt <= weekEnd);
    const completed = tasks.filter((t) => inProj(t) && t.status === 'DONE' && t.updatedAt >= weekStart && t.updatedAt <= weekEnd);
    return { totalWeek: created.length, doneWeek: completed.length };
  })();
  const totalWeek = weekStats.totalWeek;
  const doneWeek = weekStats.doneWeek;
  const weekPct = totalWeek ? Math.round(doneWeek / totalWeek * 100) : 0;

  /* 최근 8주 완료 추이 — DONE task의 updatedAt 기준 주별 집계 */
  const weekTrend = (() => {
    const t0 = new Date(TODAY + 'T00:00:00');
    const thisMon = new Date(t0); thisMon.setDate(t0.getDate() - (t0.getDay() + 6) % 7);
    const inProj = (t) => projFilter === '전체' || t.project === projFilter;
    const out = [];
    for (let i = 7; i >= 0; i--) {
      const ws = new Date(thisMon); ws.setDate(thisMon.getDate() - i * 7);
      const we = new Date(ws); we.setDate(ws.getDate() + 6);
      const s = localYMD(ws), e = localYMD(we);
      const count = tasks.filter((t) => inProj(t) && t.status === 'DONE' && t.updatedAt >= s && t.updatedAt <= e).length;
      out.push({ label: `${ws.getMonth() + 1}/${ws.getDate()}`, count });
    }
    return out;
  })();

  /* 최근 4주 평일(월~금) 완료 히트맵 — DONE task의 updatedAt 기준 일별 집계 */
  const weekdayHeat = (() => {
    const t0 = new Date(TODAY + 'T00:00:00');
    const thisMon = new Date(t0); thisMon.setDate(t0.getDate() - (t0.getDay() + 6) % 7);
    const inProj = (t) => projFilter === '전체' || t.project === projFilter;
    const countOn = (d) => {
      const ymd = localYMD(d);
      return tasks.filter((t) => inProj(t) && t.status === 'DONE' && t.updatedAt === ymd).length;
    };
    const weeks = [];
    for (let w = 3; w >= 0; w--) {
      const ws = new Date(thisMon); ws.setDate(thisMon.getDate() - w * 7);
      const col = [];
      for (let d = 0; d < 5; d++) { const day = new Date(ws); day.setDate(ws.getDate() + d); col.push(countOn(day)); }
      weeks.push(col);
    }
    return weeks; // [[mon..fri]×4]
  })();
  function heatLvl(c) { if (!c) return 0; if (c === 1) return 1; if (c <= 3) return 2; return 3; }

  const toast = useToast();
  async function addTask() {
    const title = newTitle.trim();
    if (!title) return;
    const project = newProj.trim() || (projFilter !== '전체' ? projFilter : '미분류');
    const deadline = newDeadline || null;
    // DOING이 이미 5개 이상이면 TODO로 들어감 (집중 한계 보호)
    const overLimit = doing.length >= 5;
    const status = overLimit ? 'TODO' : 'DOING';
    try {
      await POST('/tasks/add', {
        title, priority: newPrio, project, deadline,
        note: '', journal_date: selectedDate
      });
      // 백엔드는 status를 무조건 TODO로 INSERT — DOING으로 시작해야 하면 직후 status 업데이트
      // 단, /tasks/add 는 id를 반환하지 않으므로, 새 task 찾으려면 refreshTasks → 가장 최근 것
      await refreshTasks();
      if (status === 'DOING') {
        // 방금 추가된 task (제목+생성시각 일치) 찾아서 DOING으로 승격 — best-effort
        try {
          const all = await GET('/api/tasks/all');
          const justAdded = all.find((t) => t.title === title && t.status === 'TODO');
          if (justAdded) {
            await POST(`/tasks/${justAdded.id}/status`, { status: 'DOING' });
            await refreshTasks();
          }
        } catch (e) {}
      }
      setNewTitle('');setNewPrio('B');setNewProj('');setNewDeadline('');
      const dateLabel = deadline ? `마감 ${deadline.slice(5)}` : '오늘 등록 (마감 없음)';
      if (overLimit) {
        toast(`⚠ DOING이 이미 5개라 "${title}" 은(는) TODO로 추가했어요`, { kind: 'success', duration: 4000 });
      } else {
        toast(`✓ "${title}" 추가됨 · 📁 ${project} · ${dateLabel}`, { kind: 'success', duration: 4000 });
      }
    } catch (e) {
      console.error(e);
      toast(`⚠ 추가 실패: ${e.message}`, { duration: 4000 });
    }
  }
  async function setStatus(id, status) {
    setTasks((prev) => prev.map((t) => t.id === id ? { ...t, status } : t)); // 낙관적 업데이트
    try {await POST(`/tasks/${id}/status`, { status });}
    catch (e) {console.error(e);refreshTasks();}
  }
  async function updateTask(id, patch) {
    setTasks((prev) => prev.map((t) => t.id === id ? { ...t, ...patch } : t)); // 낙관적
    try {await POST(`/tasks/${id}/edit`, patch);refreshTasks();}
    catch (e) {console.error(e);refreshTasks();}
  }
  async function deleteTask(id) {
    const t = tasks.find((x) => x.id === id);
    if (!t) return;
    setTasks((prev) => prev.filter((x) => x.id !== id)); // 낙관적
    try {await POST(`/tasks/${id}/delete`, {});}
    catch (e) {console.error(e);refreshTasks();}
    toast(`🗑 "${t.title}" 삭제됨`, {
      kind: 'success',
      duration: 5000,
      actionLabel: '↩ 실행 취소',
      onAction: async () => {
        // 복구 = 다시 add (id는 새로 발급됨)
        try {
          await POST('/tasks/add', {
            title: t.title, priority: t.priority, project: t.project,
            deadline: t.deadline, note: t.note, journal_date: t.journalDate || selectedDate
          });
          // 원래 status가 TODO 아니면 복구 후 update
          if (t.status && t.status !== 'TODO') {
            const all = await GET('/api/tasks/all');
            const restored = all.find((x) => x.title === t.title && x.status === 'TODO');
            if (restored) await POST(`/tasks/${restored.id}/status`, { status: t.status });
          }
          await refreshTasks();
        } catch (e) {console.error(e);}
      }
    });
  }
  const journalRef = useRef(null);

  /* 마크다운 리스트 자동 이어쓰기:
     - "- " 또는 "- [ ] " (또는 [x]) 로 시작한 줄에서 Enter
     - 빈 항목에서 Enter 누르면 리스트 종료
     - 체크박스 [ ] / [x] 토글: Ctrl/Cmd+Click */
  /* /task 슬래시 명령으로 Task 생성 — 접기 뷰(JournalFoldView)에서 호출 */
  function createTaskFromJournal({ title, prio = 'B', deadline = null, project }) {
    const proj = project || (projFilter !== '전체' ? projFilter : '미분류');
    const startNow = selectedDate === TODAY;
    (async () => {
      try {
        await POST('/tasks/add', { title, priority: prio, project: proj, deadline, note: '', journal_date: selectedDate });
        if (startNow) {
          try {
            const all = await GET('/api/tasks/all');
            const justAdded = all.filter((t) => t.title === title).sort((a, b) => (b.id || 0) - (a.id || 0))[0];
            if (justAdded) await POST(`/tasks/${justAdded.id}/status`, { status: 'DOING' });
          } catch (_) {}
        }
        await refreshTasks();
        toast(
          `${startNow ? '▶ 시작' : '✓ 추가'} "${title}" · 📁 ${proj}${deadline ? ' · 마감 ' + deadline.slice(5) : ''}${startNow ? ' (DOING)' : ''}`,
          { kind: 'success', duration: 4000 }
        );
      } catch (err) {
        console.error(err);
        toast(`⚠ Task 생성 실패: ${err.message}`, { duration: 4000 });
      }
    })();
  }

  function onJournalKeyDown(e) {
    const ta = e.target;
    /* /task 슬래시 명령 — Enter 시 Task 생성 + 라인을 체크박스로 변환 */
    if (slashCmd && e.key === 'Enter' && !e.nativeEvent.isComposing && e.keyCode !== 229) {
      e.preventDefault();
      const cmdType = slashCmd.cmdType || 'TASK';
      const value = ta.value;
      const lineStart = slashCmd.lineStart;
      const lineEnd = value.indexOf('\n', lineStart) === -1 ? value.length : value.indexOf('\n', lineStart);
      const raw = value.slice(lineStart, lineEnd);
      // 슬래시 커맨드 prefix 제거 후 파싱
      let title = raw.replace(/^\/\S+\s+/i, '');
      let prio = 'B', deadline = null;
      let project = projFilter !== '전체' ? projFilter : '미분류';
      let waitingFor = null;
      title = title.replace(/!([ABCabc])\b/, (_, p) => { prio = p.toUpperCase(); return ''; });
      // WAITING/FOLLOWUP: @멘션 → waitingFor / 나머지 타입: @멘션 → project
      if (cmdType === 'WAITING' || cmdType === 'FOLLOWUP') {
        title = title.replace(/@(\S+)/, (_, p) => { waitingFor = p; return ''; });
      } else {
        title = title.replace(/@(\S+)/, (_, p) => { project = p; return ''; });
      }
      title = title.replace(/~(\d{1,2})\/(\d{1,2})/, (_, m, d) => {
        const yy = new Date().getFullYear();
        deadline = `${yy}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        return '';
      });
      title = title.trim();
      if (!title) { setSlashCmd(null); return; }
      const meta = TYPE_META[cmdType];
      const icon = meta?.icon || '';
      // 일지 라인 치환
      const isDone = cmdType === 'DECISION';
      const replacement = `- [${isDone ? 'x' : ' '}] ${icon ? icon + ' ' : ''}${title}` +
        (deadline ? ` (~${deadline.slice(5).replace('-', '/')})` : '') +
        (prio !== 'B' ? ` !${prio}` : '') +
        ` 📌` + (project && project !== '미분류' ? ` @${project}` : '') +
        (waitingFor ? ` @${waitingFor}` : '');
      nativeReplace(ta, lineStart, lineEnd, replacement, lineStart + replacement.length);
      setSlashCmd(null);
      // Work item 생성
      const startNow = selectedDate === TODAY && meta?.autoStart;
      (async () => {
        try {
          await POST('/api/tasks/add', {
            title, priority: prio, project, deadline,
            note: '', journal_date: selectedDate,
            type: cmdType, waiting_for: waitingFor, confirmed: 1,
          });
          if (startNow) {
            try {
              const all = await GET('/api/tasks/all');
              const justAdded = all.filter((t) => t.title === title).sort((a, b) => (b.id || 0) - (a.id || 0))[0];
              if (justAdded) await POST(`/api/tasks/${justAdded.id}/status`, { status: 'DOING' });
            } catch (_) {}
          }
          if (cmdType === 'DECISION') {
            try {
              const all = await GET('/api/tasks/all');
              const justAdded = all.filter((t) => t.title === title).sort((a, b) => (b.id || 0) - (a.id || 0))[0];
              if (justAdded) await POST(`/api/tasks/${justAdded.id}/status`, { status: 'DONE' });
            } catch (_) {}
          }
          await refreshTasks();
          const label = meta?.label || 'Item';
          toast(`${startNow ? '▶ 시작' : '✓ 추가'} [${label}] "${title}"${deadline ? ' · ~' + deadline.slice(5) : ''}`, { kind: 'success', duration: 4000 });
        } catch (err) {
          console.error(err);
          toast(`⚠ 생성 실패: ${err.message}`, { duration: 4000 });
        }
      })();
      return;
    }
    if (slashCmd && e.key === 'Escape') {e.preventDefault();setSlashCmd(null);return;}
    /* 태그 자동완성 활성 시 Enter→삽입 / Esc→닫기 / Tab→삽입 */
    if (tagSuggest && tagSuggest.tags.length > 0) {
      if ((e.key === 'Enter' || e.key === 'Tab') && !e.nativeEvent.isComposing && e.keyCode !== 229) {e.preventDefault();insertTag(tagSuggest.tags[0]);return;}
      if (e.key === 'Escape') {e.preventDefault();setTagSuggest(null);return;}
    }
    /* Tab → 들여쓰기 / Shift+Tab → 내어쓰기 (멀티라인 지원) */
    if (e.key === 'Tab' && !e.isComposing && e.keyCode !== 229) {
      e.preventDefault();
      const value = ta.value;
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      // 선택의 마지막 줄 끝 (선택이 줄 시작에 끝나면 그 줄 제외)
      const selEndAdj = end > start && value[end - 1] === '\n' ? end - 1 : end;
      let blockEnd = value.indexOf('\n', selEndAdj);
      if (blockEnd === -1) blockEnd = value.length;

      const block = value.slice(lineStart, blockEnd);
      const lines = block.split('\n');
      let newLines;
      if (e.shiftKey) {
        // 내어쓰기: 줄 앞 공백/탭 2칸까지 제거 ("- " 도 같이 옮겨지는 효과)
        newLines = lines.map((l) => l.replace(/^(\t| {1,2})/, ''));
      } else {
        // 들여쓰기: 줄 맨 앞에 2칸 추가 ("- "도 같이 밀림)
        newLines = lines.map((l) => '  ' + l);
      }
      const newBlock = newLines.join('\n');
      const delta = newBlock.length - block.length;
      let cs, ce;
      if (start === end) {
        const firstLineDelta = newLines[0].length - lines[0].length;
        cs = ce = Math.max(lineStart, start + firstLineDelta);
      } else {
        cs = lineStart;
        ce = blockEnd + delta;
      }
      nativeReplace(ta, lineStart, blockEnd, newBlock, cs, ce);
      return;
    }
    /* Shift+Enter → 현재 줄이 들여쓰기/리스트면 한 단계 하위(자식)로 새 항목 */
    if (e.key === 'Enter' && e.shiftKey && !e.isComposing && e.keyCode !== 229) {
      const start = ta.selectionStart;
      const value = ta.value;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const currentLine = value.slice(lineStart, start);
      const lm = currentLine.match(/^(\s*)([-*])\s(\[[ xX]\]\s)?(.*)$/);
      if (lm) {
        e.preventDefault();
        const [, indent, bullet, checkbox] = lm;
        const prefix = '\n' + indent + '  ' + bullet + ' ' + (checkbox ? '[ ] ' : '');
        nativeReplace(ta, start, start, prefix, start + prefix.length);
        return;
      }
      const im = currentLine.match(/^(\s+)\S/);
      if (im) {
        e.preventDefault();
        const prefix = '\n' + im[1] + '  ';
        nativeReplace(ta, start, start, prefix, start + prefix.length);
        return;
      }
    }
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
      const start = ta.selectionStart;
      const value = ta.value;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const currentLine = value.slice(lineStart, start);

      // 패턴: 들여쓰기 + "- " 또는 "- [ ] " / "- [x] " / "* " / 숫자.
      const m = currentLine.match(/^(\s*)([-*])\s(\[[ xX]\]\s)?(.*)$/);
      if (m) {
        const [, indent, bullet, checkbox, rest] = m;
        // 빈 항목 → 리스트 종료
        if (!rest.trim()) {
          e.preventDefault();
          nativeReplace(ta, lineStart, start, '\n', lineStart + 1);
          return;
        }
        // 다음 줄에 같은 prefix 자동 삽입
        e.preventDefault();
        const prefix = '\n' + indent + bullet + ' ' + (checkbox ? '[ ] ' : '');
        nativeReplace(ta, start, start, prefix, start + prefix.length);
      }
    }
  }

    const slashM = lineSoFar.match(/^\/(\w+|할일)\s+(.*)$/i);

    /* # 자동완성 감지 (비활성화) */

      if (matches.length > 0) {
        setTagSuggest({ tags: matches, prefix: m[1], anchor: caret });
      } else {
        setTagSuggest(null);
      }
    } else {
      setTagSuggest(null);
    }
  }

            {/* 스파크라인 바 차트 — 최근 8주 (실제 task 기반) */}
            {(() => {

                  )}

                </div>);

          })()}
            {/* 평일 히트맵 (월~금) — 실제 task 기반 */}
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 10, color: 'var(--text-4)', fontWeight: 600, letterSpacing: '.5px', marginBottom: 5 }}>🗓 최근 4주 평일</div>

                <div key={d} style={{ fontSize: 8, color: 'var(--text-4)', height: 10, lineHeight: '10px', textAlign: 'right' }}>{d}</div>
                )}
                </div>
                <div style={{ display: 'flex', gap: 3 }}>
                  {weekdayHeat.map((col, w) =>
                <div key={w} style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
                      {col.map((cnt, d) => {
                    const lvl = heatLvl(cnt);
                    return <div key={d} className={`heat-cell${lvl ? ` heat-${lvl}` : ''}`} style={{ width: 10, height: 10 }} title={`완료 ${cnt}개`} />;
                  })}

        <div>
              <div style={{ fontSize: 10, color: 'var(--text-4)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 4 }}>오늘 완료</div>
              {done.slice(0, 3).map((t) =>
          <div key={t.id} style={{ fontSize: 12, color: 'var(--text-3)', padding: '3px 0', display: 'flex', alignItems: 'center', gap: 6, textDecoration: 'line-through' }}>
                  <span style={{ color: 'var(--green)' }}>✓</span>{t.title}
                </div>
          )}
            </div>
        }
        </div>
      </div>

  };

  // 컬럼 너비 상태 (px). null이면 기본값 사용. 마지막 컬럼은 자동으로 나머지를 채움.
  const [colWidths, setColWidths] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('worklog.colWidths') || 'null');
      if (saved && typeof saved === 'object') return saved;
    } catch (e) {}
    return {}; // {focus: 420, journal: 600, stats: 260}
  });
  useEffect(() => {localStorage.setItem('worklog.colWidths', JSON.stringify(colWidths));}, [colWidths]);

  const dashboardRef = useRef(null);
  const dragStateRef = useRef(null);
  const [draggingIdx, setDraggingIdx] = useState(null);

  function startResize(idx, e) {
    e.preventDefault();
    const grid = dashboardRef.current;
    if (!grid) return;
    const cols = grid.querySelectorAll(':scope > .col');
    const leftEl = cols[idx];
    const rightEl = cols[idx + 1];
    if (!leftEl || !rightEl) return;
    dragStateRef.current = {
      idx, startX: e.clientX,
      leftKey: visibleCols[idx], rightKey: visibleCols[idx + 1],
      leftStart: leftEl.getBoundingClientRect().width,
      rightStart: rightEl.getBoundingClientRect().width,
      isLastPair: idx + 1 === visibleCols.length - 1
    };
    setDraggingIdx(idx);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    window.addEventListener('mousemove', onResize);
    window.addEventListener('mouseup', endResize);
  }
  function onResize(e) {
    const s = dragStateRef.current;
    if (!s) return;
    const dx = e.clientX - s.startX;
    const MIN = 200;
    const newLeft = Math.max(MIN, s.leftStart + dx);
    const newRight = Math.max(MIN, s.rightStart - dx);
    // 양쪽 모두 MIN을 넘길 때만 반영
    if (newLeft < MIN || newRight < MIN) return;
    setColWidths((prev) => {
      const next = { ...prev, [s.leftKey]: newLeft };
      // 마지막 컬럼이 아니면 오른쪽도 px로 고정
      if (!s.isLastPair) next[s.rightKey] = newRight;
      return next;
    });
  }
  function endResize() {
    dragStateRef.current = null;
    setDraggingIdx(null);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    window.removeEventListener('mousemove', onResize);
    window.removeEventListener('mouseup', endResize);
  }
  function resetWidths() {
    setColWidths({});
  }

  // grid-template-columns 계산
  // 사용자가 지정한 폭: px / 그외: stats=260px, focus|journal=1fr (난임없이 차지)
  // 마지막엔 더 이상 핸들이 안 따라오므로, 마지막 컬럼은 px 저장이 있어도 1fr로 먹으며 나머지 점유(reset 필요 시 한계)
  // 다만 마지막 컬럼이 stats면 260을 기본값으로
  function colTrack(k, isLast) {
    if (isLast) {
      // 마지막 컬럼은 난머지 차지—사용자가 px로 디둔 게 있으면 존중 (단 마지막이 stats면 260 기본)
      if (colWidths[k]) return `${colWidths[k]}px`;
      return k === 'stats' ? '260px' : '1fr';
    }
    if (colWidths[k]) return `${colWidths[k]}px`;
    return k === 'stats' ? '260px' : '1fr';
  }
  const trackParts = [];
  colOrder.forEach((k, i) => {
    trackParts.push(colTrack(k, i === colOrder.length - 1));
    if (i < colOrder.length - 1) trackParts.push('5px'); // resizer
  });
  const gridCols = trackParts.join(' ');

  return (
    <React.Fragment>
    <div ref={dashboardRef} className="dashboard-grid" style={{ gridTemplateColumns: gridCols }}>
      {colOrder.map((key, idx) =>
      <React.Fragment key={key}>
          {cols[key](idx)}
          {idx < colOrder.length - 1 &&
        <div
          className={`col-resizer${draggingIdx === idx ? ' dragging' : ''}`}
          onMouseDown={(e) => startResize(idx, e)}
          onDoubleClick={resetWidths}
          title="드래그해서 너비 조절 · 더블클릭으로 초기화" />

        }
        </React.Fragment>
      )}
    </div>
    {showTemplateEdit && <TemplateEditModal onClose={() => setShowTemplateEdit(false)} />}
    </React.Fragment>);

}

function TaskCard({ task, onStatus, onDelete, onUpdate, projects = [] }) {
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(task);

  function startEdit() {
    setDraft({ ...task, note: task.note || '' });
    setEditing(true);
    setExpanded(true);
  }
  function saveEdit() {
    const title = (draft.title || '').trim();
    if (!title) return;
    onUpdate && onUpdate(task.id, {
      title,
      priority: draft.priority,
      project: draft.project || '',
      deadline: draft.deadline || '',
      note: (draft.note || '').trim()
    });
    setEditing(false);
  }
  function cancelEdit() {
    setDraft(task);
    setEditing(false);
  }

  if (editing) {
    return (

        style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', padding: '4px 6px', fontSize: 13, fontFamily: 'var(--font)', color: 'var(--text)', background: 'var(--surface)', outline: 'none', fontWeight: 600 }} />

            )}
          </div>

function SearchModal({ tasks, onClose, onJumpDate }) {
  const [q, setQ] = React.useState('');
  const [activeTag, setActiveTag] = React.useState(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {inputRef.current && inputRef.current.focus();}, []);

  const query = (activeTag ? `#${activeTag}` : q).trim().toLowerCase();

  const journalHits = !query ? [] : ALL_JOURNALS.
  map((j) => {
    const idx = j.content.toLowerCase().indexOf(query);
    if (idx === -1) return null;
    const start = Math.max(0, idx - 30);
    const end = Math.min(j.content.length, idx + query.length + 60);
    const snippet = (start > 0 ? '…' : '') + j.content.slice(start, end) + (end < j.content.length ? '…' : '');
    return { ...j, snippet, idx };
  }).
  filter(Boolean);

  const taskHits = !query ? [] : tasks.filter((t) =>
  t.title.toLowerCase().includes(query) ||
  (t.note || '').toLowerCase().includes(query) ||
  (t.project || '').toLowerCase().includes(query)
  );

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp('(' + q.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
    const parts = text.split(re);
    return parts.map((p, i) => re.test(p) ? <mark key={i}>{p}</mark> : <span key={i}>{p}</span>);
  }

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()} style={{ alignItems: 'flex-start', paddingTop: 80 }}>
      <div className="modal" style={{ width: 640, maxHeight: '70vh', display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 16, color: 'var(--text-3)' }}>🔍</span>
          <input ref={inputRef} value={q} onChange={(e) => {setQ(e.target.value);setActiveTag(null);}}
          placeholder="일지·Task에서 검색...  (예: 보고서, #개발, 미팅)"
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 14, color: 'var(--text)', fontFamily: 'var(--font)' }} />
          
          <span className="kbd" style={{ fontSize: 10, color: 'var(--text-4)', border: '1px solid var(--border)', padding: '1px 5px', borderRadius: 3 }}>ESC</span>
        </div>

        {/* 자주 쓰는 태그 */}
        {!query &&
        <div style={{ padding: '12px 18px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 8 }}>자주 쓰는 태그</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {TAG_FREQ.map((t) =>
            <span key={t.tag} className="tag-chip lg" onClick={() => setActiveTag(t.tag)}>
                  #{t.tag} <span style={{ opacity: .6, fontSize: 10 }}>{t.count}</span>
                </span>
            )}
            </div>
          </div>
        }

        <div style={{ flex: 1, overflow: 'auto' }}>
          {query && journalHits.length === 0 && taskHits.length === 0 &&
          <div style={{ padding: '40px 20px', textAlign: 'center', fontSize: 13, color: 'var(--text-4)' }}>"{query}" 결과가 없어요</div>
          }

          {journalHits.length > 0 &&
          <div>
              <div style={{ padding: '10px 18px 6px', fontSize: 10, fontWeight: 700, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', background: 'var(--surface-2)' }}>📝 일지 ({journalHits.length})</div>
              {journalHits.map((j) =>
            <div key={j.date} className="search-result-row" onClick={() => {onJumpDate && onJumpDate(j.date);onClose();}}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-2)' }}>{j.date}</span>
                    <span style={{ fontSize: 10, color: 'var(--text-4)' }}>일지로 이동 →</span>
                  </div>
                  <div className="search-snippet">{highlight(j.snippet, query)}</div>
                </div>
            )}
            </div>
          }

          {taskHits.length > 0 &&
          <div>
              <div style={{ padding: '10px 18px 6px', fontSize: 10, fontWeight: 700, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', background: 'var(--surface-2)' }}>✓ Task ({taskHits.length})</div>
              {taskHits.map((t) =>
            <div key={t.id} className="search-result-row">
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span className={`badge badge-${t.priority.toLowerCase()}`} style={{ fontSize: 10 }}>{t.priority}</span>
                    <span className={`badge badge-${t.status.toLowerCase()}`} style={{ fontSize: 10 }}>{t.status}</span>
                    <span style={{ fontSize: 13, color: 'var(--text-2)', flex: 1 }}>{highlight(t.title, query)}</span>
                  </div>
                  {(t.project || t.note) &&
              <div className="search-snippet">
                      {t.project && <span>📁 {highlight(t.project, query)}  </span>}
                      {t.note && <span>📌 {highlight(t.note, query)}</span>}
                    </div>
              }
                </div>
            )}
            </div>
          }
        </div>

        <div style={{ padding: '8px 18px', borderTop: '1px solid var(--border)', fontSize: 10, color: 'var(--text-4)', display: 'flex', gap: 14 }}>
          <span><span className="kbd" style={{ border: '1px solid var(--border)', padding: '1px 5px', borderRadius: 3, marginRight: 4 }}>↑↓</span> 이동</span>
          <span><span className="kbd" style={{ border: '1px solid var(--border)', padding: '1px 5px', borderRadius: 3, marginRight: 4 }}>Enter</span> 열기</span>
          <span style={{ marginLeft: 'auto' }}>#태그로 필터링 가능</span>
        </div>
      </div>
    </div>);

}

/* ─── BriefingView ─── */
function BriefingView({ tasks, dataVersion }) {
  const STALE_DAYS = 7;

  /* 백엔드 /api/brief 결과 (있으면 우선 사용) */
  const [brief, setBrief] = useState(null);
  useEffect(() => {
    let cancelled = false;
    GET('/api/brief').
    then((b) => {if (!cancelled) setBrief(b);}).
    catch((_) => {});
    return () => {cancelled = true;};
  }, [dataVersion]);

  function daysDiff(dateStr) {
    const diff = new Date(TODAY) - new Date(dateStr + 'T00:00:00');
    return Math.floor(diff / 86400000);
  }

  /* 백엔드 결과가 있으면 그 목록을, 없으면 클라이언트 계산을 사용 */
  const doing = tasks.filter((t) => t.status === 'DOING');
  const urgent = brief && Array.isArray(brief.urgent) ?
  brief.urgent.map(normalizeTask) :
  tasks.filter((t) => t.status !== 'DONE' && t.status !== 'CANCELLED' && t.deadline && t.deadline <= TODAY);
  const stale = brief && Array.isArray(brief.stale) ?
  brief.stale.map(normalizeTask) :
  tasks.filter((t) => ['TODO', 'DOING'].includes(t.status) && daysDiff(t.updatedAt) >= STALE_DAYS);
  const yesterdayStr = (() => {
    const d = new Date();d.setDate(d.getDate() - 1);
    return localYMD(d);
  })();
  const doneDone = tasks.filter((t) => t.status === 'DONE' && t.updatedAt === yesterdayStr);
  const undone = tasks.filter((t) => ['TODO', 'DOING'].includes(t.status));

  const prioIcon = (p) => ({ A: '🔴', B: '🟡', C: '⚪' })[p] || '⚪';
  const deadlineLabel = (d) => {
    if (!d) return '';
    if (d === TODAY) return ' ← 오늘 마감!';
    const tmrw = (() => {
      const dt = new Date();dt.setDate(dt.getDate() + 1);
      return localYMD(dt); // 로컬 시간대 기준 — toISOString()은 UTC라 밤에 하루 밀림
    })();
    if (d === tmrw) return ' ← 내일 마감';
    return ` ← ${d}`;
  };

  const Card = ({ children, style }) =>

    </div>;

  return (
    <div style={{ padding: 24, overflow: 'auto', height: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>

      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700 }}>📅 모닝 브리핑</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>{formatKoreanDate(TODAY)} · 09:00 자동 발송</div>
          </div>
          <span style={{ fontSize: 11, background: 'var(--green-light)', color: 'var(--green)', padding: '3px 10px', borderRadius: 99, fontWeight: 600 }}>발송 완료</span>

            </Row>
        )

        {doneDone.length > 0 &&
        <div style={{ marginTop: 12, fontSize: 12, color: 'var(--text-3)' }}>
            ✅ 어제 완료: <strong>{doneDone.length}개</strong> 수고하셨어요! 👏
          </div>
        }

        {stale.length > 0 &&
        <div style={{ marginTop: 14 }}>
            <SectionTitle>💬 혹시 이 Task들, 아직 진행 중인가요?</SectionTitle>
            {stale.slice(0, 3).map((t) =>
          <Row key={t.id}>
                <span style={{ color: 'var(--text-4)' }}>·</span>
                <span style={{ flex: 1, color: 'var(--text-2)' }}>{t.title}</span>
                <span style={{ fontSize: 11, color: 'var(--amber)' }}>{daysDiff(t.updatedAt)}일째</span>
              </Row>
          )}
            <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 8 }}>계속하실 거면 괜찮고, 완료·취소로 정리해두시면 깔끔해져요 😊</div>
          </div>
        }
      </Card>

      {/* 퇴근 전 체크 */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700 }}>✋ 퇴근 전 체크</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>오늘 17:30 예정</div>
          </div>
          <span style={{ fontSize: 11, background: 'var(--amber-light)', color: 'var(--amber)', padding: '3px 10px', borderRadius: 99, fontWeight: 600 }}>대기 중</span>
        </div>

        <div style={{ fontSize: 13, color: 'var(--text-2)', lineHeight: 1.9 }}>
          <div>오늘 일지 작성 여부를 확인할게요.</div>
          <div style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 4 }}>
            미완료 Task <strong style={{ color: 'var(--text-2)' }}>{undone.length}개</strong> · 오늘 마감 <strong style={{ color: urgent.length ? 'var(--red)' : 'var(--text-2)' }}>{urgent.length}개</strong>
          </div>
        </div>

        <div style={{ marginTop: 14 }}>
          <SectionTitle>아직 못 끝낸 것들</SectionTitle>
          {undone.slice(0, 4).map((t) =>
          <Row key={t.id}>
              <span>{prioIcon(t.priority)}</span>
              <span style={{ flex: 1, color: 'var(--text-2)' }}>{t.title}</span>
              <span className={`badge badge-${t.status.toLowerCase()}`} style={{ fontSize: 10 }}>{t.status}</span>
            </Row>
          )}
          {undone.length > 4 && <div style={{ fontSize: 12, color: 'var(--text-4)', marginTop: 6 }}>… 외 {undone.length - 4}개 더</div>}
        </div>
        <div style={{ marginTop: 12, fontSize: 12, color: 'var(--text-3)' }}>오늘 마무리할 것과 내일로 넘길 것 체크해두시면 좋아요!</div>
      </Card>

      {/* 다음 주간 브리핑 예고 — 실제 다가오는 마감 기준 */}
      {(() => {
        const t0 = new Date(TODAY + 'T00:00:00');
        const nextMon = new Date(t0);
        const toMon = (8 - (t0.getDay() || 7)); // 다음 주 월요일까지 일수
        nextMon.setDate(t0.getDate() + toMon);
        const nextMonLabel = `${nextMon.getMonth() + 1}/${nextMon.getDate()}`;
        /* 다가오는 마감 — 미완료 + deadline이 오늘 이후, 가까운 순 */
        const upcoming = tasks
          .filter((t) => !['DONE', 'CANCELLED'].includes(t.status) && t.deadline && t.deadline >= TODAY)
          .sort((a, b) => a.deadline.localeCompare(b.deadline))
          .slice(0, 3);
        return (
          <Card style={{ background: 'var(--surface-2)', border: '1px dashed var(--border-2)' }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>📊 다음 주간 브리핑</div>
            <div style={{ fontSize: 12, color: 'var(--text-3)', lineHeight: 1.8 }}>
              <div>다음 월요일 ({nextMonLabel}) 09:00에 이번 주 회고 + 다음 주 브리핑이 자동 발송돼요.</div>
              {upcoming.length > 0 ?
                <div style={{ marginTop: 6 }}>
                  다가오는 마감: {upcoming.map((t, i) =>
                    <React.Fragment key={t.id}>
                      {i > 0 && ' · '}
                      <strong style={{ color: t.deadline === TODAY ? 'var(--red)' : 'var(--text-2)' }}>{t.title} ({fmt(t.deadline)})</strong>
                    </React.Fragment>
                  )}
                </div> :
                <div style={{ marginTop: 6, color: 'var(--text-4)' }}>예정된 마감이 없어요.</div>
              }
            </div>
          </Card>);
      })()}
    </div>);

}

/* ─── Gantt View v4 ─── */
function GanttView({ projFilter, onImport, tasks = [], setSelectedDate, setView, refreshTasks }) {
  const toast = useToast();
  const [pFilter, setPFilter] = useState('전체');
  const [prioFilter, setPrioFilter] = useState('전체');
  const [zoom, setZoom] = useState(80); // 주당 px 너비
  const [selectedId, setSelectedId] = useState(null);
  /* 시드 일정 — 제거 결과를 localStorage에 영속화 (탭 이동 시 초기화 방지) */
  const [items, setItems] = useState(() => {
    try {
      const removed = new Set(JSON.parse(localStorage.getItem('worklog.gantt.removedSeedIds') || '[]'));
      const overrides = JSON.parse(localStorage.getItem('worklog.gantt.seedOverrides') || '{}');
      return GANTT_DATA.filter((g) => !removed.has(g.id)).map((g) => overrides[g.id] ? { ...g, ...overrides[g.id] } : g);
    } catch (e) {return GANTT_DATA;}
  });
  /* task 기반 일정 — 숨김 처리도 영속화 */
  const [hiddenTaskIds, setHiddenTaskIds] = useState(() => {
    try {
      const arr = JSON.parse(localStorage.getItem('worklog.gantt.hiddenTaskIds') || '[]');
      return new Set(Array.isArray(arr) ? arr : []);
    } catch (e) {return new Set();}
  });
  /* task 기반 일정의 진행률 — items에 없으므로 별도 저장 */
  const [taskProgress, setTaskProgress] = useState(() => {
    try {return JSON.parse(localStorage.getItem('worklog.gantt.taskProgress') || '{}');}
    catch (e) {return {};}
  });
  useEffect(() => {localStorage.setItem('worklog.gantt.hiddenTaskIds', JSON.stringify([...hiddenTaskIds]));}, [hiddenTaskIds]);
  useEffect(() => {localStorage.setItem('worklog.gantt.taskProgress', JSON.stringify(taskProgress));}, [taskProgress]);
  const chartScrollRef = React.useRef(null);
  const didScrollToTodayRef = React.useRef(false);

  /* 오늘 기준 동적 weekStart 계산 — WEEKS 첫 항목('3/30')이 기준 (시드 데이터)
     실 task 기반 변환에서는 TODAY 기준으로 startWeek 계산 */
  const today = new Date(TODAY + 'T00:00:00');

  /* WEEKS 동적 생성 — 하드코딩 제거.
     기준(2026-03-30 월) + 모든 task deadline / items 끝주 / 오늘+8주를 포함하도록 확장 */
  const WEEKS_BASE = new Date('2026-03-30T00:00:00');
  const WEEKS = (() => {
    let maxW = 24;
    (tasks || []).forEach((t) => {
      if (!t.deadline) return;
      const d = new Date(t.deadline + 'T00:00:00');
      const w = Math.floor((d - WEEKS_BASE) / 86400000 / 7);
      if (w > maxW) maxW = w;
    });
    items.forEach((it) => {if (it.endWeek > maxW) maxW = it.endWeek;});
    const todayW = Math.floor((today - WEEKS_BASE) / 86400000 / 7);
    if (todayW + 8 > maxW) maxW = todayW + 8;
    const arr = [];
    for (let i = 0; i <= maxW + 4; i++) {
      const d = new Date(WEEKS_BASE);
      d.setDate(d.getDate() + i * 7);
      arr.push(`${d.getMonth() + 1}/${d.getDate()}`);
    }
    return arr;
  })();

  /* 할일(task) → 일정(Gantt item) 자동 변환 */
  function ymdToWeekIdx(ymdStr) {
    if (!ymdStr) return null;
    const d = new Date(ymdStr + 'T00:00:00');
    const diffDays = Math.floor((d - WEEKS_BASE) / 86400000);
    return Math.floor(diffDays / 7);
  }

  const taskItems = (tasks || []).
  filter((t) => t.deadline && !['DONE', 'CANCELLED'].includes(t.status) && !hiddenTaskIds.has(t.id)).
  map((t) => {
    const startW = Math.max(0, ymdToWeekIdx(t.createdAt) ?? 0);
    const endW = Math.max(startW, ymdToWeekIdx(t.deadline) ?? startW);
    const overrideProg = taskProgress[t.id];
    return {
      id: `task-${t.id}`,
      _taskId: t.id,
      name: t.title,
      project: t.project || '미분류',
      startWeek: startW,
      endWeek: Math.min(endW, WEEKS.length - 1),
      priority: t.priority || 'B',
      done: typeof overrideProg === 'number' ? overrideProg : t.status === 'DOING' ? 50 : 0,
      _isTask: true,
      _journalDate: t.journalDate
    };
  });

  /* 시드(데모) 항목은 실제 task 일정이 하나도 없을 때만 표시 — 사용자 데이터와 섞이지 않도록.
     실제 데이터가 들어오면 데모는 자동으로 사라지고 간트가 task와 100% 일치함. */
  const allItems = taskItems.length > 0 ? [...taskItems] : [...items];
  const effectiveProj = projFilter !== '전체' ? projFilter : pFilter;

  const filtered = allItems.filter((t) =>
  (effectiveProj === '전체' || t.project === effectiveProj) && (
  prioFilter === '전체' || t.priority === prioFilter)
  );

  const colW = zoom;
  const totalCols = WEEKS.length;
  const totalW = totalCols * colW;
  const selected = filtered.find((t) => t.id === selectedId) || null;

  // 월 그룹핑
  const monthGroups = (() => {
    const groups = [];
    let cur = null;
    WEEKS.forEach((w, i) => {
      const month = w.split('/')[0];
      if (!cur || cur.month !== month) {cur = { month, start: i, count: 1 };groups.push(cur);} else
      cur.count++;
    });
    return groups;
  })();

  /* 오늘 위치 — TODAY 기준 동적 계산 */
  const todayWeekFloat = (() => {
    const base = new Date('2026-03-30T00:00:00');
    const diffDays = (today - base) / 86400000;
    return diffDays / 7;
  })();
  const todayWeekIdx = Math.floor(todayWeekFloat);
  const todayX = todayWeekFloat * colW;
  const todayLabel = `오늘 ${today.getMonth() + 1}/${today.getDate()}`;

  /* 마운트 시 오늘 위치로 스크롤 — 한 번만 */
  React.useEffect(() => {
    if (didScrollToTodayRef.current) return;
    const el = chartScrollRef.current;
    if (!el) return;
    // 오늘을 화면 1/4 지점에 두기 (왼쪽 컨텍스트 약간 + 미래 충분히)
    const target = Math.max(0, todayX - el.clientWidth * 0.25);
    el.scrollLeft = target;
    didScrollToTodayRef.current = true;
  }, [todayX, colW]);

  function dDay(endWeek) {
    const daysLeft = Math.round((endWeek + 1 - todayWeekFloat) * 7);
    if (daysLeft < 0) return null;
    if (daysLeft === 0) return 'D-day';
    return `D-${daysLeft}`;
  }

  function updateProgress(id, val) {
    const v = Math.max(0, Math.min(100, val));
    /* task 기반 항목 — taskProgress에 저장 (id 형태: 'task-{taskId}') */
    if (typeof id === 'string' && id.startsWith('task-')) {
      const tid = parseInt(id.slice(5), 10);
      setTaskProgress((prev) => ({ ...prev, [tid]: v }));
      return;
    }
    /* 시드 항목 — items 업데이트 + localStorage override 저장 */
    setItems((prev) => {
      const next = prev.map((t) => t.id === id ? { ...t, done: v } : t);
      try {
        const ov = JSON.parse(localStorage.getItem('worklog.gantt.seedOverrides') || '{}');
        ov[id] = { ...(ov[id] || {}), done: v };
        localStorage.setItem('worklog.gantt.seedOverrides', JSON.stringify(ov));
      } catch (e) {}
      return next;
    });
  }

  /* 액션: 일지에 기록 — 해당 task의 journalDate(또는 오늘)로 이동 + 체크리스트 항목 append */
  function logToJournal(item) {
    const date = item._journalDate || TODAY;
    if (setSelectedDate) setSelectedDate(date);
    if (setView) setView('today');
    // 대시보드 mount + 해당 날짜 일지 로딩이 끝날 시간 확보 후 이벤트 발행
    setTimeout(() => {
      const line = `- [ ] ${item.name} 📌${item.project ? ` @${item.project}` : ''}`;
      window.dispatchEvent(new CustomEvent('worklog:append-journal', { detail: { date, line } }));
      // 텍스트영역으로 스크롤 + focus
      const ta = document.querySelector('.journal-textarea');
      if (ta) ta.focus();
    }, 400);
    toast(`📝 ${formatKoreanDate(date)} 일지에 "${item.name}" 추가됨`, { kind: 'success', duration: 3000 });
  }

  /* 액션: 일정에서 제거 — task 기반은 hide, 시드 항목은 setItems에서 제거 */
  async function removeFromGantt(item) {
    if (item._isTask) {
      setHiddenTaskIds((prev) => {const n = new Set(prev);n.add(item._taskId);return n;});
      toast(`✕ "${item.name}" 일정에서 숨김 (할일은 그대로 유지)`, { duration: 3000 });
    } else {
      setItems((prev) => prev.filter((t) => t.id !== item.id));
      /* 시드 항목 제거를 localStorage에 영속화 — 탭 이동/새로고침 후에도 유지 */
      try {
        const removed = new Set(JSON.parse(localStorage.getItem('worklog.gantt.removedSeedIds') || '[]'));
        removed.add(item.id);
        localStorage.setItem('worklog.gantt.removedSeedIds', JSON.stringify([...removed]));
      } catch (e) {}
      toast(`✕ "${item.name}" 일정에서 제거됨`, { duration: 2500 });
    }
    setSelectedId(null);
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
      {/* 필터 바 */}
      <div className="gantt-filter-bar">
        <span style={{ fontSize: 11, color: 'var(--text-3)', fontWeight: 600 }}>프로젝트</span>
        {['전체', ...PROJECTS].map((p) =>
        <div key={p} className={`filter-chip${effectiveProj === p ? ' active' : ''}`} onClick={() => setPFilter(p)}>{p}</div>
        )}
        <div style={{ width: 1, height: 16, background: 'var(--border)', margin: '0 4px' }} />
        <span style={{ fontSize: 11, color: 'var(--text-3)', fontWeight: 600 }}>우선순위</span>
        {['전체', 'A', 'B', 'C'].map((p) =>
        <div key={p} className={`filter-chip${prioFilter === p ? ' active' : ''}`} onClick={() => setPrioFilter(p)}>{p}</div>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: 'var(--text-4)' }}>줌</span>
          <button className="btn btn-sm" onClick={() => setZoom((z) => Math.max(50, z - 20))}>−</button>
          <span style={{ fontSize: 11, color: 'var(--text-3)', minWidth: 34, textAlign: 'center' }}>{Math.round(colW)}px</span>
          <button className="btn btn-sm" onClick={() => setZoom((z) => Math.min(160, z + 20))}>+</button>
          <div style={{ width: 1, height: 16, background: 'var(--border)', margin: '0 4px' }} />
          <button className="btn btn-sm" onClick={onImport}>📥 엑셀</button>
          <button className="btn btn-primary btn-sm">+ 항목 추가</button>
        </div>
      </div>

      {/* 본문: Names | Chart | Detail */}
      <div className="gantt-wrap">
        {/* Names */}
        <div className="gantt-names">
          <div className="gantt-names-header">
            <span style={{ fontSize: 11, color: 'var(--text-4)', fontWeight: 600, letterSpacing: '.5px' }}>TASK ({filtered.length})</span>
          </div>
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {filtered.map((t) =>
            <div key={t.id}
            className={`gantt-name-cell${selectedId === t.id ? ' selected' : ''}`}
            onClick={() => setSelectedId(t.id)}>
              
                <div className="proj-dot" style={{ background: PROJ_COLORS[t.project], width: 8, height: 8 }} />
                <span className="gantt-name-text">{t.name}</span>
                {t._isTask && <span title="할일 목록의 Task" style={{ fontSize: 10, color: 'var(--accent)', opacity: .8 }}>🔗</span>}
                <span className={`badge-prio-${t.priority.toLowerCase()}`}>{t.priority}</span>
              </div>
            )}
            {filtered.length === 0 &&
            <div style={{ padding: '24px 14px', fontSize: 12, color: 'var(--text-4)', textAlign: 'center' }}>일정 없음</div>
            }
          </div>
        </div>

        {/* Chart */}
        <div className="gantt-chart-area" ref={chartScrollRef}>
          <div className="gantt-chart-inner" style={{ minWidth: totalW }}>
            {/* 헤더 (sticky) */}
            <div style={{ position: 'sticky', top: 0, zIndex: 3, background: 'var(--surface)' }}>
              {/* 월 라벨 */}
              <div className="gantt-month-row">
                {monthGroups.map((g, i) =>
                <div key={i} className="gantt-month-cell" style={{ width: g.count * colW, flexShrink: 0 }}>
                    {g.month}월
                  </div>
                )}
              </div>
              {/* 주 라벨 */}
              <div className="gantt-week-row">
                {WEEKS.map((w, i) => {
                  const isCurrent = i === todayWeekIdx;
                  return (
                    <div key={i} className={`gantt-week-cell${isCurrent ? ' current' : ''}`} style={{ width: colW }}>
                      {w}
                    </div>);

                })}
              </div>
            </div>

            {/* Body */}
            <div className="gantt-chart-body" style={{ minWidth: totalW }}>
              {/* 그리드 라인 (한 번에) */}
              <div className="gantt-grid-bg" style={{ backgroundSize: `${colW}px 100%` }} />

              {/* 현재 주 칼럼 음영 */}
              <div style={{ position: 'absolute', top: 0, bottom: 0, left: todayWeekIdx * colW, width: colW, background: 'var(--accent-light)', opacity: .3, pointerEvents: 'none' }} />

              {/* 행들 */}
              {filtered.map((t) => {
                const color = PROJ_COLORS[t.project] || 'var(--text-3)';
                const left = t.startWeek * colW + 4;
                const width = (t.endWeek - t.startWeek + 1) * colW - 8;
                const isDone = t.done >= 100;
                const dd = dDay(t.endWeek);
                const showDd = !isDone && t.priority === 'A' && dd && parseInt(dd.replace(/\D/g, '') || '99') <= 7;
                return (
                  <div key={t.id}
                  className={`gantt-row${selectedId === t.id ? ' selected' : ''}`}
                  onClick={() => setSelectedId(t.id)}>
                    
                    <div className="gantt-bar"
                    title={`${t.name} · ${t.done}% · ${WEEKS[t.startWeek]}~${WEEKS[t.endWeek]}`}
                    style={{ left, width, background: isDone ? 'var(--text-4)' : color }}>
                      
                      <div className="gantt-progress" style={{ width: `${t.done}%` }} />
                    </div>
                    {/* 막대 우측 외부 라벨: 진행률 + D-day */}
                    <div className="gantt-bar-label-out" style={{ left: left + width + 6 }}>
                      {t.done}%
                      {showDd && <span className="gantt-d-chip">{dd}</span>}
                    </div>
                  </div>);

              })}

              {/* 오늘 라인 (전체 높이) */}
              <div className="gantt-today-line" style={{ left: todayX }} />
            </div>

            {/* 오늘 라벨 (sticky 헤더 위에 표시) */}
            <div className="gantt-today-label" style={{ left: todayX, top: 18 }}>{todayLabel}</div>
          </div>
        </div>

        {/* 상세 패널 */}
        {selected &&
        <div className="gantt-detail-panel">
            <div className="gantt-detail-head">
              <div className="proj-dot" style={{ background: PROJ_COLORS[selected.project], width: 10, height: 10, marginTop: 5 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)', lineHeight: 1.4 }}>{selected.name}</div>
                <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 3 }}>{selected.project}</div>
              </div>
              <button className="icon-btn" onClick={() => setSelectedId(null)} title="닫기">✕</button>
            </div>
            <div className="gantt-detail-body">
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">우선순위</div>
                <div><span className={`badge-prio-${selected.priority.toLowerCase()}`}>{selected.priority}</span></div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">기간</div>
                <div className="gantt-detail-value">{WEEKS[selected.startWeek]} ~ {WEEKS[selected.endWeek]} <span style={{ color: 'var(--text-4)' }}>({selected.endWeek - selected.startWeek + 1}주)</span></div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">남은 일수</div>
                <div className="gantt-detail-value" style={{ color: dDay(selected.endWeek) ? 'var(--red)' : 'var(--green)' }}>
                  {dDay(selected.endWeek) || '✓ 마감 경과'}
                </div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">진행률 — {selected.done}%</div>
                <input type="range" min="0" max="100" step="5"
              className="gantt-progress-input"
              value={selected.done}
              onChange={(e) => updateProgress(selected.id, parseInt(e.target.value))} />
              
                <div style={{ display: 'flex', gap: 4, marginTop: 4 }}>
                  {[0, 25, 50, 75, 100].map((v) =>
                <button key={v} className="btn btn-sm" style={{ flex: 1, padding: '2px 0' }} onClick={() => updateProgress(selected.id, v)}>{v}</button>
                )}
                </div>
              </div>
              <div className="gantt-detail-section">
                <div className="gantt-detail-label">액션</div>
                <button className="btn btn-sm" onClick={() => logToJournal(selected)} title={`${selected._journalDate || TODAY} 일지로 이동 — 이 항목이 체크리스트로 추가되어요`}>
                  📝 {formatKoreanDate(selected._journalDate || TODAY)} 일지에 기록
                </button>
                <button className="btn btn-sm" onClick={() => removeFromGantt(selected)} style={{ color: 'var(--red)' }}>✕ 일정에서 제거</button>
                {selected._isTask &&
              <div style={{ fontSize: 10, color: 'var(--text-4)', marginTop: 4, lineHeight: 1.5 }}>
                    🔗 이 항목은 <strong>할일 목록</strong>의 Task에서 자동 표시되는 일정이에요.{'\n'}제거해도 할일은 남아있어요.
                  </div>
              }
              </div>
            </div>
          </div>
        }
      </div>

      {/* 범례 */}
      <div className="gantt-legend">
        {Object.entries(PROJ_COLORS).filter(([k]) => k !== '전체').slice(0, 6).map(([p, c]) =>
        <div key={p} className="legend-item">
            <div className="legend-dot" style={{ background: c }} />
            {p}
          </div>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 12, alignItems: 'center' }}>
          <div className="legend-item">
            <div className="legend-dot" style={{ background: 'rgba(0,0,0,.18)' }} />진행률
          </div>
          <div className="legend-item" style={{ color: 'var(--red)' }}>▌ 오늘</div>
          <div className="legend-item" style={{ color: 'var(--text-4)' }}>막대 클릭 → 상세 편집</div>
        </div>
      </div>
    </div>);

}

/* ─── Weekly View ─── */
function WeeklyView({ tasks, dataVersion }) {
  /* ── 주 오프셋 (0=이번 주, -1=지난 주, …) ── */
  const [weekOffset, setWeekOffset] = useState(0);
  const DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];

  /* ── 주 범위 계산 ── */
  const { weekStart, weekEnd, weekLabel, WEEK_DATES, nextWeekStart, nextWeekEnd } = React.useMemo(() => {
    const t = new Date(); t.setHours(0, 0, 0, 0);
    const dow = (t.getDay() + 6) % 7;
    const mon = new Date(t); mon.setDate(t.getDate() - dow + weekOffset * 7);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const nwMon = new Date(sun); nwMon.setDate(sun.getDate() + 1);
    const nwSun = new Date(nwMon); nwSun.setDate(nwMon.getDate() + 6);
    const weekDates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      weekDates.push(localYMD(d));
    }
    const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
    const label = weekOffset === 0 ? `이번 주 (${fmt(mon)}–${fmt(sun)})` :
                  weekOffset === -1 ? `지난 주 (${fmt(mon)}–${fmt(sun)})` :
                  `${fmt(mon)}–${fmt(sun)}`;
    return {
      weekStart: localYMD(mon), weekEnd: localYMD(sun),
      weekLabel: label, WEEK_DATES: weekDates,
      nextWeekStart: localYMD(nwMon), nextWeekEnd: localYMD(nwSun),
    };
  }, [weekOffset]);

  /* ── 일지 fetch ── */
  const [journals, setJournals] = useState([]);
  useEffect(() => {
    let cancelled = false;
    GET(`/api/journals/range?start=${weekStart}&end=${weekEnd}`)
      .then((data) => { if (!cancelled) setJournals(Array.isArray(data) ? data : []); })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [weekStart, weekEnd, dataVersion]);

  /* ── 클라이언트 계산 ── */
  const isOpen    = (t) => ['TODO', 'DOING'].includes(t.status);
  const isDone    = (t) => t.status === 'DONE';
  const inWeek    = (dateStr) => dateStr && dateStr >= weekStart && dateStr <= weekEnd;

  const doneThisWeek  = tasks.filter((t) => isDone(t) && inWeek(t.updatedAt));
  const openItems     = tasks.filter((t) => isOpen(t));
  const openDecisions = tasks.filter((t) => t.type === 'DECISION' && isOpen(t));
  const openIssues    = tasks.filter((t) => t.type === 'ISSUE'    && isOpen(t));

  const decisionsThisWeek = tasks.filter((t) => t.type === 'DECISION' && inWeek(t.createdAt));
  const nextWeekItems     = tasks.filter((t) => t.deadline && t.deadline >= nextWeekStart && t.deadline <= nextWeekEnd && t.status !== 'DONE' && t.status !== 'CANCELLED');

  const journalDays = journals.filter((j) => j.content && j.content.trim()).length;

  /* type별 현황 */
  const TYPE_KEYS = ['TASK', 'WAITING', 'ISSUE', 'FOLLOWUP', 'DECISION'];
  const typeStats = TYPE_KEYS.map((k) => {
    const all  = tasks.filter((t) => t.type === k);
    const open = all.filter(isOpen).length;
    const done = all.filter(isDone).length;
    return { key: k, label: TYPE_META[k].label, icon: TYPE_META[k].icon, open, done };
  }).filter((s) => s.open + s.done > 0);

  /* 프로젝트별 현황 */
  const projSet = [...new Set(tasks.map((t) => t.project || '미분류'))];
  const projStats = projSet.map((p) => {
    const pt = tasks.filter((t) => (t.project || '미분류') === p);
    return { name: p, open: pt.filter(isOpen).length, done: pt.filter(isDone).length };
  }).filter((s) => s.open + s.done > 0).sort((a, b) => b.open - a.open);

  /* 히트맵 */
  function heatLevel(c) { return !c ? 0 : c === 1 ? 1 : c <= 3 ? 2 : c <= 6 ? 3 : 4; }
  const firstDate  = new Date(HEATMAP_DATA[0].date + 'T00:00:00');
  const startDow   = (firstDate.getDay() + 6) % 7;
  const padded     = [...Array(startDow).fill(null), ...HEATMAP_DATA];
  while (padded.length % 7 !== 0) padded.push(null);
  const numWeeks   = padded.length / 7;
  const [tooltip, setTooltip] = useState(null);

  /* 일지 펼침 */
  const [expanded, setExpanded] = useState({});
  const toggleJ = (d) => setExpanded((p) => ({ ...p, [d]: !p[d] }));

  /* 공통 카드 */
  const Card = ({ children, style }) => (
    <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '16px 20px', boxShadow: 'var(--shadow)', ...style }}>
      {children}
    </div>
  );
  const SectionTitle = ({ children }) => (
    <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-3)', letterSpacing: '.04em', textTransform: 'uppercase', marginBottom: 12 }}>{children}</div>
  );
  const EmptyMsg = ({ children }) => (
    <div style={{ fontSize: 12, color: 'var(--text-4)', padding: '10px 0' }}>{children}</div>
  );

  return (
    <div style={{ padding: 24, overflow: 'auto', height: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>

      {/* 주 네비게이션 */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <button onClick={() => setWeekOffset((o) => o - 1)} className="icon-btn" style={{ padding: '4px 10px' }}>‹</button>
        <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-2)' }}>{weekLabel}</span>
        <button onClick={() => setWeekOffset((o) => o + 1)} className="icon-btn" style={{ padding: '4px 10px' }} disabled={weekOffset >= 0}>{weekOffset >= 0 ? '–' : '›'}</button>
        {weekOffset !== 0 && (
          <button onClick={() => setWeekOffset(0)} className="filter-chip" style={{ marginLeft: 4, fontSize: 11 }}>이번 주로</button>
        )}
      </div>

      {/* 요약 카드 4개 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10 }}>
        {[
          { n: doneThisWeek.length,  l: '완료',      c: 'var(--green)',       bg: 'var(--green-light)' },
          { n: openItems.length,     l: '열린 항목',  c: 'var(--accent)',      bg: 'var(--accent-light)' },
          { n: openDecisions.length, l: '결정',       c: 'var(--green)',       bg: 'var(--green-light)' },
          { n: openIssues.length,    l: '이슈',       c: 'var(--red)',         bg: 'var(--red-light)' },
        ].map((s, i) => (
          <Card key={i} style={{ textAlign: 'center', padding: '14px 10px', background: s.bg }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: s.c }}>{s.n}</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 4 }}>{s.l}</div>
          </Card>
        ))}
      </div>

      {/* 완료율 + 일지 작성일 */}
      <Card>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>이번 주 완료율</span>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: 'var(--text-3)' }}>📝 일지 {journalDays}일</span>
            <span style={{ fontSize: 12, color: 'var(--green)', fontWeight: 700 }}>
              {doneThisWeek.length + openItems.length > 0 ? Math.round(doneThisWeek.length / (doneThisWeek.length + openItems.length) * 100) : 0}%
            </span>
          </div>
        </div>
        <div className="progress-bar" style={{ height: 6 }}>
          <div className="progress-fill" style={{
            width: `${doneThisWeek.length + openItems.length > 0 ? Math.round(doneThisWeek.length / (doneThisWeek.length + openItems.length) * 100) : 0}%`,
            background: 'var(--green)',
          }} />
        </div>
      </Card>

      {/* 타입별 + 프로젝트별 (2열) */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        {/* 타입별 현황 */}
        <Card>
          <SectionTitle>타입별 현황</SectionTitle>
          {typeStats.length === 0 ? <EmptyMsg>데이터 없음</EmptyMsg> : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {typeStats.map((s) => (
                <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 13, width: 18 }}>{s.icon || '📌'}</span>
                  <span style={{ fontSize: 12, color: 'var(--text-2)', flex: 1 }}>{s.label}</span>
                  <span style={{ fontSize: 11, color: 'var(--green)', fontWeight: 600 }}>{s.done}완료</span>
                  <span style={{ fontSize: 11, color: 'var(--text-3)', marginLeft: 4 }}>{s.open}진행</span>
                </div>
              ))}
            </div>
          )}
        </Card>

        {/* 프로젝트별 현황 */}
        <Card>
          <SectionTitle>프로젝트별 현황</SectionTitle>
          {projStats.length === 0 ? <EmptyMsg>데이터 없음</EmptyMsg> : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {projStats.slice(0, 6).map((s) => {
                const total = s.done + s.open;
                const pct   = total ? Math.round(s.done / total * 100) : 0;
                return (
                  <div key={s.name}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                      <span style={{ fontSize: 12, color: 'var(--text-2)' }}>{s.name}</span>
                      <span style={{ fontSize: 11, color: 'var(--text-3)' }}>{s.done}/{total} · {pct}%</span>
                    </div>
                    <div className="progress-bar" style={{ height: 4 }}>
                      <div className="progress-fill" style={{ width: `${pct}%`, background: PROJ_COLORS[s.name] || 'var(--accent)' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>

      {/* 이번 주 Decision */}
      <Card>
        <SectionTitle>✅ 이번 주 생성된 결정</SectionTitle>
        {decisionsThisWeek.length === 0 ? <EmptyMsg>이번 주 결정된 항목 없음</EmptyMsg> : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {decisionsThisWeek.map((t) => (
              <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 6, background: 'var(--surface-2)', border: '1px solid var(--border)' }}>
                <span className={`badge badge-${t.status === 'DONE' ? 'green' : 'blue'}`} style={{ fontSize: 10 }}>{t.status}</span>
                <span style={{ fontSize: 13, flex: 1 }}>{t.title}</span>
                {t.project && <span style={{ fontSize: 11, color: 'var(--text-3)' }}>📁 {t.project}</span>}
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* 열린 이슈 */}
      <Card>
        <SectionTitle>⚠ 열린 이슈 ({openIssues.length})</SectionTitle>
        {openIssues.length === 0 ? <EmptyMsg>열린 이슈 없음 👍</EmptyMsg> : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {openIssues.slice(0, 8).map((t) => (
              <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 6, background: 'var(--red-light)', border: '1px solid var(--border)' }}>
                <span className={`badge badge-prio-${t.priority?.toLowerCase()}`} style={{ fontSize: 10 }}>{t.priority}</span>
                <span style={{ fontSize: 13, flex: 1 }}>{t.title}</span>
                {t.deadline && <span style={{ fontSize: 11, color: 'var(--red)', fontWeight: 600 }}>~{t.deadline}</span>}
                {t.project && <span style={{ fontSize: 11, color: 'var(--text-3)' }}>📁 {t.project}</span>}
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* 다음 주 예정 */}
      <Card>
        <SectionTitle>📅 다음 주 마감 예정 ({nextWeekItems.length})</SectionTitle>
        {nextWeekItems.length === 0 ? <EmptyMsg>다음 주 마감 예정 없음</EmptyMsg> : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {nextWeekItems.sort((a, b) => (a.deadline || '').localeCompare(b.deadline || '')).map((t) => (
              <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', borderRadius: 6, background: 'var(--amber-light)', border: '1px solid var(--border)' }}>
                <span style={{ fontSize: 11, color: 'var(--amber)', fontWeight: 700 }}>{t.deadline}</span>
                <span style={{ fontSize: 13, flex: 1 }}>{t.title}</span>
                {TYPE_META[t.type]?.icon && <span style={{ fontSize: 12 }}>{TYPE_META[t.type].icon}</span>}
                {t.project && <span style={{ fontSize: 11, color: 'var(--text-3)' }}>📁 {t.project}</span>}
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* 이번 주 일지 */}
      <Card>
        <SectionTitle>📝 이번 주 일지</SectionTitle>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {WEEK_DATES.map((date) => {
            const j   = journals.find((j) => j.date === date);
            const dow = DAYS_KO[(new Date(date + 'T00:00:00').getDay() + 6) % 7];
            const isExp = expanded[date];
            return (
              <div key={date} style={{ borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border)' }}>
                <div onClick={() => toggleJ(date)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', cursor: 'pointer', background: isExp ? 'var(--surface-2)' : 'transparent' }}>
                  <span style={{ fontSize: 10, color: 'var(--text-4)', width: 14 }}>{dow}</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-2)' }}>{date}</span>
                  {j && j.content
                    ? <span style={{ fontSize: 10, background: 'var(--accent-light)', color: 'var(--accent-text)', borderRadius: 99, padding: '1px 7px', marginLeft: 'auto' }}>기록 있음</span>
                    : <span style={{ fontSize: 10, color: 'var(--text-4)', marginLeft: 'auto' }}>없음</span>}
                  <span style={{ fontSize: 10, color: 'var(--text-4)' }}>{isExp ? '▲' : '▼'}</span>
                </div>
                {isExp && (
                  <div style={{ padding: '10px 14px 12px', borderTop: '1px solid var(--border)', background: 'var(--surface)' }}>
                    {j && j.content
                      ? <pre style={{ fontFamily: 'var(--mono)', fontSize: 12, whiteSpace: 'pre-wrap', color: 'var(--text-2)', lineHeight: 1.8, margin: 0 }}>{j.content}</pre>
                      : <span style={{ fontSize: 12, color: 'var(--text-4)' }}>이 날 일지가 비어있어요.</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      {/* 히트맵 */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>🌿 최근 35일 완료 현황</span>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center', fontSize: 11, color: 'var(--text-3)' }}>
            <span>적음</span>
            {[0, 1, 2, 3, 4].map((l) => <div key={l} className={`heat-cell heat-${l}`} style={{ width: 12, height: 12, borderRadius: 3 }} />)}
            <span>많음</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'flex-start' }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3, paddingTop: 2 }}>
            {DAYS_KO.map((d) => <div key={d} style={{ width: 18, height: 14, fontSize: 10, color: 'var(--text-3)', lineHeight: '14px', textAlign: 'right' }}>{d}</div>)}
          </div>
          <div style={{ display: 'grid', gridTemplateRows: 'repeat(7,14px)', gridTemplateColumns: `repeat(${numWeeks},14px)`, gridAutoFlow: 'column', gap: 3 }}>
            {padded.map((d, i) => d
              ? <div key={i} className={`heat-cell heat-${heatLevel(d.count)}`} style={{ width: 14, height: 14, borderRadius: 3, cursor: 'default' }}
                  onMouseEnter={(e) => setTooltip({ text: `${d.date}  완료 ${d.count}개`, x: e.clientX, y: e.clientY })}
                  onMouseLeave={() => setTooltip(null)} />
              : <div key={i} style={{ width: 14, height: 14, visibility: 'hidden' }} />
            )}
          </div>
        </div>
        {tooltip && (
          <div style={{ position: 'fixed', left: tooltip.x + 12, top: tooltip.y - 28, background: 'var(--text)', color: 'var(--surface)', padding: '4px 10px', borderRadius: 6, fontSize: 12, pointerEvents: 'none', zIndex: 200, boxShadow: 'var(--shadow-md)' }}>
            {tooltip.text}
          </div>
        )}
      </Card>

    </div>
  );
}
