<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLog — 업무 자동화 앱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<!-- React/Babel — 폐쇄망 로컬 미러 (static/vendor/). production.min UMD. -->
<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f1ec;
  --surface: #ffffff;
  --surface-2: #faf8f5;
  --border: #ebe5dc;
  --border-2: #dfd9d2;
  --text: #1e1b18;
  --text-2: #5c564f;
  --text-3: #8b857d;
  --text-4: #a39d96;
  --accent: #4f46e5;
  --accent-light: #eef2ff;
  --accent-text: #4338ca;
  --red: #dc2626;
  --red-light: #fee2e2;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --green: #16a34a;
  --green-light: #dcfce7;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --prio-a: #dc2626;
  --prio-b: #d97706;
  --prio-c: #78716c;
  --proj-1: #2563eb;
  --proj-2: #7c3aed;
  --proj-3: #059669;
  --proj-4: #d97706;
  --sidebar-w: 176px;
  --radius: 6px;
  --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.05);
  --font: 'Pretendard Variable', 'Pretendard', 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

[data-dark="true"] {
  --bg: #0f0e0d;
  --surface: #1e1c1a;
  --surface-2: #2a2724;
  --border: #373330;
  --border-2: #4a4542;
  --text: #f5f3f0;
  --text-2: #d4cfc9;
  --text-3: #9e9890;
  --text-4: #6b6560;
  --accent: #4f8ef7;
  --accent-light: #1a2f52;
  --accent-text: #7eb0fa;
  --red: #f87171;
  --red-light: #2d1515;
  --amber: #fbbf24;
  --amber-light: #2d2008;
  --green: #4ade80;
  --green-light: #0f2a19;
  --blue-light: #1a2f52;
  --prio-a: #f87171;
  --prio-b: #fbbf24;
  --prio-c: #9e9890;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
  line-height: 1.5;
  transition: background .2s, color .2s;
}

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: var(--surface); }
.main-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Sidebar ── */
.sidebar-logo { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
.sidebar-logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.sidebar-logo-sub { font-size: 10px; color: var(--text-4); margin-top: 1px; }
.sidebar-section { padding: 10px 10px 6px; }
.sidebar-section-label { font-size: 10px; font-weight: 600; color: var(--text-4); letter-spacing: .5px; text-transform: uppercase; padding: 0 4px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text-2); transition: background .12s; user-select: none; }
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--accent-light); color: var(--accent-text); font-weight: 600; }
.nav-item .icon { font-size: 14px; width: 18px; text-align: center; }
.proj-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sidebar-footer { border-top: 1px solid var(--border); padding: 10px 12px; margin-top: auto; }

/* ── Mini Calendar ── */
.mini-cal { padding: 4px 10px 8px; }
.mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.mini-cal-nav { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 14px; padding: 2px 4px; border-radius: 3px; }
.mini-cal-nav:hover { background: var(--surface-2); }
.mini-cal-month { font-size: 12px; font-weight: 600; color: var(--text-2); }
.mini-cal-grid { display: grid; grid-template-columns: auto repeat(7, 1fr); gap: 1px; }
.mini-cal-week { font-size: 8px; color: var(--text-4); text-align: center; padding: 2px 3px; line-height: 1.6; opacity: .6; }
.mini-cal-dow { font-size: 9px; color: var(--text-4); text-align: center; padding: 2px 0; }
.mini-cal-day { font-size: 10px; text-align: center; padding: 2px; border-radius: 3px; cursor: pointer; color: var(--text-3); position: relative; }
.mini-cal-day:hover { background: var(--surface-2); color: var(--text); }
.mini-cal-day.today { background: var(--text); color: var(--surface); font-weight: 700; border-radius: 50%; }
.mini-cal-day.has-log { color: var(--text); font-weight: 600; }
.mini-cal-day.has-log::after { content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: var(--accent); }
.mini-cal-day.today.has-log::after { background: var(--surface); }

/* ── Dark mode toggle ── */
.dm-toggle { display: flex; align-items: center; justify-content: space-between; }
.dm-label { font-size: 12px; color: var(--text-3); }
.toggle-track { width: 32px; height: 17px; background: var(--border-2); border-radius: 99px; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.toggle-track.on { background: var(--text); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; background: white; border-radius: 50%; transition: left .2s; }
.toggle-track.on .toggle-thumb { left: 17px; }

/* ── Header ── */
.header-title { font-size: 15px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 12px; color: var(--text-3); }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-prio-a { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.badge-prio-b { background: #fef7e6; color: #a16207; border: 1px solid #fcd9a4; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.badge-prio-c { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); font-size: 10px; padding: 1px 5px; border-radius: 3px; }
.badge-type { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; display: inline-flex; align-items: center; gap: 2px; }
.badge-type-waiting  { background: var(--amber-light);  color: var(--amber); }
.badge-type-decision { background: var(--green-light);  color: var(--green); }
.badge-type-issue    { background: var(--red-light);    color: var(--red); }
.badge-type-followup { background: var(--accent-light); color: var(--accent-text); }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); transition: background .12s, border-color .12s; font-family: var(--font); user-select: none; }
.btn:hover { background: var(--surface-2); }
.btn-primary { background: var(--text); color: var(--surface); border-color: var(--text); }
.btn-primary:hover { opacity: .85; }
.btn-sm { padding: 3px 8px; font-size: 11px; }

/* ── Dashboard 3-col ── */
.dashboard-grid { display: grid; grid-template-columns: var(--col-1, 1fr) var(--col-2, 1fr) var(--col-3, 260px); height: 100%; overflow: hidden; position: relative; min-width: 0; }
.dashboard-grid > .col { min-width: 0; }
.col-resizer { width: 5px; cursor: col-resize; background: transparent; flex-shrink: 0; position: relative; z-index: 5; transition: background .15s; }
.col-resizer:hover, .col-resizer.dragging { background: var(--accent); }
.col-resizer::before { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 1px; height: 24px; background: var(--border-2); }
.col-resizer:hover::before, .col-resizer.dragging::before { background: var(--accent); }
.col-reorder-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; font-size: 10px; padding: 1px 5px; cursor: pointer; color: var(--text-3); }
.col-reorder-btn:hover { background: var(--surface-2); color: var(--text); }
.col { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
.col:last-child { border-right: none; }
.col-header { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--surface); }
.col-header-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
.col-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.col-body::-webkit-scrollbar { width: 4px; }
.col-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }

/* ── Task card ── */
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 10px; display: flex; flex-direction: column; gap: 5px; transition: box-shadow .12s; }
.task-card:hover { box-shadow: var(--shadow); }
.task-card-top { display: flex; align-items: flex-start; gap: 7px; }
.task-card-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
.task-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.task-card-actions { display: flex; gap: 4px; margin-top: 4px; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; font-size: 11px; cursor: pointer; color: var(--text-3); transition: background .12s; }
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn.done { background: var(--green-light); border-color: var(--green); color: var(--green); }

/* ── Quick add ── */
.quick-add { border: 1px dashed var(--border-2); border-radius: var(--radius); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
.quick-input { border: none; border-bottom: 1px solid var(--border); background: transparent; font-size: 13px; font-family: var(--font); color: var(--text); width: 100%; padding: 3px 0; outline: none; }
.quick-input::placeholder { color: var(--text-4); }
.quick-input:focus { border-bottom-color: var(--accent); }
.prio-btns { display: flex; gap: 4px; }
.prio-btn { border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; font-size: 11px; cursor: pointer; background: var(--surface); color: var(--text-3); font-family: var(--font); }
.prio-btn.sel-a { background: #fef2f2; border-color: #fecaca; color: #b91c1c; font-weight: 700; }
.prio-btn.sel-b { background: #fef7e6; border-color: #fcd9a4; color: #a16207; font-weight: 700; }
.prio-btn.sel-c { background: var(--surface-2); border-color: var(--border-2); color: var(--text-3); font-weight: 700; }

/* ── Toast ── */
.toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
.toast { background: var(--text); color: var(--surface); padding: 10px 14px; border-radius: 8px; font-size: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.18); display: flex; align-items: center; gap: 10px; pointer-events: auto; animation: toastIn .25s ease-out; max-width: 460px; }
.toast .toast-action { color: var(--accent); cursor: pointer; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.toast .toast-action:hover { background: rgba(255,255,255,.1); }
.toast.toast-success { background: #16a34a; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Search & Tags ── */
.search-bar { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; min-width: 280px; transition: all .15s; }
.search-bar:focus-within { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }
.search-bar input { flex: 1; border: none; outline: none; background: transparent; font-size: 12px; color: var(--text); font-family: var(--font); }
.search-bar input::placeholder { color: var(--text-4); }
.search-bar .kbd { font-size: 9px; color: var(--text-4); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; }
.tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 1px 8px; border-radius: 99px; font-size: 11px; background: var(--accent-light); color: var(--accent-text); border: 1px solid transparent; cursor: pointer; transition: all .12s; font-weight: 500; }
.tag-chip:hover { border-color: var(--accent); }
.tag-chip.lg { font-size: 12px; padding: 3px 10px; }
.search-result-row { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.search-result-row:hover { background: var(--surface-2); }
.search-snippet { font-size: 12px; color: var(--text-3); margin-top: 4px; line-height: 1.6; }
.search-snippet mark { background: #fef08a; color: var(--text); padding: 0 2px; border-radius: 2px; font-weight: 600; }
[data-dark="true"] .search-snippet mark { background: #854d0e; color: #fef9c3; }

/* ── Journal ── */
.journal-textarea { flex: 1; border: none; background: transparent; font-size: 13px; font-family: var(--mono); color: var(--text); resize: none; outline: none; line-height: 1.9; padding: 0; width: 100%; }
.journal-textarea::placeholder { color: var(--text-4); }
.save-status { font-size: 10px; color: var(--text-4); }

/* ── Stats ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card { background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

/* ── Heatmap ── */
.heatmap-grid { display: flex; gap: 3px; flex-wrap: wrap; }
.heat-cell { width: 10px; height: 10px; border-radius: 2px; background: var(--surface-2); }
.heat-1 { background: #bbf7d0; }
.heat-2 { background: #4ade80; }
.heat-3 { background: #16a34a; }

/* ── Alert ── */
.alert { border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; margin-bottom: 0; }
.alert-red { background: var(--red-light); color: var(--red); }
.alert-amber { background: var(--amber-light); color: var(--amber); }

/* ── Gantt v4 (정렬 + 사용성 개선) ── */
.gantt-wrap { display: flex; flex: 1; overflow: hidden; min-height: 0; }
.gantt-names { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
.gantt-chart-area { flex: 1; overflow: auto; position: relative; }
.gantt-chart-inner { position: relative; }

/* 동일 높이 통일 — 헤더는 2단(월+주) 합쳐서 56px, 행은 44px */
.gantt-head-h { height: 56px; flex-shrink: 0; }
.gantt-row-h { height: 44px; }

/* 헤더 높이 = 월(26) + 주(30) = 56. 좌측도 56로 맞춤. */
.gantt-names-header { height: 56px; padding: 0 14px; display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 3; }

.gantt-month-row { display: flex; height: 26px; background: var(--surface-2); }
.gantt-month-cell { font-size: 11px; font-weight: 700; color: var(--text-2); display: flex; align-items: center; padding: 0 10px; border-right: 1px solid var(--border); letter-spacing: -0.2px; }
.gantt-week-row { display: flex; height: 30px; border-bottom: 1px solid var(--border); background: var(--surface); }
.gantt-week-cell { font-size: 11px; color: var(--text-3); display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); font-weight: 500; flex-shrink: 0; }
.gantt-week-cell.weekend { background: var(--surface-2); }
.gantt-week-cell.current { background: var(--accent-light); color: var(--accent-text); font-weight: 700; }

.gantt-name-cell { height: 44px; padding: 0 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.gantt-name-cell:hover, .gantt-name-cell.selected { background: var(--surface-2); }
.gantt-name-cell.selected { box-shadow: inset 3px 0 0 var(--accent); }
.gantt-name-text { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.gantt-name-meta { font-size: 10px; color: var(--text-4); white-space: nowrap; }

/* Chart body — grid 라인을 background로 한 번만 */
.gantt-chart-body { position: relative; }
.gantt-row {
  height: 44px;
  border-bottom: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background .12s;
}
.gantt-row:hover, .gantt-row.selected { background: var(--surface-2); }
.gantt-row.selected { box-shadow: inset 0 0 0 1px var(--accent-light); }

/* 그리드 라인은 chart 전체 background로 한 번만 그림 (정렬 보장) */
.gantt-grid-bg {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(to right, var(--border) 1px, transparent 1px);
  background-repeat: repeat;
}
.gantt-weekend-stripe {
  position: absolute; top: 0; bottom: 0;
  background: var(--surface-2); opacity: .5; pointer-events: none;
}

.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 18px; border-radius: 4px; min-width: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.08); display: flex; align-items: center; transition: transform .12s, box-shadow .12s; }
.gantt-bar:hover { transform: translateY(-50%) scale(1.02); box-shadow: 0 2px 6px rgba(0,0,0,.16); z-index: 4; }
.gantt-bar.done { opacity: .55; }
.gantt-progress { height: 100%; border-radius: 4px 0 0 4px; background: rgba(0,0,0,0.18); }
[data-dark="true"] .gantt-progress { background: rgba(255,255,255,0.22); }
.gantt-bar-label-out { position: absolute; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text-3); white-space: nowrap; pointer-events: none; font-weight: 500; }
.gantt-d-chip { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; background: var(--red); color: white; margin-left: 4px; letter-spacing: -0.2px; }

.gantt-today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); opacity: .85; z-index: 3; pointer-events: none; }
.gantt-today-label { position: absolute; top: -4px; transform: translateX(-50%); background: var(--red); color: white; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; white-space: nowrap; box-shadow: 0 2px 4px rgba(0,0,0,.15); }

/* 상세 패널 */
.gantt-detail-panel { width: 320px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
.gantt-detail-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
.gantt-detail-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
.gantt-detail-section { display: flex; flex-direction: column; gap: 6px; }
.gantt-detail-label { font-size: 10px; font-weight: 600; color: var(--text-4); letter-spacing: .5px; text-transform: uppercase; }

.filter-chip { padding: 3px 10px; border-radius: 99px; font-size: 11px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text-3); transition: all .12s; }
.filter-chip.active { background: var(--text); color: var(--surface); border-color: var(--text); font-weight: 600; }
.gantt-legend { padding: 6px 14px; border-top: 1px solid var(--border); display: flex; gap: 14px; align-items: center; flex-shrink: 0; background: var(--surface); }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-3); }
.legend-dot { width: 10px; height: 8px; border-radius: 2px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow-lg); width: 540px; max-width: 100%; overflow: hidden; }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-body { padding: 18px 20px; }
.modal-footer { padding: 12px 20px 16px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
.dropzone { border: 2px dashed var(--border-2); border-radius: var(--radius); padding: 36px 20px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
.dropzone:hover { border-color: var(--accent); background: var(--accent-light); }
.dropzone-icon { font-size: 40px; margin-bottom: 10px; }
.step-indicator { display: flex; gap: 6px; align-items: center; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-2); }
.step-dot.active { background: var(--accent); width: 20px; border-radius: 99px; }
.step-dot.done { background: var(--green); }
.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.preview-table th { background: var(--surface-2); padding: 6px 10px; text-align: left; font-weight: 600; color: var(--text-2); border-bottom: 1px solid var(--border); }
.preview-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: middle; }
.preview-table tr:last-child td { border-bottom: none; }
.proj-select { border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; font-size: 11px; background: var(--surface); color: var(--text); font-family: var(--font); cursor: pointer; }

/* ── Todo list (sidebar) ── */
.sidebar-todo { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 3px; cursor: pointer; }
.sidebar-todo:hover { background: var(--surface-2); }
.sidebar-todo-check { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid var(--border-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; }
.sidebar-todo-check.done { background: var(--green); border-color: var(--green); color: white; }
.sidebar-todo-text { font-size: 11px; color: var(--text-3); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

@keyframes ribbonPop { from { opacity: 0; transform: translateY(-6px) scale(.985); } to { opacity: 1; transform: none; } }

.ribbon-card { animation: ribbonPop .42s cubic-bezier(.22,1,.36,1); }

.icon-btn { transition: background .12s, color .12s, transform .09s ease; }

/* ── 빈 상태 (일러스트풍 이모지 + 가벼운 카피) ── */

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

              role="switch" aria-checked={!!value}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;

function TweakText({ label, value, placeholder, onChange }) {

             onChange={(e) => onChange(e.target.value)} />

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {

             onChange={(e) => onChange(e.target.value)} />

/* ── journal-fold (inlined) ── */
/* ── JournalFoldView ──
   마크다운 헤더(# / ## / ###) 기준으로 일지를 섹션으로 나눠 접기/펼치기 +
   Obsidian Live Preview 스타일: 본문은 기본 "렌더링", 클릭하면 그 자리에서 편집.
   메일 본문 등 긴 텍스트를 헤더 아래 묻어두고, 헤더만 펼쳐서 빠르게 스캔하기 위함. */

function parseSections(text) {
  const lines = (text || '').split('\n');
  const sections = [];
  let cur = { header: null, level: 0, body: [] };
  for (const line of lines) {
    const m = line.match(/^(#{1,6})\s+(.*)$/);
    if (m) {
      if (cur.header !== null || cur.body.length) sections.push({ ...cur, body: cur.body.join('\n') });
      cur = { header: line, level: m[1].length, body: [] };
    } else {
      cur.body.push(line);
    }
  }
  if (cur.header !== null || cur.body.length) sections.push({ ...cur, body: cur.body.join('\n') });
  return sections;
}

function joinSections(sections) {
  const out = [];
  for (const s of sections) {
    if (s.header !== null) out.push(s.header);
    if (s.body.length > 0) out.push(...s.body.split('\n'));
  }
  return out.join('\n');
}

/* ── 일지 템플릿 ── 빈 일지에서 "템플릿으로 시작"으로 삽입. localStorage로 사용자 편집 보존.
   parseSections/joinSections와 호환되는 평문 마크다운. */
const DEFAULT_JOURNAL_TEMPLATE = "# 오늘 할 일\n- [ ] \n\n# 메모\n\n# 결정\n\n# 회신 대기\n\n# 이슈";
const JOURNAL_TEMPLATE_KEY = 'worklog.journal.template';
function getJournalTemplate() {
  try {
    const v = localStorage.getItem(JOURNAL_TEMPLATE_KEY);
    return (v == null || v === '') ? DEFAULT_JOURNAL_TEMPLATE : v;
  } catch (e) { return DEFAULT_JOURNAL_TEMPLATE; }
}
function saveJournalTemplate(str) {
  try { localStorage.setItem(JOURNAL_TEMPLATE_KEY, str == null ? '' : str); } catch (e) {}
}

/* ── 날짜 위키링크 해석 ── [[2026-05-12]] · [[오늘]] · [[어제]] · [[내일]] · [[N일전]] ── */
function ymdLocal(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function resolveJournalDate(label) {
  const t = (label || '').trim();
  if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(t)) {
    const [y, m, d] = t.split('-').map(Number);
    return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }
  const today = new Date();today.setHours(0, 0, 0, 0);
  if (t === '오늘' || t.toLowerCase() === 'today') return ymdLocal(today);
  if (t === '어제' || t.toLowerCase() === 'yesterday') {const d = new Date(today);d.setDate(d.getDate() - 1);return ymdLocal(d);}
  if (t === '내일' || t.toLowerCase() === 'tomorrow') {const d = new Date(today);d.setDate(d.getDate() + 1);return ymdLocal(d);}
  const m = t.match(/^(\d+)\s*일\s*전$/);if (m) {const d = new Date(today);d.setDate(d.getDate() - +m[1]);return ymdLocal(d);}
  const m2 = t.match(/^(\d+)\s*일\s*후$/);if (m2) {const d = new Date(today);d.setDate(d.getDate() + +m2[1]);return ymdLocal(d);}
  return null;
}

/* ── 인라인 마크다운 ── **굵게** *기울임* `코드` ~~취소선~~ [[날짜]] #태그 ── */
function renderInline(text, opts) {
  if (text == null || text === '') return text;
  const onJumpDate = opts && opts.onJumpDate;
  const out = [];
  let key = 0;
  const re = /(`[^`]+`)|(\[\[[^\]]+\]\])|(\*\*[^*]+\*\*)|(~~[^~]+~~)|(\*[^*\n]+\*)|(#[^\s#.,!?；;]+)/g;
  let last = 0,m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push(text.slice(last, m.index));
    const tok = m[0];
    if (m[1]) out.push(<code key={key++} style={{ fontFamily: 'var(--mono)', background: 'var(--surface-2)', padding: '0 4px', borderRadius: 3, fontSize: '0.92em', color: 'var(--accent-text)' }}>{tok.slice(1, -1)}</code>);else
    if (m[2]) {
      const label = tok.slice(2, -2);
      const date = resolveJournalDate(label);
      out.push(
        <span key={key++}
        onClick={date ? (e) => {e.stopPropagation();onJumpDate && onJumpDate(date);} : undefined}
        title={date ? `${date} 일지로 이동` : '인식할 수 없는 날짜'}
        style={{
          color: date ? 'var(--accent-text)' : 'var(--text-3)',
          background: 'var(--accent-light)', borderRadius: 4, padding: '0 5px',
          fontSize: '0.92em', fontWeight: 500, cursor: date ? 'pointer' : 'default',
          textDecoration: date ? 'none' : 'line-through', whiteSpace: 'nowrap'
        }}>🔗 {label}</span>);
    } else
    if (m[3]) out.push(<strong key={key++}>{tok.slice(2, -2)}</strong>);else
    if (m[4]) out.push(<span key={key++} style={{ textDecoration: 'line-through', opacity: .55 }}>{tok.slice(2, -2)}</span>);else
    if (m[5]) out.push(<em key={key++}>{tok.slice(1, -1)}</em>);else
    if (m[6]) out.push(<span key={key++} style={{ color: 'var(--accent-text)', background: 'var(--accent-light)', borderRadius: 99, padding: '0 6px', fontSize: '0.86em', fontWeight: 600 }}>{tok}</span>);
    last = m.index + tok.length;
  }
  if (last < text.length) out.push(text.slice(last));
  return out;
}

/* ── 콜아웃 종류별 색/아이콘 (없는 테마 대비 fallback 색 포함) ── */
const CALLOUT = {
  note: { icon: '🔵', label: '노트', color: 'var(--blue, #2563eb)', bg: 'var(--blue-light, #dbeafe)' },
  tip: { icon: '🟢', label: '팁', color: 'var(--green, #16a34a)', bg: 'var(--green-light, #dcfce7)' },
  warning: { icon: '🟠', label: '주의', color: 'var(--amber, #d97706)', bg: 'var(--amber-light, #fef3c7)' },
  important: { icon: '🔴', label: '중요', color: 'var(--red, #dc2626)', bg: 'var(--red-light, #fee2e2)' }
};
const CALLOUT_ALIAS = { info: 'note', 'note': 'note', tip: 'tip', success: 'tip', done: 'tip', warning: 'warning', warn: 'warning', caution: 'warning', important: 'important', danger: 'important', error: 'important' };

/* ── 본문을 블록 단위로 묶기 ── 인용/콜아웃/구분선은 연속 줄을 하나로 ── */
function groupBlocks(lines) {
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^\s*---+\s*$/.test(line) || /^\s*\*\*\*+\s*$/.test(line)) {blocks.push({ type: 'hr', li: i });i++;continue;}
    const co = line.match(/^\s*>\s*\[!(\w+)\]\s*(.*)$/);
    if (co) {
      const inner = [];
      if (co[2]) inner.push(co[2]);
      let j = i + 1;
      while (j < lines.length && /^\s*>/.test(lines[j]) && !/^\s*>\s*\[!/.test(lines[j])) {inner.push(lines[j].replace(/^\s*>\s?/, ''));j++;}
      blocks.push({ type: 'callout', kind: co[1].toLowerCase(), lines: inner, li: i });i = j;continue;
    }
    if (/^\s*>/.test(line)) {
      const inner = [];
      let j = i;
      while (j < lines.length && /^\s*>/.test(lines[j]) && !/^\s*>\s*\[!/.test(lines[j])) {inner.push(lines[j].replace(/^\s*>\s?/, ''));j++;}
      blocks.push({ type: 'quote', lines: inner, li: i });i = j;continue;
    }
    blocks.push({ type: 'line', li: i, text: line });i++;
  }
  return blocks;
}

/* ── 본문 렌더링 (read view) ── 블록(인용/콜아웃/구분선) + 줄(체크박스/불릿/번호/일반) ── */
function MarkdownBody({ body, onToggleCheckbox, onEdit, onJumpDate }) {
  const lines = (body || '').split('\n');
  const blocks = groupBlocks(lines);
  const ri = (t) => renderInline(t, { onJumpDate });

  function renderLine(line, li) {
    if (line.trim() === '') return <div key={li} style={{ height: '0.9em' }} />;
    /* 체크박스 */
    const cb = line.match(/^(\s*)([-*])\s+\[( |x|X)\]\s+(.*)$/);
    if (cb) {
      const checked = cb[3].toLowerCase() === 'x';
      const indent = cb[1].length;
      return (
        <div key={li} style={{ display: 'flex', alignItems: 'flex-start', gap: 7, paddingLeft: indent * 10 }}>
          <span
            onClick={(e) => {e.stopPropagation();onToggleCheckbox(li);}}
            title="체크박스 토글"
            style={{
              flexShrink: 0, marginTop: 3, width: 15, height: 15, borderRadius: 4,
              border: checked ? '1.5px solid var(--green)' : '1.5px solid var(--border-2)',
              background: checked ? 'var(--green)' : 'transparent',
              color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 10, cursor: 'pointer', lineHeight: 1
            }}>{checked ? '✓' : ''}</span>
          <span style={{ flex: 1, color: checked ? 'var(--text-4)' : 'var(--text)', textDecoration: checked ? 'line-through' : 'none' }}>{ri(cb[4])}</span>
        </div>);
    }
    /* 번호 목록 */
    const ol = line.match(/^(\s*)(\d+)\.\s+(.*)$/);
    if (ol) {
      const indent = ol[1].length;
      return (
        <div key={li} style={{ display: 'flex', alignItems: 'flex-start', gap: 7, paddingLeft: indent * 10 }}>
          <span style={{ flexShrink: 0, color: 'var(--text-3)', minWidth: 16, textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{ol[2]}.</span>
          <span style={{ flex: 1 }}>{ri(ol[3])}</span>
        </div>);
    }
    /* 불릿 */
    const bu = line.match(/^(\s*)([-*])\s+(.*)$/);
    if (bu) {
      const indent = bu[1].length;

      prio !== 'B' ? ` !${prio}` : '') +
      ` 📌` + (
      project ? ` @${project}` : '');
      nativeReplace(ta, lineStart, lineEnd, replacement, lineStart + replacement.length);
      setSlash(null);
      if (onSlashTask) onSlashTask({ title, prio, deadline, project });
      return;
    }
    if (slash && slash.idx === idx && e.key === 'Escape') {e.preventDefault();setSlash(null);return;}

    /* Tab → 들여쓰기 (menu 네비게이션 중이 아닐 때만) */
    if (e.key === 'Tab' && !e.nativeEvent.isComposing && e.keyCode !== 229 && !(menu && menu.idx === idx)) {
      e.preventDefault();
      const ta = e.target;
      const value = ta.value;
      const start = ta.selectionStart, end = ta.selectionEnd;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const selEndAdj = end > start && value[end - 1] === '\n' ? end - 1 : end;
      let blockEnd = value.indexOf('\n', selEndAdj);
      if (blockEnd === -1) blockEnd = value.length;
      const block = value.slice(lineStart, blockEnd);
      const lines = block.split('\n');
      const newLines = e.shiftKey
        ? lines.map((l) => l.replace(/^(\t| {1,2})/, ''))
        : lines.map((l) => '  ' + l);
      const newBlock = newLines.join('\n');
      const delta = newBlock.length - block.length;
      let cs, ce;
      if (start === end) {
        const d = newLines[0].length - lines[0].length;
        cs = ce = Math.max(lineStart, start + d);
      } else {
        cs = lineStart; ce = blockEnd + delta;
      }
      nativeReplace(ta, lineStart, blockEnd, newBlock, cs, ce);
      return;
    }

    /* Shift+Enter → 현재 줄이 들여쓰기/리스트면 한 단계 하위(자식)로 새 항목
       (slash/menu 비활성 시) */
    if (e.key === 'Enter' && e.shiftKey && !e.nativeEvent.isComposing && e.keyCode !== 229
        && !(slash && slash.idx === idx) && !(menu && menu.idx === idx)) {
      const ta = e.target;
      const value = ta.value;
      const start = ta.selectionStart;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const currentLine = value.slice(lineStart, start);
      const lm = currentLine.match(/^(\s*)([-*])\s(\[[ xX]\]\s)?(.*)$/);
      if (lm) {
        e.preventDefault();
        const [, indent, bullet, checkbox] = lm;
        const prefix = '\n' + indent + '  ' + bullet + ' ' + (checkbox ? '[ ] ' : '');
        nativeReplace(ta, start, start, prefix, start + prefix.length);
        return;
      }
      const im = currentLine.match(/^(\s+)\S/);
      if (im) {
        e.preventDefault();
        const prefix = '\n' + im[1] + '  ';
        nativeReplace(ta, start, start, prefix, start + prefix.length);
        return;
      }
    }

    /* Enter → 리스트 자동 이어쓰기 (slash/menu 없을 때) */
    if (e.key === 'Enter' && !e.shiftKey && !e.nativeEvent.isComposing && e.keyCode !== 229
        && !(slash && slash.idx === idx) && !(menu && menu.idx === idx)) {
      const ta = e.target;
      const value = ta.value;
      const start = ta.selectionStart;
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const currentLine = value.slice(lineStart, start);
      const m = currentLine.match(/^(\s*)([-*])\s(\[[ xX]\]\s)?(.*)$/);
      if (m) {
        const [, indent, bullet, checkbox, rest] = m;
        if (!rest.trim()) {
          e.preventDefault();
          nativeReplace(ta, lineStart, start, '\n', lineStart + 1);
          return;
        }
        e.preventDefault();
        const prefix = '\n' + indent + bullet + ' ' + (checkbox ? '[ ] ' : '');
        nativeReplace(ta, start, start, prefix, start + prefix.length);
        return;
      }
    }
  }

  /* 슬래시 미리보기용 — 옵션 토큰 제거한 깔끔한 제목 */
  function cleanSlashTitle(q) {
    return q.replace(/!([ABCabc])\b/g, '').replace(/@\S+/g, '').replace(/~\d{1,2}\/\d{1,2}/g, '').trim();
  }

  function updateHeader(idx, newHeader) {
    const next = sections.map((s, i) => i === idx ? { ...s, header: newHeader } : s);
    onChange(joinSections(next));
  }

  /* 체크박스 토글 — 섹션 body의 특정 줄 [ ] ↔ [x] */

    a + (mark.toLowerCase() === 'x' ? ' ' : 'x') + c);
    updateBody(idx, lines.join('\n'));
  }

  function addHeaderAfter(idx) {
    const next = [...sections];
    next.splice(idx + 1, 0, { header: '# 새 섹션', level: 1, body: '' });
    onChange(joinSections(next));
    setPendingEditIdx(idx + 1); // 새 섹션 본문 자동 포커스
  }

  function deleteSection(idx) {
    setConfirmDeleteIdx(idx);
  }
  function doDeleteSection(idx) {
    const next = sections.filter((_, i) => i !== idx);
    onChange(joinSections(next));
    setConfirmDeleteIdx(null);
  }

  function expandAll() {setFolded(new Set());}

  /* 섹션 점프 칩 — 그 섹션만 열고 나머지는 접기. 이미 그 섹션만 열려 있으면 다시 눌러 접기(토글) */
  function openOnlySection(realIdx) {

          {sections.filter(s => s.header !== null).map((s, si) => {

                rows={Math.max(2, Math.min(24, bodyLines + 1))}
                isPreamble={isPreamble} />
                {slash && slash.idx === i && (() => {
                  // 커서 줄 바로 아래에 힌트 박스 표시
                  const hintTop = ((slash.lineRow || 0) + 1) * 24 + 4;

                      <span style={{ fontSize: 15 }}>📌</span>

                        </div>

                })()}
                {menu && menu.idx === i && (() => {
                const menuTop = ((menu.lineRow || 0) + 1) * 24 + 4;
                const list = filterSlashCmds(menu.query);
                if (list.length === 0) return (
                  <div style={{ position: 'absolute', top: menuTop, left: 8, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, boxShadow: '0 12px 32px rgba(0,0,0,.18)', zIndex: 60, padding: '8px 12px', fontSize: 11, color: 'var(--text-4)' }}>일치하는 명령 없음 — Esc</div>);
                return (
                  <div ref={menuRef} onMouseMove={() => {kbdNavRef.current = false;}} style={{ position: 'absolute', top: menuTop, left: 8, width: 290, maxHeight: 286, overflow: 'auto', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, boxShadow: '0 12px 32px rgba(0,0,0,.18)', zIndex: 60, padding: 4 }}>
                      <div style={{ fontSize: 9, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '.5px', padding: '4px 8px 3px' }}>명령 {menu.query ? '· /' + menu.query : '· ↑↓ 이동, Enter 선택'}</div>
                      {list.map((c, ci) =>
                    <div key={c.id}
                    data-cmd-row={ci}
                    onMouseDown={(e) => {e.preventDefault();applyCmd(c);}}
                    onMouseEnter={() => {if (!kbdNavRef.current) setMenu((m) => m ? { ...m, sel: ci } : m);}}
                    style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 8px', borderRadius: 6, cursor: 'pointer', background: (menu.sel || 0) === ci ? 'var(--surface-2)' : 'transparent' }}>
                          <span style={{ width: 18, textAlign: 'center', fontSize: 14, flexShrink: 0 }}>{c.icon}</span>
                          <div style={{ minWidth: 0, flex: 1 }}>
                            <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--text)' }}>{c.label}</div>
                            <div style={{ fontSize: 10, color: 'var(--text-4)', fontFamily: 'var(--mono)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.desc}</div>
                          </div>
                        </div>
                    )}
                    </div>);
              })()}
              </div> :
            s.body.trim() === '' ?
            <div onClick={() => setEditingIdx(i)} style={{ padding: '4px 4px 8px 26px', fontSize: 13, color: 'var(--text-4)', cursor: 'text', minHeight: 28 }}>클릭해서 입력…</div> :
            <MarkdownBody body={s.body} onToggleCheckbox={(li) => toggleCheckbox(i, li)} onEdit={() => setEditingIdx(i)} onJumpDate={onJumpDate} />)

            }
          </div>);

      })}

      {sections.length === 0 &&
      <div style={{ fontSize: 12, color: 'var(--text-4)', padding: 12, textAlign: 'center' }}>(내용 없음)</div>
      }

      {/* 커스텀 삭제 확인 다이얼로그 */}
      {confirmDeleteIdx !== null && (
        <div onClick={() => setConfirmDeleteIdx(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.35)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '20px 24px', minWidth: 280, boxShadow: 'var(--shadow-lg)' }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8 }}>섹션 삭제</div>
            <div style={{ fontSize: 13, color: 'var(--text-2)', marginBottom: 18, lineHeight: 1.6 }}>
              <strong>"{(sections[confirmDeleteIdx]?.header || '').replace(/^#+\s*/, '')}"</strong> 섹션과 내용을 삭제할까요?
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button className="btn btn-sm" onClick={() => setConfirmDeleteIdx(null)}>취소</button>
              <button className="btn btn-sm" onClick={() => doDeleteSection(confirmDeleteIdx)} style={{ background: 'var(--red)', color: '#fff', borderColor: 'var(--red)' }}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>);

}

   조용히 폴백 (디자인 미리보기에서는 정상 동작하는 것처럼 보이게). */
let __NO_BACKEND__ = false;
function __markNoBackend__(reason) {
  if (__NO_BACKEND__) return;

}
function __isNetworkErr__(e) {
  const m = e && e.message || '';
  return m.includes('Failed to fetch') || m.includes('NetworkError') || m.includes('failed: 404') || m.includes('failed: 0');
}

/* ── localStorage 폴백 스토어 — 백엔드 없을 때 진짜로 데이터 유지 ── */
const LS_KEYS = { tasks: 'worklog.local.tasks', journals: 'worklog.local.journals', projects: 'worklog.local.projects', nextId: 'worklog.local.nextId' };
const LS = {
  loadTasks() {try {return JSON.parse(localStorage.getItem(LS_KEYS.tasks) || '[]');} catch (e) {return [];}},
  saveTasks(arr) {localStorage.setItem(LS_KEYS.tasks, JSON.stringify(arr));},
  loadJournals() {try {return JSON.parse(localStorage.getItem(LS_KEYS.journals) || '{}');} catch (e) {return {};}},
  saveJournals(obj) {localStorage.setItem(LS_KEYS.journals, JSON.stringify(obj));},
  loadProjects() {
    try {
      const v = JSON.parse(localStorage.getItem(LS_KEYS.projects) || 'null');
      if (Array.isArray(v) && v.length) return v;
    } catch (e) {}
    return [
    { id: 1, name: '보고서', color: '#2563eb' },

  },
  saveProjects(arr) {localStorage.setItem(LS_KEYS.projects, JSON.stringify(arr));},
  nextId() {
    let n = parseInt(localStorage.getItem(LS_KEYS.nextId) || '1000', 10);

  }
};
function _nowIso() {return new Date().toISOString();}

/* localStorage 기반 가짜 백엔드 — 실제 Flask와 동일한 응답 모양으로 흉내냄 */
function localBackend(method, url, body) {
  const m = (re) => url.match(re);
  // GET endpoints
  if (method === 'GET') {
    if (url === '/api/tasks/all') return LS.loadTasks();
    if (url === '/api/projects') return LS.loadProjects();
    let mm;
    if (mm = m(/^\/api\/journal\/(.+)$/)) {
      const j = LS.loadJournals();
      return { date: mm[1], content: j[mm[1]] || '' };
    }
    if (mm = m(/^\/api\/journals\/dates\?year=(\d+)&month=(\d+)$/)) {
      const j = LS.loadJournals();
      const y = mm[1],mo = String(mm[2]).padStart(2, '0');
      return Object.keys(j).filter((d) => d.startsWith(`${y}-${mo}`) && j[d] && j[d].trim());
    }
    if (mm = m(/^\/api\/journals\/range\?start=([^&]+)&end=(.+)$/)) {
      const j = LS.loadJournals();
      const [s, e] = [mm[1], mm[2]];
      return Object.entries(j).filter(([d]) => d >= s && d <= e).map(([date, content]) => ({ date, content }));
    }
    if (mm = m(/^\/api\/heatmap\?days=(\d+)$/)) {
      const days = parseInt(mm[1], 10);
      const tasks = LS.loadTasks();
      const out = [];
      const today = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today);d.setDate(today.getDate() - i);
        const ymd = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const c = tasks.filter((t) => t.status === 'DONE' && (t.updated_at || '').slice(0, 10) === ymd).length;
        out.push({ date: ymd, count: c });
      }
      return out;
    }
    if (mm = m(/^\/api\/stats\/weekly\?start=([^&]+)&end=(.+)$/)) {
      const [s, e] = [mm[1], mm[2]];
      const tasks = LS.loadTasks();
      const inRange = tasks.filter((t) => (t.created_at || '').slice(0, 10) >= s && (t.created_at || '').slice(0, 10) <= e);
      return { total: inRange.length, done: tasks.filter((t) => t.status === 'DONE' && (t.updated_at || '').slice(0, 10) >= s).length, active: tasks.filter((t) => ['TODO', 'DOING'].includes(t.status)).length };
    }
    return [];
  }
  // POST endpoints
  if (method === 'POST') {
    let mm;
    if (url === '/tasks/add' || url === '/api/tasks/add') {
      const tasks = LS.loadTasks();
      const now = _nowIso();
      const id = LS.nextId();
      tasks.push({
        id, title: body.title, status: 'TODO', priority: body.priority || 'B',
        project: body.project || '미분류', deadline: body.deadline || null,
        note: body.note || '', journal_date: body.journal_date || _todayLocal(),
        created_at: now, updated_at: now,
        type:        body.type        || 'TASK',
        waiting_for: body.waiting_for || null,
        source_text: body.source_text || null,
        confirmed:   body.confirmed   != null ? body.confirmed : 1,
        resolved_at: null,
      });
      LS.saveTasks(tasks);
      return { ok: true, id };
    }
    if (mm = m(/^\/tasks\/(\d+)\/status$/)) {
      const id = parseInt(mm[1], 10);
      const tasks = LS.loadTasks();
      const i = tasks.findIndex((t) => t.id === id);
      if (i >= 0) {tasks[i].status = body.status;tasks[i].updated_at = _nowIso();LS.saveTasks(tasks);}
      return { ok: true };
    }
    if (mm = m(/^\/tasks\/(\d+)\/edit$/)) {
      const id = parseInt(mm[1], 10);
      const tasks = LS.loadTasks();
      const i = tasks.findIndex((t) => t.id === id);
      if (i >= 0) {Object.assign(tasks[i], body, { updated_at: _nowIso() });LS.saveTasks(tasks);}
      return { ok: true };
    }
    if (mm = m(/^\/tasks\/(\d+)\/delete$/)) {
      const id = parseInt(mm[1], 10);
      LS.saveTasks(LS.loadTasks().filter((t) => t.id !== id));
      return { ok: true };
    }
    if (url === '/journal/save') {
      const j = LS.loadJournals();
      j[body.date] = body.content || '';
      LS.saveJournals(j);
      return { ok: true };
    }
    if (url === '/api/projects/add') {
      const ps = LS.loadProjects();
      if (!ps.find((p) => p.name === body.name)) {
        ps.push({ id: LS.nextId(), name: body.name, color: '#64748b' });
        LS.saveProjects(ps);
      }
      return { ok: true };
    }
    if (mm = m(/^\/api\/projects\/(\d+)\/delete$/)) {
      const id = parseInt(mm[1], 10);
      LS.saveProjects(LS.loadProjects().filter((p) => p.id !== id));
      return { ok: true };
    }
    if (mm = m(/^\/api\/projects\/(\d+)\/color$/)) {
      const id = parseInt(mm[1], 10);
      const ps = LS.loadProjects();
      const i = ps.findIndex((p) => p.id === id);
      if (i >= 0) {ps[i].color = body.color;LS.saveProjects(ps);}
      return { ok: true };
    }
    return { ok: true };
  }
}

/* 오늘 날짜 (YYYY-MM-DD)
   ⚠ 모듈 로드 시 한 번만 평가하면 자정 넘어가도 갱신 안 됨 (브라우저를 며칠 켜놓는 환경에서 발생).
   useToday() 훅으로 1분마다 재확인 + visibilitychange 시 즉시 갱신. */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
let TODAY = todayStr(); /* let으로 변경 — useToday()가 갱신 */
function useToday() {
  const [today, setToday] = React.useState(todayStr());
  React.useEffect(() => {
    const tick = () => {
      const t = todayStr();
      if (t !== TODAY) {TODAY = t;setToday(t);}
    };
    const id = setInterval(tick, 60 * 1000);
    const onVis = () => {if (!document.hidden) tick();};
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('focus', tick);
    return () => {clearInterval(id);document.removeEventListener('visibilitychange', onVis);window.removeEventListener('focus', tick);};
  }, []);
  return today;
}

/* ─── MiniCalendar ─── */
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
}

function MiniCalendar({ onSelectDate, selectedDate, journalDates }) {
  const today = new Date();
  const [viewYear, setViewYear] = React.useState(today.getFullYear());
  const [viewMonth, setViewMonth] = React.useState(today.getMonth());

  /* journalDates: { 'YYYY-MM-DD': true } 형태. 백엔드 미연결 시 fallback —
     오늘 기준 최근 5 평일을 일지 있는 날로 시드 (시연용 표시) */
  const fallbackHasLogSet = (() => {
    const set = new Set();
    const t = new Date();t.setHours(0, 0, 0, 0);
    let added = 0,cursor = new Date(t);
    while (added < 5) {
      const dow = cursor.getDay();
      if (dow !== 0 && dow !== 6) {set.add(localYMD(cursor));added++;}
      cursor.setDate(cursor.getDate() - 1);
    }
    return set;
  })();

  const prevMonth = () => {
    if (viewMonth === 0) {setViewYear((y) => y - 1);setViewMonth(11);} else
    setViewMonth((m) => m - 1);
  };
  const nextMonth = () => {
    if (viewMonth === 11) {setViewYear((y) => y + 1);setViewMonth(0);} else
    setViewMonth((m) => m + 1);
  };

  const firstDay = new Date(viewYear, viewMonth, 1);
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  // Sunday=0 offset
  const startOffset = firstDay.getDay(); // 0=Sun

  // Build rows (weeks)
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  // pad to full weeks
  while (cells.length % 7 !== 0) cells.push(null);

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) {
    const row = cells.slice(i, i + 7);
    // find first non-null day in row to determine week number
    const firstD = row.find((x) => x !== null);
    const weekNum = firstD ? getISOWeek(new Date(viewYear, viewMonth, firstD)) : null;
    weeks.push({ weekNum, days: row });
  }

  const monthLabel = `${viewYear}년 ${viewMonth + 1}월`;
  const dow = ['일', '월', '화', '수', '목', '금', '토'];

  return (
    <div className="mini-cal">
      <div className="mini-cal-header">
        <button className="mini-cal-nav" onClick={prevMonth}>‹</button>
        <span className="mini-cal-month">{monthLabel}</span>
        <button className="mini-cal-nav" onClick={nextMonth}>›</button>
      </div>
      <div className="mini-cal-grid">
        {/* header row */}
        <div className="mini-cal-week" style={{ opacity: .4 }}>주</div>
        {dow.map((d) => <div key={d} className="mini-cal-dow">{d}</div>)}
        {/* week rows */}
        {weeks.map(({ weekNum, days }, wi) =>
        <React.Fragment key={wi}>
            <div className="mini-cal-week">{weekNum}</div>
            {days.map((d, di) => {
            if (!d) return <div key={`e${wi}-${di}`} />;
            const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = dateStr === TODAY;
            const isSelected = selectedDate === dateStr;
            const hasLog = (() => {
              const key = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
              if (journalDates && Object.keys(journalDates).length) return !!journalDates[key];
              return fallbackHasLogSet.has(key);
            })();
            return (
              <div key={d}
              onClick={() => onSelectDate && onSelectDate(dateStr)}
              className={`mini-cal-day${isToday ? ' today' : hasLog ? ' has-log' : ''}`}
              style={isSelected && !isToday ? { outline: '2px solid var(--accent)', outlineOffset: '-1px' } : {}}
              title={hasLog ? `${d}일 — 일지 있음 (클릭하여 이동)` : `${d}일로 이동`}>
                {d}</div>);

          })}
          </React.Fragment>
        )}
      </div>
    </div>);

}
